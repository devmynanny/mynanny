services:
  - type: web
    name: mynanny
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    # Run schema migrations before each deploy goes live.
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: commit
    # Persistent disk kept ONLY for uploaded documents/photos.
    # The database now lives in managed Postgres (below), not on this disk.
    disk:
      name: app-data
      mountPath: /opt/render/project/src/app/static/uploads
      sizeGB: 1
    envVars:
      - key: APP_ENV
        value: staging
      - key: DATABASE_URL
        fromDatabase:
          name: mynanny-db
          property: connectionString
      - key: ADMIN_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false

databases:
  - name: mynanny-db
    plan: basic-256mb
    postgresMajorVersion: "16"
