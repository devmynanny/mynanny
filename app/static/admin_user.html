<!doctype html>
<html>
<head>
  <link rel="stylesheet" href="/static/theme.css" />
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>User admin</title>
  <style>
    body { font-family: system-ui, Arial, sans-serif; max-width: 900px; margin: 28px auto; padding: 0 16px; }
    h1 { margin: 8px 0 18px; }
    h2 { margin: 22px 0 10px; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 12px; margin: 10px 0; }
    .row { display:flex; gap:10px; align-items:center; justify-content:space-between; flex-wrap:wrap; }
    .btn{ padding:10px 14px;border-radius:10px;border:1px solid #ccc;background:#fff;cursor:pointer }
    .muted { color:#666; }
    .err { color:#b00020; }
    .summary-block { margin-top: 10px; line-height: 1.5; }
    .summary-block:first-child { margin-top: 0; }
    .actionRow { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
    .contactAction {
      width: 52px;
      height: 52px;
      border-radius: 999px;
      border: none;
      background: #22c55e;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 18px rgba(34, 197, 94, 0.18);
    }
    .contactAction:disabled {
      background: #bbf7d0;
      color: #4b5563;
      cursor: not-allowed;
      box-shadow: none;
    }
    .profilePreview {
      display: grid;
      grid-template-columns: minmax(0, 160px) minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }
    .profilePreview img {
      width: 160px;
      height: 160px;
      object-fit: cover;
      border-radius: 14px;
      border: 1px solid #ddd;
      background: #f3f4f6;
    }
    .infoList { display:grid; gap:8px; }
    .pillRow { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
    .pill { display:inline-flex; align-items:center; padding:4px 10px; border-radius:999px; border:1px solid #ddd; background:#f9fafb; font-size:13px; }
    .docList { display:grid; gap:10px; }
    .docRow { display:flex; justify-content:space-between; gap:12px; align-items:center; padding:10px 0; border-bottom:1px solid #eee; }
    .docRow:last-child { border-bottom:0; }
    @media (max-width: 720px) {
      .profilePreview { grid-template-columns: 1fr; }
    }
  </style>
  <script defer src="/static/nav_buttons.js"></script>
</head>
<body>
  <div class="row" style="margin-bottom:10px;">
    <button class="btn back-btn" id="backBtn" type="button">Back</button>
  </div>
  <h1>User admin</h1>
  <div id="authMsg" class="err"></div>

  <div class="card" id="profileSummary">
    <h2>Profile summary</h2>
    <div id="profileSummaryBody" class="muted">Loading...</div>
  </div>

  <div class="card" id="bookingStats">
    <h2>Booking stats</h2>
    <div id="bookingStatsBody" class="muted">Loading...</div>
  </div>

  <div class="card" id="revenue">
    <h2>Revenue</h2>
    <div id="revenueBody" class="muted">Loading...</div>
  </div>

  <div class="card" id="profileViewCard" style="display:none;">
    <h2>Profile view</h2>
    <div id="profileViewBody" class="muted">Loading...</div>
  </div>

  <div class="card" id="nannyDocumentsCard" style="display:none;">
    <h2>Nanny uploaded documents</h2>
    <div id="nannyDocumentsBody" class="muted">Loading...</div>
  </div>

  <div class="card" id="editProfile">
    <h2>Edit profile</h2>
    <div class="actionRow">
      <button class="btn" id="editProfileBtn" type="button">Edit profile</button>
      <button class="contactAction" id="whatsappBtn" type="button" title="WhatsApp">WA</button>
      <button class="contactAction" id="callBtn" type="button" title="Call">Call</button>
      <button class="contactAction" id="emailBtn" type="button" title="Email">Mail</button>
    </div>
  </div>

  <div class="card" id="nannyApplication" style="display:none;">
    <h2>Nanny application</h2>
    <div id="nannyApplicationBody" class="muted">Loading...</div>
    <div style="margin-top:12px;">
      <label class="muted">Application review note (optional)</label>
      <textarea id="nannyDecisionReason" style="width:100%; min-height:70px;"></textarea>
    </div>
    <div class="row" style="margin-top:10px;">
      <button class="btn" id="nannyApproveBtn" type="button">Approve</button>
      <button class="btn" id="nannyHoldBtn" type="button">Hold</button>
      <button class="btn" id="nannyDeclineBtn" type="button">Decline</button>
      <span id="nannyDecisionStatus" class="muted"></span>
    </div>
  </div>

  <script src="/static/app.js?v=2"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const userId = params.get("user_id");
    const authMsg = document.getElementById("authMsg");

    document.getElementById("backBtn").addEventListener("click", () => {
      window.location.href = "/static/admin_dashboard.html";
    });

    async function ensureAdmin() {
      const res = await fetch("/admin/me", {
        credentials: "same-origin"
      });
      if (!res.ok) {
        authMsg.textContent = "Not authorized";
        setTimeout(() => {
          window.location.href = "/static/parent_home.html";
        }, 1000);
        return false;
      }
      return true;
    }

    async function loadUserInfo() {
      const user = await fetchJson(`/admin/users/${userId}`);
      return user;
    }

    async function loadParentProfile() {
      return await fetchJson(`/admin/parents/${userId}/profile`);
    }

    async function loadNannyProfile() {
      return await fetchJson(`/admin/nannies/${userId}/profile`);
    }

    async function loadBookingStats() {
      return await fetchJson(`/admin/users/${userId}/booking-stats`);
    }

    async function loadRevenue() {
      return await fetchJson(`/admin/users/${userId}/revenue`);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function renderProfileSummary(user, profile) {
      const lines = [];
      lines.push(`<div><strong>Name:</strong> ${escapeHtml(profile?.name || "-")}</div>`);
      lines.push(`<div><strong>Email:</strong> ${escapeHtml(user.email || "-")}</div>`);
      const phoneParts = [];
      if (profile?.phone) phoneParts.push(profile.phone);
      if (profile?.phone_alt) phoneParts.push(profile.phone_alt);
      const phoneLine = phoneParts.length ? phoneParts.join(" / ") : "-";
      lines.push(`<div><strong>Phone:</strong> ${escapeHtml(phoneLine)}</div>`);
      if (user.role === "parent") {
        lines.push(`<div><strong>Kids count:</strong> ${escapeHtml(profile?.kids_count ?? "-")}</div>`);
      }
      const loc = [profile?.suburb, profile?.city, profile?.province].filter(Boolean).join(", ") || "-";
      lines.push(`<div><strong>Location:</strong> ${escapeHtml(loc)}</div>`);
      if (user.role === "nanny") {
        lines.push(`<div><strong>Age:</strong> ${escapeHtml(profile?.age ?? "-")}</div>`);
        lines.push(`<div><strong>Nationality:</strong> ${escapeHtml(profile?.nationality || "-")}</div>`);
        if (profile?.profile_summary) {
          lines.push(`<div class="summary-block"><strong>Generated summary:</strong><br>${escapeHtml(profile.profile_summary)}</div>`);
        } else if (profile?.bio) {
          lines.push(`<div class="summary-block"><strong>Bio:</strong><br>${escapeHtml(profile.bio)}</div>`);
        }
      }
      document.getElementById("profileSummaryBody").innerHTML = lines.join("");
    }

    function cleanPhoneNumber(value) {
      return String(value || "").replace(/[^\d+]/g, "");
    }

    function normalizeWhatsAppNumber(value) {
      const raw = cleanPhoneNumber(value);
      if (!raw) return "";
      if (raw.startsWith("+")) return raw.slice(1);
      if (raw.startsWith("0")) return `27${raw.slice(1)}`;
      return raw;
    }

    function renderProfileView(user, profile) {
      const card = document.getElementById("profileViewCard");
      const body = document.getElementById("profileViewBody");
      if (!card || !body) return;

      if (user.role !== "parent") {
        card.style.display = "none";
        return;
      }

      card.style.display = "block";
      const kidsAges = Array.isArray(profile?.kids_ages) && profile.kids_ages.length
        ? profile.kids_ages.join(", ")
        : "-";
      const flags = Array.isArray(profile?.access_flags) ? profile.access_flags.filter(Boolean) : [];
      const location = profile?.formatted_address || [profile?.suburb, profile?.city, profile?.province].filter(Boolean).join(", ") || "-";
      const familyPhoto = profile?.family_photo_url
        ? `<img src="${escapeHtml(profile.family_photo_url)}" alt="Family photo" />`
        : `<div style="width:160px;height:160px;border-radius:14px;border:1px solid #ddd;background:#f3f4f6;display:flex;align-items:center;justify-content:center;color:#666;">No family photo</div>`;

      body.innerHTML = `
        <div class="profilePreview">
          <div>${familyPhoto}</div>
          <div class="infoList">
            <div><strong>Family name:</strong> ${escapeHtml(profile?.name || "-")}</div>
            <div><strong>Children in home:</strong> ${escapeHtml(profile?.kids_count ?? "-")}</div>
            <div><strong>Children ages:</strong> ${escapeHtml(kidsAges)}</div>
            <div><strong>Residence type:</strong> ${escapeHtml(profile?.residence_type || "-")}</div>
            <div><strong>Location:</strong> ${escapeHtml(location)}</div>
            <div><strong>Booking responsibilities:</strong> ${escapeHtml(profile?.booking_responsibilities || "-")}</div>
            <div><strong>Adult present:</strong> ${escapeHtml(profile?.booking_adult_present || "-")}</div>
            <div><strong>Reason for booking:</strong> ${escapeHtml(profile?.booking_reason || "-")}</div>
            <div><strong>Children present during booking:</strong> ${escapeHtml(profile?.booking_children_count ?? profile?.kids_count ?? "-")}</div>
            <div><strong>Meal arrangement:</strong> ${escapeHtml(profile?.booking_meal_option || "-")}</div>
            <div><strong>Foods not allowed:</strong> ${escapeHtml(profile?.booking_food_restrictions || "-")}</div>
            <div><strong>Dogs at home:</strong> ${escapeHtml(profile?.booking_dogs || "-")}</div>
            <div><strong>Notes for nanny:</strong> ${escapeHtml(profile?.special_notes || "-")}</div>
            <div>
              <strong>Arrival / access instructions:</strong>
              <div class="pillRow">${flags.length ? flags.map((flag) => `<span class="pill">${escapeHtml(flag)}</span>`).join("") : `<span class="muted">No access notes added.</span>`}</div>
            </div>
          </div>
        </div>
      `;
    }

    function bindContactActions(user, profile) {
      const primaryPhone = cleanPhoneNumber(profile?.phone || user?.phone || "");
      const whatsappPhone = normalizeWhatsAppNumber(profile?.phone_alt || profile?.phone || user?.phone_alt || user?.phone || "");
      const email = String(user?.email || "").trim();

      const whatsappBtn = document.getElementById("whatsappBtn");
      const callBtn = document.getElementById("callBtn");
      const emailBtn = document.getElementById("emailBtn");

      if (whatsappBtn) {
        whatsappBtn.disabled = !whatsappPhone;
        whatsappBtn.onclick = () => {
          if (!whatsappPhone) return;
          window.location.href = `https://wa.me/${encodeURIComponent(whatsappPhone)}`;
        };
      }
      if (callBtn) {
        callBtn.disabled = !primaryPhone;
        callBtn.onclick = () => {
          if (!primaryPhone) return;
          window.location.href = `tel:${primaryPhone}`;
        };
      }
      if (emailBtn) {
        emailBtn.disabled = !email;
        emailBtn.onclick = () => {
          if (!email) return;
          window.location.href = `mailto:${encodeURIComponent(email)}`;
        };
      }
    }

    function renderNannyApplication(user, profile) {
      const card = document.getElementById("nannyApplication");
      const body = document.getElementById("nannyApplicationBody");
      const reasonInput = document.getElementById("nannyDecisionReason");
      if (user.role !== "nanny") {
        card.style.display = "none";
        return;
      }
      card.style.display = "block";
      const tags = (profile?.tags || []).map(t => t.name).join(", ") || "-";
      const langs = (profile?.languages || []).map(t => t.name).join(", ") || "-";
      const quals = (profile?.qualifications || []).map(t => t.name).join(", ") || "-";
      const loc = [profile?.suburb, profile?.city, profile?.province].filter(Boolean).join(", ") || "-";
      const status = profile?.application_status || "pending";
      const reason = profile?.admin_reason || "";
      const gender = profile?.gender || "-";
      const transport = [
        profile?.has_drivers_license === true ? "Driver's license" : null,
        profile?.has_own_car === true ? "Own car" : null,
      ].filter(Boolean).join(" / ") || "-";
      const ownKids = profile?.has_own_kids === true
        ? `Yes${profile?.own_kids_details ? ` - ${profile.own_kids_details}` : ""}`
        : (profile?.has_own_kids === false ? "No" : "-");
      const medicalConditions = profile?.medical_conditions || "-";
      const policeClearance = profile?.police_clearance_status || "-";
      const dogPreference = profile?.dog_preference || "-";
      const jobType = profile?.job_type || "-";
      const jobs = Array.isArray(profile?.previous_jobs) ? profile.previous_jobs.filter(Boolean) : [];
      const jobsHtml = jobs.length
        ? jobs.slice(0, 3).map((job) => {
            const role = job.role || "Previous role";
            const employer = job.employer || "Employer not listed";
            const period = job.period || "Period not listed";
            return `<div>${escapeHtml(role)} • ${escapeHtml(employer)} • ${escapeHtml(period)}</div>`;
          }).join("")
        : "-";
      if (reasonInput) reasonInput.value = profile?.admin_reason || "";
      body.innerHTML = [
        `<div><strong>Status:</strong> ${escapeHtml(status)}</div>`,
        reason ? `<div><strong>Application review note:</strong> ${escapeHtml(reason)}</div>` : "",
        `<div><strong>DOB:</strong> ${escapeHtml(profile?.date_of_birth || "-")}</div>`,
        `<div><strong>Age:</strong> ${escapeHtml(profile?.age ?? "-")}</div>`,
        `<div><strong>Nationality:</strong> ${escapeHtml(profile?.nationality || "-")}</div>`,
        `<div><strong>Gender:</strong> ${escapeHtml(gender)}</div>`,
        `<div><strong>Ethnicity:</strong> ${escapeHtml(profile?.ethnicity || "-")}</div>`,
        `<div><strong>Areas of experience:</strong> ${escapeHtml(tags)}</div>`,
        `<div><strong>Languages:</strong> ${escapeHtml(langs)}</div>`,
        `<div><strong>Qualifications:</strong> ${escapeHtml(quals)}</div>`,
        `<div><strong>Transport:</strong> ${escapeHtml(transport)}</div>`,
        `<div><strong>Has children:</strong> ${escapeHtml(ownKids)}</div>`,
        `<div><strong>Medical conditions:</strong> ${escapeHtml(medicalConditions)}</div>`,
        `<div><strong>Police clearance:</strong> ${escapeHtml(policeClearance)}</div>`,
        `<div><strong>Preference regarding dogs:</strong> ${escapeHtml(dogPreference)}</div>`,
        `<div><strong>Job type:</strong> ${escapeHtml(jobType)}</div>`,
        `<div><strong>Location:</strong> ${escapeHtml(loc)}</div>`,
        `<div><strong>Generated summary:</strong> ${escapeHtml(profile?.profile_summary || "-")}</div>`,
        `<div><strong>Previous jobs:</strong> ${jobsHtml}</div>`
      ].join("");
    }

    function renderBookingStats(user, stats) {
      const lines = [];
      if (user.role === "parent") {
        lines.push(`<div>Bookings made: ${stats.bookings_made_count ?? 0}</div>`);
      } else if (user.role === "nanny") {
        lines.push(`<div>Bookings attended: ${stats.bookings_attended_count ?? 0}</div>`);
      }
      lines.push(`<div>Total bookings: ${stats.total_bookings_count ?? 0}</div>`);
      document.getElementById("bookingStatsBody").innerHTML = lines.join("");
    }

    function renderRevenue(data) {
      const total = data?.total_revenue ?? 0;
      document.getElementById("revenueBody").innerHTML = `Total revenue: R${total}`;
    }

    function normalizeDocUrl(url) {
      const value = String(url || "").trim();
      if (!value) return "";
      if (value.startsWith("http://") || value.startsWith("https://")) return value;
      if (value.startsWith("/")) return value;
      return `/${value}`;
    }

    function renderNannyDocuments(user, profile) {
      const card = document.getElementById("nannyDocumentsCard");
      const body = document.getElementById("nannyDocumentsBody");
      if (user.role !== "nanny") {
        card.style.display = "none";
        return;
      }

      const rows = [];
      const pushDoc = (label, url) => {
        const href = normalizeDocUrl(url);
        if (!href) return;
        rows.push({ label, href });
      };

      pushDoc("South African ID document", profile?.sa_id_document_url);
      pushDoc("Passport document", profile?.passport_document_url);
      pushDoc("Work permit document", profile?.work_permit_document_url);
      pushDoc("Police clearance document", profile?.police_clearance_document_url);
      pushDoc("Driver's license document", profile?.drivers_license_document_url);

      const certificateUrls = Array.isArray(profile?.certificate_urls) ? profile.certificate_urls : [];
      certificateUrls.forEach((url, index) => {
        pushDoc(`Certificate ${index + 1}`, url);
      });

      const previousJobs = Array.isArray(profile?.previous_jobs) ? profile.previous_jobs : [];
      previousJobs.forEach((job, index) => {
        const refUrl = job?.reference_letter_url;
        if (!refUrl) return;
        const role = String(job?.role || "").trim() || `Previous job ${index + 1}`;
        pushDoc(`Reference letter: ${role}`, refUrl);
      });

      card.style.display = "block";
      if (!rows.length) {
        body.innerHTML = "No uploaded documents yet.";
        return;
      }

      body.innerHTML = `<div class="docList">${rows.map((row) => `
        <div class="docRow">
          <div>${escapeHtml(row.label)}</div>
          <div><a href="${escapeHtml(row.href)}" target="_blank" rel="noopener noreferrer">View document</a></div>
        </div>
      `).join("")}</div>`;
    }

    async function init() {
      if (!userId) {
        authMsg.textContent = "Missing user_id";
        return;
      }
      const ok = await ensureAdmin();
      if (!ok) return;

      const user = await loadUserInfo();
      let profile = null;
      if (user.role === "parent") {
        profile = await loadParentProfile();
      } else if (user.role === "nanny") {
        profile = await loadNannyProfile();
      }

      renderProfileSummary(user, profile || {});
      renderProfileView(user, profile || {});
      renderNannyApplication(user, profile || {});
      renderNannyDocuments(user, profile || {});
      bindContactActions(user, profile || {});

      const stats = await loadBookingStats();
      renderBookingStats(user, stats);

      const revenue = await loadRevenue();
      renderRevenue(revenue);

      const editBtn = document.getElementById("editProfileBtn");
      editBtn.addEventListener("click", async () => {
        try {
          const resp = await fetchJson("/admin/impersonate", {
            method: "POST",
            body: JSON.stringify({ user_id: Number(userId) })
          });
          if (resp?.access_token) {
            sessionStorage.setItem("impersonation_token", resp.access_token);
          }
          if (user.role === "parent") {
            window.location.href = "/static/parent_profile.html?admin=1";
          } else if (user.role === "nanny") {
            window.location.href = "/static/nanny.html?admin=1";
          }
        } catch (e) {
          authMsg.textContent = e.message || "Error";
        }
      });

      if (user.role === "nanny" && profile?.nanny_id) {
        const reasonEl = document.getElementById("nannyDecisionReason");
        const statusEl = document.getElementById("nannyDecisionStatus");
        document.getElementById("nannyApproveBtn").addEventListener("click", async () => {
          statusEl.textContent = "Saving...";
          try {
            const res = await fetchJson(`/admin/nannies/${profile.nanny_id}/application`, {
              method: "PATCH",
              body: JSON.stringify({ status: "approved", reason: reasonEl.value })
            });
            statusEl.textContent = "Approved";
            profile.application_status = res.application_status;
            profile.admin_reason = res.admin_reason;
            renderNannyApplication(user, profile);
          } catch (e) {
            statusEl.textContent = e.message || "Error";
          }
        });
        document.getElementById("nannyHoldBtn").addEventListener("click", async () => {
          if (!reasonEl.value.trim()) {
            statusEl.textContent = "Please add a review note before placing this profile on hold.";
            reasonEl.focus();
            return;
          }
          statusEl.textContent = "Saving...";
          try {
            const res = await fetchJson(`/admin/nannies/${profile.nanny_id}/application`, {
              method: "PATCH",
              body: JSON.stringify({ status: "hold", reason: reasonEl.value })
            });
            statusEl.textContent = "On hold";
            profile.application_status = res.application_status;
            profile.admin_reason = res.admin_reason;
            renderNannyApplication(user, profile);
          } catch (e) {
            statusEl.textContent = e.message || "Error";
          }
        });
        document.getElementById("nannyDeclineBtn").addEventListener("click", async () => {
          statusEl.textContent = "Saving...";
          try {
            const res = await fetchJson(`/admin/nannies/${profile.nanny_id}/application`, {
              method: "PATCH",
              body: JSON.stringify({ status: "declined", reason: reasonEl.value })
            });
            statusEl.textContent = "Declined";
            profile.application_status = res.application_status;
            profile.admin_reason = res.admin_reason;
            renderNannyApplication(user, profile);
          } catch (e) {
            statusEl.textContent = e.message || "Error";
          }
        });
      }
    }

    init().catch(e => { authMsg.textContent = e.message || "Error"; });
  </script>
</body>
</html>
