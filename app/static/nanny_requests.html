<!doctype html>
<html>
<head>
  <link rel="stylesheet" href="/static/theme.css" />
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Booking Requests</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0 auto;padding:24px;max-width:900px}
    .topbar{display:flex;align-items:center;justify-content:space-between;margin: 10px 0 20px 0;}
    .btn{padding:10px 14px;border-radius:10px;border:1px solid #ccc;background:#fff;cursor:pointer}
    .card{border:1px solid #ddd;border-radius:12px;padding:12px;margin:10px 0;}
    .muted{color:#666}
    .actions{display:flex;gap:8px;margin-top:8px}
    .mapWrap{margin-top:10px;border:1px solid #ddd;border-radius:10px;overflow:hidden;background:#fafafa}
    .mapFrame{width:100%;height:220px;border:0;display:block}
    .mapLinks{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}
    .mapLink{display:inline-block}
    .commitNotice{margin-top:10px;padding:10px;border:1px solid #f3d9a7;background:#fff8e6;border-radius:10px;color:#5f4a1a;font-size:14px}
    .daysNotice{margin-top:10px;padding:10px;border:1px solid #bfdbfe;background:#eff6ff;border-radius:10px;color:#1e3a8a}
    .slotList{margin:8px 0 0 18px;padding:0}
    .slotList li{margin:2px 0}
  </style>
  <script defer src="/static/nav_buttons.js"></script>
</head>
<body>
  <div id="topbar" class="topbar"></div>
  <div class="topbar">
    <button class="btn" id="backBtn" type="button">Back to home</button>
  </div>
  <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
    <h1>Booking requests</h1>
  </div>

  <div id="bookingRequestsList"></div>

  <script src="/static/app.js?v=2"></script>
  <script>
    function formatName(fullName) {
      const parts = String(fullName || "").trim().split(/\s+/).filter(Boolean);
      if (parts.length <= 1) return parts[0] || "";
      const first = parts[0];
      const lastInitial = parts[parts.length - 1][0] || "";
      return `${first} ${lastInitial}.`;
    }

    async function loadBookingRequests() {
      const data = await fetchJson("/nannies/me/booking-requests");
      const list = document.getElementById("bookingRequestsList");
      list.innerHTML = "";
      const items = data.results || [];
      if (!items.length) {
        list.innerHTML = "<div class=\"muted\">No booking requests yet.</div>";
        return;
      }
      items.forEach(r => {
        const start = window.formatDateTimeZA ? window.formatDateTimeZA(r.start_dt) : (r.start_dt || "-");
        const end = window.formatDateTimeZA ? window.formatDateTimeZA(r.end_dt) : (r.end_dt || "-");
        const slots = Array.isArray(r.slots) ? r.slots : [];
        const dayCount = Number(r.days_required || 0) || (slots.length ? new Set(slots.map(s => s.date || (s.start_dt || "").slice(0, 10))).size : 1);
        const slotItems = slots.length
          ? slots.map(s => {
              const sStart = window.formatDateTimeZA ? window.formatDateTimeZA(s.start_dt) : (s.start_dt || "-");
              const sEnd = window.formatDateTimeZA ? window.formatDateTimeZA(s.end_dt) : (s.end_dt || "-");
              return `<li>${sStart} to ${sEnd}</li>`;
            }).join("")
          : `<li>${start} to ${end}</li>`;
        const scheduleBlock = `
          <div class="daysNotice">
            <div><strong>${dayCount} day${dayCount === 1 ? "" : "s"} required at this location.</strong></div>
            <ul class="slotList">${slotItems}</ul>
          </div>
        `;
        const loc = (r.location_label && r.location_address)
          ? `${r.location_label} - ${r.location_address}`
          : (r.location_label || r.location_address || "-");
        const parentName = formatName(r.parent_name || "Parent");
        const jobId = r.group_id || r.id;
        const lat = Number(r.location_lat);
        const lng = Number(r.location_lng);
        const hasCoords = Number.isFinite(lat) && Number.isFinite(lng);
        const bboxDelta = 0.02;
        const mapSrc = hasCoords
          ? `https://www.openstreetmap.org/export/embed.html?bbox=${lng - bboxDelta}%2C${lat - bboxDelta}%2C${lng + bboxDelta}%2C${lat + bboxDelta}&layer=mapnik&marker=${lat}%2C${lng}`
          : "";
        const googleMapsUrl = hasCoords
          ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(`${lat},${lng}`)}`
          : "";
        const boltDeepLink = hasCoords
          ? `bolt://ride?dropoff_latitude=${encodeURIComponent(String(lat))}&dropoff_longitude=${encodeURIComponent(String(lng))}`
          : "";
        const boltFallbackUrl = hasCoords
          ? `https://bolt.eu/?destination=${encodeURIComponent(`${lat},${lng}`)}`
          : "";
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div><strong>${parentName || "Parent"}</strong> (${r.parent_email || "-"})</div>
          <div class="muted">Job ID: ${jobId}</div>
          <div class="muted">${start} to ${end}</div>
          ${scheduleBlock}
          <div class="muted">Location: ${loc}</div>
          ${hasCoords ? `<div class="mapWrap"><iframe class="mapFrame" loading="lazy" referrerpolicy="no-referrer-when-downgrade" src="${mapSrc}" title="Client location map for job ${jobId}"></iframe></div><div class="mapLinks"><a class="mapLink" href="${googleMapsUrl}" target="_blank" rel="noopener noreferrer">Open in Google Maps</a><a class="mapLink boltLink" href="${boltDeepLink}" data-bolt-fallback="${boltFallbackUrl}" rel="noopener noreferrer">Ride with Bolt</a></div>` : `<div class="muted" style="margin-top:6px;">Map unavailable for this request.</div>`}
          ${r.notes ? `<div class="muted">Booking notes: ${r.notes}</div>` : ""}
          <div class="muted">Status: ${r.status || "-"}</div>
          ${r.status === "tbc" || r.status === "pending_admin" ? `<div class="commitNotice">By accepting this booking, you confirm that you will arrive at the listed location on time and complete the shift professionally. Repeated no-shows or missed arrivals can lead to poor ratings, temporary suspension, or removal from the platform.</div><div class="actions"><button class="btn acceptBtn" data-id="${r.id}">Accept booking</button></div>` : ""}
        `;
        list.appendChild(card);
      });
      list.querySelectorAll(".boltLink").forEach(link => {
        link.addEventListener("click", (e) => {
          e.preventDefault();
          const deep = link.getAttribute("href");
          const fallback = link.dataset.boltFallback;
          if (deep) {
            window.location.href = deep;
          }
          if (fallback) {
            setTimeout(() => {
              window.open(fallback, "_blank", "noopener,noreferrer");
            }, 700);
          }
        });
      });
      list.querySelectorAll(".acceptBtn").forEach(btn => {
        btn.addEventListener("click", async () => {
          const ok = window.confirm("Accept this booking? By continuing, you commit to arriving at the listed address on time. Repeated no-shows may result in poor reviews and account suspension.");
          if (!ok) return;
          btn.disabled = true;
          try {
            await fetchJson(`/nannies/me/booking-requests/${btn.dataset.id}/accept`, { method: "POST" });
            loadBookingRequests().catch(() => {});
          } catch (e) {
            btn.disabled = false;
            alert(e.message || "Failed to accept booking");
          }
        });
      });
    }

    document.getElementById("backBtn").addEventListener("click", () => {
      location.href = "/static/nanny_home.html?v=2";
    });

    (async () => {
      const me = await requireMe();
      if (me.role !== "nanny") {
        location.href = "/static/login.html";
        return;
      }
      loadBookingRequests().catch(() => {});
    })();
  </script>
</body>
</html>
