<!doctype html>
<html>
<head>
  <link rel="stylesheet" href="/static/theme.css" />
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Booking Requests</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0 auto;padding:24px;max-width:900px}
    .topbar{display:flex;align-items:center;justify-content:space-between;margin: 10px 0 20px 0;}
    .btn{padding:10px 14px;border-radius:10px;border:1px solid #ccc;background:#fff;cursor:pointer}
    .card{border:1px solid #ddd;border-radius:12px;padding:14px;margin:10px 0;}
    .muted{color:#666}
    .actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
    .mapWrap{margin-top:10px;border:1px solid #ddd;border-radius:10px;overflow:hidden;background:#fafafa}
    .mapFrame{width:100%;height:220px;border:0;display:block}
    .mapLinks{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}
    .mapLink{display:inline-flex;align-items:center;justify-content:center;min-width:180px;padding:12px 16px;border-radius:12px;border:1px solid #d1d5db;background:#fff;text-decoration:none;color:#1f2937;font-weight:600}
    .mapLink:hover{background:#f8fafc}
    .whatsAppLink{gap:8px}
    .whatsAppIcon{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:999px;background:#25d366;color:#fff;font-size:11px;font-weight:700;line-height:1}
    .commitNotice{margin-top:10px;padding:10px;border:1px solid #f3d9a7;background:#fff8e6;border-radius:10px;color:#5f4a1a;font-size:14px}
    .daysNotice{margin-top:10px;padding:10px;border:1px solid #bfdbfe;background:#eff6ff;border-radius:10px;color:#1e3a8a}
    .slotList{margin:8px 0 0 18px;padding:0}
    .slotList li{margin:2px 0}
    .headerRow{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .statusPill{display:inline-flex;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid #d1d5db;font-size:12px;font-weight:600;background:#fff}
    .statusAccepted{background:#ecfdf5;border-color:#86efac;color:#166534}
    .statusDeciding{background:#fff7ed;border-color:#fdba74;color:#9a3412}
    .statusPending{background:#eff6ff;border-color:#93c5fd;color:#1d4ed8}
    .statusDeclined{background:#fef2f2;border-color:#fca5a5;color:#b91c1c}
    .detailBlock{margin-top:10px;padding:12px;border-radius:12px;background:#f8fafc;border:1px solid #e5e7eb}
    .detailList{margin:8px 0 0 18px;padding:0}
    .detailList li{margin:6px 0;color:#334155}
    .calendarBtn{background:#ecfdf5;border-color:#86efac;color:#166534;font-weight:600;text-decoration:none}
    .fieldList{display:grid;gap:10px;margin-top:10px}
    .fieldItem{display:grid;gap:4px}
    .fieldLabel{font-weight:700;color:#0f172a}
    .fieldValue{color:#334155;line-height:1.5}
    .earningsRow{display:flex;justify-content:flex-end;margin-top:12px}
    .earningsValue{font-weight:700;color:#0f172a}
  </style>
  <script defer src="/static/nav_buttons.js"></script>
</head>
<body>
  <div id="topbar" class="topbar"></div>
  <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
    <h1>Booking requests</h1>
  </div>

  <div id="bookingRequestsList"></div>

  <script src="/static/app.js?v=2"></script>
  <script>
    function escapeHtml(value) {
      return String(value == null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatName(fullName) {
      const parts = String(fullName || "").trim().split(/\s+/).filter(Boolean);
      if (parts.length <= 1) return parts[0] || "";
      const first = parts[0];
      const lastInitial = parts[parts.length - 1][0] || "";
      return `${first} ${lastInitial}.`;
    }

    function responseMeta(status) {
      const key = String(status || "pending").toLowerCase();
      if (key === "accepted") return { label: "Accepted by you", className: "statusAccepted" };
      if (key === "declined") return { label: "Declined by you", className: "statusDeclined" };
      if (key === "deciding") return { label: "Still deciding", className: "statusDeciding" };
      return { label: "Awaiting your response", className: "statusPending" };
    }

    function buildCalendarUrl(item) {
      const start = item.start_dt ? new Date(item.start_dt) : null;
      const end = item.end_dt ? new Date(item.end_dt) : null;
      if (!start || Number.isNaN(start.getTime()) || !end || Number.isNaN(end.getTime())) return "";
      const stamp = (value) => value.toISOString().replace(/[-:]/g, "").replace(/\.\d{3}Z$/, "Z");
      const title = `My Nanny booking #${item.group_id || item.id}`;
      const details = [
        item.parent_name ? `Client: ${item.parent_name}` : "",
        item.location_address ? `Address: ${item.location_address}` : "",
      ].filter(Boolean).join("\n");
      return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&dates=${stamp(start)}/${stamp(end)}&details=${encodeURIComponent(details)}&location=${encodeURIComponent(item.location_address || item.location_label || "")}`;
    }

    function parseBookingQuestionnaire(notes) {
      const parsed = { additionalNotes: "", items: {} };
      String(notes || "")
        .split(/\n+/)
        .map(line => line.trim())
        .filter(Boolean)
        .forEach(line => {
          if (!line.includes(":")) return;
          const idx = line.indexOf(":");
          const rawLabel = line.slice(0, idx).trim();
          const rawValue = line.slice(idx + 1).trim();
          if (!rawLabel) return;
          if (rawLabel.toLowerCase() === "additional notes") {
            parsed.additionalNotes = rawValue;
            return;
          }
          parsed.items[rawLabel.toLowerCase()] = rawValue || "-";
        });
      return parsed;
    }

    function formatBookingSlot(slot) {
      const startDt = slot && slot.start_dt ? new Date(slot.start_dt) : null;
      const endDt = slot && slot.end_dt ? new Date(slot.end_dt) : null;
      if (!startDt || Number.isNaN(startDt.getTime()) || !endDt || Number.isNaN(endDt.getTime())) {
        const fallbackStart = window.formatDateTimeZA ? window.formatDateTimeZA(slot && slot.start_dt) : (slot && slot.start_dt) || "-";
        const fallbackEnd = window.formatDateTimeZA ? window.formatDateTimeZA(slot && slot.end_dt) : (slot && slot.end_dt) || "-";
        return `${fallbackStart} to ${fallbackEnd}`;
      }
      const dateLabel = new Intl.DateTimeFormat("en-ZA", {
        day: "numeric",
        month: "long",
        year: "numeric",
        timeZone: "Africa/Johannesburg",
      }).format(startDt);
      const timeFmt = new Intl.DateTimeFormat("en-ZA", {
        hour: "numeric",
        minute: "2-digit",
        hour12: false,
        timeZone: "Africa/Johannesburg",
      });
      return `${dateLabel}: ${timeFmt.format(startDt)} - ${timeFmt.format(endDt)}`;
    }

    function buildExpectationFields(notes) {
      const questionnaire = parseBookingQuestionnaire(notes);
      const items = questionnaire.items || {};
      const fields = [
        ["Age of the child(ren)", items["age of the child(ren)"] || "-"],
        ["Number of child(ren)", items["children present"] || items["number of child(ren)"] || "1"],
        ["Allergies of Child(ren)", items["allergies of child(ren)"] || "-"],
        ["Special needs/disabilities of child(ren)", items["special needs/disabilities of child(ren)"] || "-"],
        ["Will another adult be present", items["adult present at address"] || "-"],
        ["Should the nanny bring her own food", items["meal arrangement"] || "-"],
        ["Dogs at the home", items["dogs at home"] || "None provided"],
        ["House upkeep expectation", items["house upkeep disclaimer understood"] || "-"],
        ["Nanny responsibilities", items["nanny responsibilities"] || "-"],
        ["Sleepover expectations", items["sleepover expectations"] || "-"],
        ["Sleepover reason", items["sleepover reason"] || "-"],
        ["Reason for booking", items["reason for booking"] || "-"],
      ];
      return fields.map(([label, value]) => `
        <div class="fieldItem">
          <div class="fieldLabel">${escapeHtml(label)}:</div>
          <div class="fieldValue">${escapeHtml(value || "-")}</div>
        </div>
      `).join("");
    }

    function formatCurrencyZar(cents) {
      const value = Number(cents || 0) / 100;
      return new Intl.NumberFormat("en-ZA", {
        style: "currency",
        currency: "ZAR",
        minimumFractionDigits: 2,
      }).format(value);
    }

    function normalizeWhatsAppNumber(value) {
      const raw = String(value || "").trim();
      if (!raw) return "";
      const digits = raw.replace(/[^\d+]/g, "");
      if (digits.startsWith("+")) return digits.slice(1);
      if (digits.startsWith("00")) return digits.slice(2);
      if (digits.startsWith("0")) return `27${digits.slice(1)}`;
      return digits;
    }

    function buildWhatsAppUrl(phone, name) {
      const normalized = normalizeWhatsAppNumber(phone);
      if (!normalized) return "";
      const message = name
        ? `Hi ${name}, this is your booked nanny contacting you via My Nanny.`
        : "Hi, this is your booked nanny contacting you via My Nanny.";
      return `https://wa.me/${encodeURIComponent(normalized)}?text=${encodeURIComponent(message)}`;
    }

    async function loadBookingRequests() {
      const params = new URLSearchParams(window.location.search);
      const requestedId = String(params.get("request_id") || "").trim();
      const endpoint = requestedId
        ? "/nannies/me/booking-requests?include_accepted=true"
        : "/nannies/me/booking-requests";
      const data = await fetchJson(endpoint);
      const list = document.getElementById("bookingRequestsList");
      list.innerHTML = "";
      const rawItems = data.results || [];
      const items = requestedId
        ? rawItems.filter((item) => String(item.id || "") === requestedId || String(item.group_id || "") === requestedId)
        : rawItems;
      if (!items.length) {
        list.innerHTML = requestedId
          ? "<div class=\"muted\">That booking could not be found.</div>"
          : "<div class=\"muted\">No booking requests yet.</div>";
        return;
      }
      items.forEach(r => {
        const start = window.formatDateTimeZA ? window.formatDateTimeZA(r.start_dt) : (r.start_dt || "-");
        const end = window.formatDateTimeZA ? window.formatDateTimeZA(r.end_dt) : (r.end_dt || "-");
        const endMs = r.end_dt ? new Date(r.end_dt).getTime() : NaN;
        const isPastBooking = Number.isFinite(endMs) && endMs < Date.now();
        const slots = Array.isArray(r.slots) ? r.slots : [];
        const slotItems = slots.length
          ? slots.map(s => `<li>${escapeHtml(formatBookingSlot(s))}</li>`).join("")
          : `<li>${escapeHtml(`${start} to ${end}`)}</li>`;
        const loc = (r.location_label && r.location_address)
          ? `${r.location_label} - ${r.location_address}`
          : (r.location_label || r.location_address || "-");
        const parentName = formatName(r.parent_name || "Parent");
        const jobId = r.group_id || r.id;
        const lat = Number(r.location_lat);
        const lng = Number(r.location_lng);
        const hasCoords = Number.isFinite(lat) && Number.isFinite(lng);
        const bboxDelta = 0.02;
        const mapSrc = hasCoords
          ? `https://www.openstreetmap.org/export/embed.html?bbox=${lng - bboxDelta}%2C${lat - bboxDelta}%2C${lng + bboxDelta}%2C${lat + bboxDelta}&layer=mapnik&marker=${lat}%2C${lng}`
          : "";
        const googleMapsUrl = hasCoords
          ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(`${lat},${lng}`)}`
          : "";
        const boltDeepLink = hasCoords
          ? `bolt://ride?dropoff_latitude=${encodeURIComponent(String(lat))}&dropoff_longitude=${encodeURIComponent(String(lng))}`
          : "";
        const boltFallbackUrl = hasCoords
          ? `https://bolt.eu/?destination=${encodeURIComponent(`${lat},${lng}`)}`
          : "";
        const response = responseMeta(r.nanny_response_status);
        const expectationFieldsHtml = buildExpectationFields(r.notes);
        const currentResponse = String(r.nanny_response_status || "pending").toLowerCase();
        const canRespond = ["tbc", "pending_admin", "approved"].includes(String(r.status || "").toLowerCase()) && !["accepted", "declined"].includes(currentResponse);
        const accepted = currentResponse === "accepted";
        const whatsappUrl = accepted ? buildWhatsAppUrl(r.parent_phone, r.parent_name) : "";
        const calendarUrl = buildCalendarUrl(r);
        const earningsHtml = accepted && Number(r.wage_cents || 0) > 0
          ? `<div class="earningsRow"><div class="earningsValue">Total earnings after agency booking fee: ${escapeHtml(formatCurrencyZar(r.wage_cents))}</div></div>`
          : "";
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div class="headerRow">
            <div>
              <div><strong>Client name:</strong> ${escapeHtml(parentName || "Parent")}</div>
              <div class="muted"><strong>Booking dates:</strong></div>
              <ul class="slotList">${slotItems}</ul>
              ${isPastBooking ? "" : `<div class="muted"><strong>Booking address:</strong> ${escapeHtml(loc)}</div>`}
            </div>
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end;">
              ${accepted && calendarUrl ? `<a class="btn calendarBtn" href="${calendarUrl}" target="_blank" rel="noopener noreferrer">Add to my calendar</a>` : ""}
              <span class="statusPill ${response.className}">${escapeHtml(response.label)}</span>
            </div>
          </div>
          ${isPastBooking ? "" : (hasCoords ? `<div class="mapWrap"><iframe class="mapFrame" loading="lazy" referrerpolicy="no-referrer-when-downgrade" src="${mapSrc}" title="Client location map for job ${jobId}"></iframe></div><div class="mapLinks"><a class="mapLink" href="${googleMapsUrl}" target="_blank" rel="noopener noreferrer">Open in Google Maps</a><a class="mapLink boltLink" href="${boltDeepLink}" data-bolt-fallback="${boltFallbackUrl}" rel="noopener noreferrer">Ride with Bolt</a>${whatsappUrl ? `<a class="mapLink whatsAppLink" href="${whatsappUrl}" target="_blank" rel="noopener noreferrer"><span class="whatsAppIcon">W</span><span>WhatsApp</span></a>` : ""}</div>` : `<div class="muted" style="margin-top:6px;">Map unavailable for this request.</div>`)}
          <div class="detailBlock">
            <strong>Booking details and Client expectations</strong>
            <div class="fieldList">${expectationFieldsHtml}</div>
          </div>
          <div class="muted" style="margin-top:10px;">Request status: ${escapeHtml(r.status || "-")}</div>
          ${r.nanny_responded_at ? `<div class="muted">Last updated by you: ${escapeHtml(window.formatDateTimeZA ? window.formatDateTimeZA(r.nanny_responded_at) : r.nanny_responded_at)}</div>` : ""}
          ${r.nanny_response_note ? `<div class="muted">Your note: ${escapeHtml(r.nanny_response_note)}</div>` : ""}
          ${earningsHtml}
          ${canRespond ? `<div class="commitNotice">Accept once you are ready to commit to this job. If you are not ready yet, you can mark it as still deciding, or decline it with a reason so admin can follow up quickly.</div><div class="actions"><button class="btn acceptBtn" data-id="${r.id}">Accept this booking</button><button class="btn decideBtn" data-id="${r.id}" data-response="deciding">Still deciding</button><button class="btn declineBtn" data-id="${r.id}" data-response="declined">Decline</button></div>` : ""}
        `;
        list.appendChild(card);
      });
      list.querySelectorAll(".boltLink").forEach(link => {
        link.addEventListener("click", (e) => {
          e.preventDefault();
          const deep = link.getAttribute("href");
          const fallback = link.dataset.boltFallback;
          if (deep) {
            window.location.href = deep;
          }
          if (fallback) {
            setTimeout(() => {
              window.open(fallback, "_blank", "noopener,noreferrer");
            }, 700);
          }
        });
      });
      list.querySelectorAll(".acceptBtn").forEach(btn => {
        btn.addEventListener("click", async () => {
          const ok = window.confirm("Accept this booking? By continuing, you commit to arriving at the listed address on time. Repeated no-shows may result in poor reviews and account suspension.");
          if (!ok) return;
          btn.disabled = true;
          try {
            await fetchJson(`/nannies/me/booking-requests/${btn.dataset.id}/accept`, { method: "POST" });
            loadBookingRequests().catch(() => {});
          } catch (e) {
            btn.disabled = false;
            alert(e.message || "Failed to accept booking");
          }
        });
      });
      list.querySelectorAll(".decideBtn, .declineBtn").forEach(btn => {
        btn.addEventListener("click", async () => {
          const response = btn.dataset.response;
          const reason = response === "declined"
            ? (prompt("Why are you declining this booking?") || "").trim()
            : (prompt("Add an optional note for admin and the client, or leave blank.") || "").trim();
          if (response === "declined" && !reason) {
            alert("Please add a short reason so admin can follow up.");
            return;
          }
          btn.disabled = true;
          try {
            await fetchJson(`/nannies/me/booking-requests/${btn.dataset.id}/respond`, {
              method: "POST",
              body: JSON.stringify({ response, reason: reason || null }),
            });
            if (response === "declined" && window.location.search.includes("request_id=")) {
              window.location.href = "/static/nanny_requests.html";
              return;
            }
            loadBookingRequests().catch(() => {});
          } catch (e) {
            btn.disabled = false;
            alert(e.message || "Failed to update booking request");
          }
        });
      });
    }

    (async () => {
      const me = await requireMe();
      if (me.role !== "nanny") {
        location.href = "/static/login.html";
        return;
      }
      loadBookingRequests().catch(() => {});
    })();
  </script>
</body>
</html>
