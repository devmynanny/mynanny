<!doctype html>
<html>
<head>
  <link rel="stylesheet" href="/static/theme.css" />
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Nanny Booking History</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0 auto;padding:24px;max-width:900px}
    .topbar{display:flex;align-items:center;justify-content:space-between;margin: 10px 0 20px 0;}
    .btn{padding:10px 14px;border-radius:10px;border:1px solid #ccc;background:#fff;cursor:pointer}
    .card{border:1px solid #ddd;border-radius:12px;padding:12px;margin:10px 0;}
    .muted{color:#666}
    .actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
    .statusLine{margin-top:8px}
  </style>
  <script defer src="/static/nav_buttons.js"></script>
</head>
<body>
  <div id="topbar" class="topbar"></div>
  <h1>Booking history</h1>

  <div id="bookingHistoryList"></div>

  <script src="/static/app.js?v=2"></script>
  <script>
    function formatName(fullName) {
      const parts = String(fullName || "").trim().split(/\s+/).filter(Boolean);
      if (parts.length <= 1) return parts[0] || "";
      const first = parts[0];
      const lastInitial = parts[parts.length - 1][0] || "";
      return `${first} ${lastInitial}.`;
    }

    function escapeHtml(value) {
      return String(value == null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function responseMeta(status) {
      const key = String(status || "pending").toLowerCase();
      if (key === "accepted") return "Accepted";
      if (key === "declined") return "Declined";
      if (key === "deciding") return "Still deciding";
      return "Awaiting response";
    }

    function bookingSlotIsPast(slot, nowMs) {
      const status = String(slot?.status || "").toLowerCase();
      if (["completed", "cancelled", "rejected"].includes(status)) return true;
      if (slot?.check_out_at) return true;
      const endMs = slot?.end_dt ? new Date(slot.end_dt).getTime() : NaN;
      return Number.isFinite(endMs) && endMs < nowMs;
    }

    function bookingGroupStatus(item, nowMs) {
      const slots = Array.isArray(item?.slots) && item.slots.length ? item.slots : [];
      if (!slots.length) return String(item?.status || "-");
      const statuses = slots.map((slot) => String(slot?.status || "").toLowerCase());
      if (slots.every((slot) => bookingSlotIsPast(slot, nowMs))) {
        if (statuses.every((status) => status === "completed") || slots.some((slot) => slot?.check_out_at)) return "completed";
        if (statuses.every((status) => status === "cancelled")) return "cancelled";
        if (statuses.every((status) => status === "rejected")) return "rejected";
      }
      return String(item?.status || "-");
    }

    async function loadBookingHistory() {
      const [bookingData, requestData] = await Promise.all([
        fetchJson("/nannies/me/bookings").catch(() => ({ results: [] })),
        fetchJson("/nannies/me/booking-requests").catch(() => ({ results: [] })),
      ]);
      const list = document.getElementById("bookingHistoryList");
      list.innerHTML = "";
      const now = Date.now();
      const bookingItems = (bookingData.results || []).filter((r) => {
        const slots = Array.isArray(r?.slots) && r.slots.length ? r.slots : [];
        return slots.length && slots.every((slot) => bookingSlotIsPast(slot, now));
      }).map((r) => ({
        type: "booking",
        id: r.id,
        detail_id: r.request_id || r.id,
        job_id: r.group_id || r.request_id || r.id,
        parent_name: r.parent_name,
        start_dt: r.start_dt,
        end_dt: r.end_dt,
        response_status: r.nanny_response_status || "accepted",
        booking_status: bookingGroupStatus(r, now),
      }));
      const requestItems = (requestData.results || []).filter((r) => {
        const response = String(r.nanny_response_status || "").toLowerCase();
        const endMs = r.end_dt ? new Date(r.end_dt).getTime() : NaN;
        return ["accepted", "declined", "deciding"].includes(response) && Number.isFinite(endMs) && endMs < now;
      }).map((r) => ({
        type: "request",
        id: r.id,
        detail_id: r.id,
        job_id: r.group_id || r.id,
        parent_name: r.parent_name,
        start_dt: r.start_dt,
        end_dt: r.end_dt,
        response_status: r.nanny_response_status,
        booking_status: r.status,
      }));
      const items = [...bookingItems, ...requestItems]
        .sort((a, b) => String(b.end_dt || "").localeCompare(String(a.end_dt || "")));
      if (!items.length) {
        list.innerHTML = "<div class=\"muted\">No historical bookings yet.</div>";
        return;
      }
      items.forEach(r => {
        const start = window.formatDateTimeZA ? window.formatDateTimeZA(r.start_dt) : (r.start_dt || "-");
        const end = window.formatDateTimeZA ? window.formatDateTimeZA(r.end_dt) : (r.end_dt || "-");
        const parentName = formatName(r.parent_name || "Parent");
        const jobId = r.job_id || r.id;
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div><strong>${escapeHtml(parentName || "Parent")}</strong></div>
          <div class="muted">Job ID: ${escapeHtml(jobId)}</div>
          <div class="muted">${escapeHtml(start)} to ${escapeHtml(end)}</div>
          <div class="muted statusLine">Your response: ${escapeHtml(responseMeta(r.response_status))}</div>
          <div class="muted">Booking status: ${escapeHtml(r.booking_status || "-")}</div>
          <div class="actions">
            ${r.detail_id ? `<button class="btn viewHistoryBookingBtn" data-id="${escapeHtml(r.detail_id || "")}" type="button">View details</button>` : ""}
          </div>
        `;
        list.appendChild(card);
      });
      list.querySelectorAll(".viewHistoryBookingBtn").forEach(btn => {
        btn.addEventListener("click", () => {
          const id = btn.dataset.id || "";
          location.href = id ? `/static/nanny_requests.html?request_id=${encodeURIComponent(id)}` : "/static/nanny_requests.html";
        });
      });
    }

    (async () => {
      const me = await requireMe();
      if (me.role !== "nanny") {
        location.href = "/static/login.html";
        return;
      }
      loadBookingHistory().catch(() => {});
    })();
  </script>
</body>
</html>
