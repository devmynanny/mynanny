<!doctype html>
<html>
<head>
  <link rel="stylesheet" href="/static/theme.css" />
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>My Bookings & Calendar</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0 auto;padding:24px;max-width:1120px}
    .topbar{display:flex;align-items:center;justify-content:space-between;margin: 10px 0 20px 0;}
    .btn{padding:10px 14px;border-radius:10px;border:1px solid #ccc;background:#fff;cursor:pointer}
    .card{border:1px solid #ddd;border-radius:12px;padding:12px;margin:10px 0;cursor:pointer}
    .muted{color:#666}
    .actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
    .card button{font-size:14px}
    .job-details{margin-top:10px;padding-top:10px;border-top:1px solid #eee;display:none}
    .pill{display:inline-block;padding:3px 8px;border-radius:999px;border:1px solid #ddd;font-size:12px;margin-right:6px}
    .detailSection{margin-top:12px;padding:12px;border:1px solid #e5e7eb;border-radius:12px;background:#f8fafc}
    .detailSection h3{margin:0 0 10px 0;font-size:16px}
    .detailGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
    .field{display:flex;flex-direction:column;gap:6px}
    .field input,.field textarea,.field select{padding:10px 12px;border:1px solid #d1d5db;border-radius:10px;font:inherit}
    .checkboxRow{display:flex;align-items:center;gap:8px}
    .previewList{margin:8px 0 0 18px;padding:0}
    .previewList li{margin:5px 0}
    .lockNote{margin-top:10px;padding:10px;border:1px solid #f3d9a7;background:#fff8e6;border-radius:10px;color:#5f4a1a}
    .sectionTitle{margin:20px 0 8px 0;font-size:24px}
    .profilePanel{margin-top:10px;padding:12px;border:1px solid #dbeafe;border-radius:12px;background:#eff6ff}
    .summaryText{margin-top:8px;color:#334155}
    .bookingGlance{display:grid;grid-template-columns:minmax(300px,0.95fr) minmax(420px,1.35fr);gap:18px;align-items:start}
    .bookingStack{display:grid;gap:16px}
    .bookingPanel{border:1px solid #e5e7eb;border-radius:12px;padding:14px;background:#f8fafc}
    .bookingPanelTitle{margin:0 0 10px;font-size:20px}
    .bookingPanelList{display:grid;gap:10px}
    .bookingCard{border:1px solid #e5e7eb;border-radius:10px;padding:12px;background:#fff}
    .bookingCardTitle{font-weight:700}
    .bookingCardMeta{color:#666;font-size:14px;margin-top:4px}
    .bookingCardNote{color:#334155;font-size:13px;margin-top:8px}
    .bookingStatusBadge{display:inline-flex;align-items:center;padding:5px 10px;border-radius:999px;border:1px solid #9fd0f2;background:#eef7ff;color:#1f5f8b;font-size:12px;font-weight:700;margin-top:8px}
    .calendarWrap{border:1px solid #e5e7eb;border-radius:12px;padding:14px;background:#fff}
    .monthNav{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}
    .monthLabel{font-weight:700;font-size:18px}
    .monthCalendar{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px}
    .calendarHead{font-size:12px;color:#666;font-weight:600;text-align:center}
    .calendarDay{min-height:96px;border:1px solid #e5e5e5;border-radius:8px;padding:6px;background:#fff;overflow:hidden}
    .calendarDayNumber{font-size:12px;color:#555;margin-bottom:4px}
    .calendarBooking{font-size:12px;line-height:1.25;border-left:3px solid #1f7a4d;padding-left:5px;margin-top:4px;white-space:normal;overflow-wrap:anywhere}
    .calendarMore{font-size:12px;color:#666;margin-top:4px}
    .calendarFilterBar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin:10px 0 14px;padding:12px 14px;border:1px solid #bfdbfe;border-radius:12px;background:#eff6ff}
    .calendarFilterLabel{font-weight:700;color:#1e3a8a}
    .calendarFilterBar select{min-width:220px;padding:10px 12px;border:1px solid #93c5fd;border-radius:10px;background:#fff;font:inherit}
    .avatar{width:64px;height:64px;border-radius:12px;object-fit:cover;background:#f3f4f6;border:1px solid #ddd;display:flex;align-items:center;justify-content:center;font-weight:600;color:#6b7280}
    .previewModal{background:#fff;border-radius:12px;width:min(640px,100%);border:1px solid #ddd;padding:18px;position:relative}
    .previewHeader{display:flex;gap:12px;align-items:center}
    .previewTitle{font-weight:700;font-size:20px}
    .previewSection{margin-top:12px}
    .previewSectionTitle{font-weight:600;margin-bottom:6px}
    .previewSectionToggle{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:0;border:none;background:transparent;cursor:pointer;font:inherit;text-align:left}
    .previewChevron{font-size:16px;color:#666;transition:transform .18s ease}
    .previewChevron.open{transform:rotate(180deg)}
    .previewSectionBody.collapsed{display:none}
    .trustPills{display:flex;flex-wrap:wrap;gap:8px}
    .trustPill{display:inline-block;padding:4px 8px;border-radius:999px;border:1px solid #ddd;font-size:12px}
    .infoGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px 12px}
    .infoItem{font-size:14px;color:#444}
    .infoItem strong{color:#1f2937}
    .workList{display:grid;gap:8px}
    .workItem{border:1px solid #e5e7eb;border-radius:10px;padding:8px}
    .workRole{font-weight:600}
    .workMeta{font-size:13px;color:#555}
    .modalBack{position:fixed;inset:0;background:rgba(0,0,0,0.35);display:none;align-items:center;justify-content:center;padding:20px;z-index:9999}
    .summaryText{margin-top:10px;line-height:1.45;color:#374151}
    .previewPills .pill{margin:6px 6px 0 0}
    @media (max-width:760px){
      .bookingGlance{grid-template-columns:1fr}
      .monthNav{flex-wrap:wrap}
      .calendarDay{min-height:84px}
    }
  </style>
  <script defer src="/static/nav_buttons.js"></script>
</head>
<body>
  <div id="topbar" class="topbar"></div>
  <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
    <h1>My Bookings &amp; Calendar</h1>
    <button class="btn back-btn" id="backBtn" type="button">Back to home</button>
  </div>

  <div class="card">
    <div style="margin-bottom:12px;">
      <div style="font-size:22px;font-weight:700;">Your calendar</div>
      <div class="muted">Your current work schedule, including bookings in progress and upcoming bookings.</div>
    </div>
    <div class="calendarFilterBar">
      <label class="calendarFilterLabel" for="statusFilter">Filter bookings</label>
      <select id="statusFilter">
        <option value="all">All</option>
        <option value="upcoming">Upcoming bookings</option>
        <option value="in_progress">In progress</option>
        <option value="past">Past bookings</option>
        <option value="cancelled">Cancelations</option>
      </select>
    </div>
    <div class="bookingGlance">
      <div class="bookingStack">
        <div class="bookingPanel">
          <h3 class="bookingPanelTitle">Bookings in progress</h3>
          <div id="inProgressBookings" class="bookingPanelList">
            <div class="muted">Loading bookings...</div>
          </div>
        </div>
        <div class="bookingPanel">
          <h3 class="bookingPanelTitle">Upcoming bookings</h3>
          <div id="upcomingBookings" class="bookingPanelList">
            <div class="muted">Loading bookings...</div>
          </div>
        </div>
      </div>
      <div class="calendarWrap">
        <div class="monthNav">
          <button class="btn" id="calendarPrevBtn" type="button">Previous</button>
          <div id="calendarMonthLabel" class="monthLabel">Loading...</div>
          <button class="btn" id="calendarNextBtn" type="button">Next</button>
        </div>
        <div id="parentBookingsCalendar"></div>
      </div>
    </div>
  </div>

  <div id="jobsList"></div>

  <div id="previewModal" class="modalBack">
    <div class="previewModal">
      <div class="previewHeader">
        <div id="previewAvatar" class="avatar"></div>
        <div>
          <div id="previewName" class="previewTitle"></div>
          <div id="previewMeta" class="muted"></div>
        </div>
      </div>
      <div id="previewBio" style="margin-top:12px"></div>
      <div class="previewSection">
        <div class="previewSectionTitle">Trust and verification</div>
        <div id="previewTrust" class="trustPills"></div>
      </div>
      <div class="previewSection">
        <div class="previewSectionTitle">Profile details</div>
        <div id="previewDetails" class="infoGrid"></div>
      </div>
      <div class="previewSection">
        <button id="previewWorkHistoryToggle" class="previewSectionToggle" type="button" aria-expanded="false" aria-controls="previewWorkHistoryWrap">
          <span class="previewSectionTitle">Work history</span>
          <span id="previewWorkHistoryChevron" class="previewChevron">&#9662;</span>
        </button>
        <div id="previewWorkHistoryWrap" class="previewSectionBody collapsed">
          <div id="previewWorkHistory" class="workList muted"></div>
        </div>
      </div>
      <div class="previewSection">
        <div class="previewSectionTitle">Proficiencies</div>
        <div id="previewProficiencies" class="previewPills"></div>
      </div>
      <div style="margin-top:16px; display:flex; justify-content:flex-end; gap:8px; flex-wrap:wrap;">
        <button class="btn secondary" id="closePreviewBtn" type="button">Close</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js?v=2"></script>
  <script>
    let cancellationWindowHours = 15;
    let currentCalendarMonth = null;
    let parentBookingsCache = [];
    let previewNanny = null;

    function escapeHtml(value) {
      return String(value == null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function mapStatus(status) {
      if (status === "approved") return "Accepted";
      if (status === "tbc" || status === "pending_admin") return "Requested";
      return status || "-";
    }

    function formatName(fullName) {
      const parts = String(fullName || "").trim().split(/\s+/).filter(Boolean);
      if (parts.length <= 1) return parts[0] || "";
      const first = parts[0];
      const lastInitial = parts[parts.length - 1][0] || "";
      return `${first} ${lastInitial}.`;
    }

    function yesNo(value) {
      return value ? "Yes" : "No";
    }

    function sanitizePhone(value) {
      return String(value || "").replace(/[^\d+]/g, "");
    }

    function toWhatsappUrl(phone) {
      const cleaned = sanitizePhone(phone).replace(/^\+/, "");
      return cleaned ? `https://wa.me/${cleaned}` : "";
    }

    function toTelUrl(phone) {
      const cleaned = sanitizePhone(phone);
      return cleaned ? `tel:${cleaned}` : "";
    }

    function toDateTimeInputValue(value) {
      if (!value) return "";
      let raw = value;
      if (typeof raw === "string" && !/[zZ]|[+-]\d{2}:?\d{2}$/.test(raw)) raw = raw.replace(" ", "T") + "+02:00";
      const date = new Date(raw);
      if (Number.isNaN(date.getTime())) return "";
      return new Date(date.getTime() + (2 * 60 * 60 * 1000)).toISOString().slice(0, 16);
    }

    function toIsoFromDateTimeInput(value) {
      if (!value || !value.includes("T")) return null;
      const [date, time] = value.split("T");
      return window.toIsoFromZA ? window.toIsoFromZA(date, time) : new Date(`${value}:00+02:00`).toISOString();
    }

    function formatDayDateLabel(value) {
      const dt = value ? new Date(value) : null;
      if (!dt || Number.isNaN(dt.getTime())) return "-";
      return new Intl.DateTimeFormat("en-ZA", {
        day: "numeric",
        month: "long",
        year: "numeric",
        timeZone: "Africa/Johannesburg",
      }).format(dt);
    }

    function formatCompactTimeRange(startValue, endValue) {
      const start = startValue ? new Date(startValue) : null;
      const end = endValue ? new Date(endValue) : null;
      if (!start || Number.isNaN(start.getTime()) || !end || Number.isNaN(end.getTime())) return "-";
      const fmt = new Intl.DateTimeFormat("en-ZA", {
        hour: "numeric",
        hour12: true,
        timeZone: "Africa/Johannesburg",
      });
      const normalize = (value) => fmt.format(value).replace(/\s/g, "").toLowerCase().replace(":00", "");
      return `${normalize(start)}-${normalize(end)}`;
    }

    function formatShortBookingDate(value) {
      const dt = value ? new Date(value) : null;
      if (!dt || Number.isNaN(dt.getTime())) return "-";
      const parts = new Intl.DateTimeFormat("en-ZA", {
        day: "numeric",
        month: "long",
        year: "2-digit",
        timeZone: "Africa/Johannesburg",
      }).formatToParts(dt);
      const day = parts.find((part) => part.type === "day")?.value || "";
      const month = parts.find((part) => part.type === "month")?.value || "";
      const year = parts.find((part) => part.type === "year")?.value || "";
      return `${day} ${month} '${year}`;
    }

    function formatBookingDateTimeRange(startValue, endValue) {
      if (!startValue || !endValue) return "-";
      const startDate = formatShortBookingDate(startValue);
      const endDate = formatShortBookingDate(endValue);
      const timeRange = formatCompactTimeRange(startValue, endValue).replace(/am/g, "").replace(/pm/g, "").trim();
      return `${startDate} - ${endDate}: ${timeRange}`;
    }

    function toLocalDateParts(date) {
      const formatter = new Intl.DateTimeFormat("en-CA", {
        timeZone: "Africa/Johannesburg",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
      });
      const parts = formatter.formatToParts(date);
      const year = parts.find((part) => part.type === "year")?.value;
      const month = parts.find((part) => part.type === "month")?.value;
      const day = parts.find((part) => part.type === "day")?.value;
      return { year: Number(year), month: Number(month), day: Number(day) };
    }

    function toLocalDateKey(value) {
      const dt = value ? new Date(value) : null;
      if (!dt || Number.isNaN(dt.getTime())) return "";
      const parts = toLocalDateParts(dt);
      return `${parts.year}-${String(parts.month).padStart(2, "0")}-${String(parts.day).padStart(2, "0")}`;
    }

    function todayLocalDateKey() {
      return toLocalDateKey(new Date().toISOString());
    }

    function toLocalDateInputValue(value) {
      const dt = value ? new Date(value) : null;
      if (!dt || Number.isNaN(dt.getTime())) return "";
      const parts = toLocalDateParts(dt);
      return `${parts.year}-${String(parts.month).padStart(2, "0")}-${String(parts.day).padStart(2, "0")}`;
    }

    function toLocalTimeInputValue(value) {
      const dt = value ? new Date(value) : null;
      if (!dt || Number.isNaN(dt.getTime())) return "08:00";
      return new Intl.DateTimeFormat("en-GB", {
        hour: "2-digit",
        minute: "2-digit",
        hour12: false,
        timeZone: "Africa/Johannesburg",
      }).format(dt);
    }

    function findTodayBookingDay(item) {
      const bookingDays = Array.isArray(item?.booking_days) ? item.booking_days : [];
      const todayKey = todayLocalDateKey();
      return bookingDays.find((day) => toLocalDateKey(day?.start_dt) === todayKey) || null;
    }

    function renderConfirmationButtons(item, todayDay, compact = false) {
      if (!todayDay) return "";
      const pieces = [];
      if (todayDay.check_in_at && !todayDay.check_in_confirmed_at) {
        pieces.push(`<button class="btn confirmTimeBtn" type="button" data-booking-id="${escapeHtml(todayDay.booking_id || "")}" data-kind="check-in" data-start-dt="${escapeHtml(todayDay.start_dt || "")}" data-current-time="${escapeHtml(todayDay.check_in_at || "")}">Confirm arrival</button>`);
      }
      if (todayDay.check_out_at && !todayDay.check_out_confirmed_at) {
        pieces.push(`<button class="btn confirmTimeBtn" type="button" data-booking-id="${escapeHtml(todayDay.booking_id || "")}" data-kind="check-out" data-start-dt="${escapeHtml(todayDay.start_dt || "")}" data-current-time="${escapeHtml(todayDay.check_out_at || "")}">Confirm completion</button>`);
      }
      if (!pieces.length) {
        if (todayDay.check_out_confirmed_at) {
          return compact ? `<div class="bookingCardNote">Today's arrival and completion have been confirmed.</div>` : "";
        }
        if (todayDay.check_in_confirmed_at) {
          return compact ? `<div class="bookingCardNote">Today's arrival has been confirmed.</div>` : "";
        }
        return "";
      }
      return pieces.join("");
    }

    async function handleParentTimeConfirmation(btn) {
      const bookingId = btn?.dataset?.bookingId || "";
      const kind = btn?.dataset?.kind || "";
      const startDt = btn?.dataset?.startDt || "";
      const currentTime = btn?.dataset?.currentTime || "";
      if (!bookingId || !kind || !currentTime) return;
      const noun = kind === "check-in" ? "arrival" : "completion";
      const confirmed = window.confirm(`Please confirm the nanny's ${noun} time.\n\nClick OK if ${formatDateTimeZA(currentTime)} is correct.\nClick Cancel to capture the correct time.`);
      let correctedTime = null;
      if (!confirmed) {
        const entered = (window.prompt(`Enter the correct ${noun} time in HH:MM format`, toLocalTimeInputValue(currentTime)) || "").trim();
        if (!entered) return;
        if (!/^\d{2}:\d{2}$/.test(entered)) {
          alert("Please enter the time in HH:MM format, for example 06:00.");
          return;
        }
        const localDate = toLocalDateInputValue(startDt || currentTime);
        correctedTime = window.toIsoFromZA ? window.toIsoFromZA(localDate, entered) : new Date(`${localDate}T${entered}:00+02:00`).toISOString();
      }
      btn.disabled = true;
      try {
        await fetchJson(`/parents/me/bookings/${encodeURIComponent(bookingId)}/confirm-${kind}`, {
          method: "POST",
          body: JSON.stringify({
            confirmed,
            corrected_time: correctedTime,
          }),
        });
        await loadJobs();
      } catch (error) {
        alert(error.message || `Failed to confirm ${noun} time`);
      } finally {
        btn.disabled = false;
      }
    }

    function bookingDisplayName(item) {
      return item?.accepted_nanny_name || (String(item?.status || "").toLowerCase() === "approved" ? "Confirmed nanny" : "Requested booking");
    }

    function bookingColorForKey(key) {
      const palette = [
        { border: "#f4a261", background: "#fff1e6" },
        { border: "#7db7ff", background: "#eaf3ff" },
        { border: "#8ecf97", background: "#edf9ef" },
        { border: "#c89df2", background: "#f5edff" },
        { border: "#f6c85f", background: "#fff8e1" },
        { border: "#73c6c6", background: "#e8f8f8" },
      ];
      const raw = String(key || "");
      let hash = 0;
      for (let i = 0; i < raw.length; i += 1) hash = (hash * 31 + raw.charCodeAt(i)) >>> 0;
      return palette[hash % palette.length];
    }

    function renderDashboardPanel(containerId, items, emptyText) {
      const container = document.getElementById(containerId);
      if (!container) return;
      const list = Array.isArray(items) ? items : [];
      if (!list.length) {
        container.innerHTML = `<div class="muted">${escapeHtml(emptyText)}</div>`;
        return;
      }
      container.innerHTML = list.map((item) => {
        const todayDay = findTodayBookingDay(item);
        return `
        <div class="bookingCard">
          <div class="bookingCardTitle">${item.accepted_nanny_name ? `<strong>Nanny:</strong> ${escapeHtml(item.accepted_nanny_name)}` : escapeHtml(bookingDisplayName(item))}</div>
          <div class="bookingCardMeta">${item.accepted_nanny_name ? `Accepted booking` : `Job ID: ${escapeHtml(item.job_id || "-")}`}</div>
          <div class="bookingStatusBadge">Job status: ${escapeHtml(mapStatus(item.status || "-"))}</div>
          <div class="bookingCardMeta">${escapeHtml(formatBookingDateTimeRange(item.start_dt, item.end_dt))}</div>
          ${todayDay ? `<div class="bookingCardNote">Today's booking day: ${escapeHtml(formatBookingDateTimeRange(todayDay.start_dt, todayDay.end_dt))}</div>` : ""}
          <div class="actions">
            <button class="btn dashboardViewBtn" type="button" data-id="${escapeHtml(item.job_id || "")}">View details</button>
            ${item.accepted_nanny_id ? `<button class="btn dashboardViewProfileBtn" type="button" data-job-id="${escapeHtml(item.job_id || "")}" data-nanny-id="${escapeHtml(item.accepted_nanny_id || "")}">View profile</button>` : ""}
            ${renderConfirmationButtons(item, todayDay)}
          </div>
        </div>
      `;
      }).join("");
      container.querySelectorAll(".dashboardViewBtn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const card = document.querySelector(`.cancelBtn[data-id="${btn.dataset.id}"]`)?.closest(".card")
            || document.querySelector(`.editJobBtn[data-id="${btn.dataset.id}"]`)?.closest(".card");
          if (card) {
            openJobDetails(card);
            card.scrollIntoView({ behavior: "smooth", block: "start" });
          }
        });
      });
      container.querySelectorAll(".dashboardViewProfileBtn").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const jobId = btn.dataset.jobId || "";
          const nannyId = btn.dataset.nannyId || "";
          const card = document.querySelector(`.cancelBtn[data-id="${jobId}"]`)?.closest(".card")
            || document.querySelector(`.editJobBtn[data-id="${jobId}"]`)?.closest(".card")
            || document.querySelector(`.viewNannyProfileBtn[data-id="${nannyId}"]`)?.closest(".card");
          if (card) {
            openJobDetails(card);
            card.scrollIntoView({ behavior: "smooth", block: "start" });
            const profileBtn = card.querySelector(`.viewNannyProfileBtn[data-id="${nannyId}"]`);
            if (profileBtn) {
              profileBtn.click();
            }
          }
        });
      });
      container.querySelectorAll(".confirmTimeBtn").forEach((btn) => {
        btn.addEventListener("click", () => {
          handleParentTimeConfirmation(btn);
        });
      });
    }

    function renderParentBookingsCalendar(monthDate, items) {
      const title = document.getElementById("calendarMonthLabel");
      const container = document.getElementById("parentBookingsCalendar");
      if (!container || !monthDate) return;
      if (title) {
        title.textContent = monthDate.toLocaleDateString("en-ZA", {
          month: "long",
          year: "numeric",
        });
      }
      const year = monthDate.getFullYear();
      const month = monthDate.getMonth();
      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const totalDays = lastDay.getDate();
      const offset = firstDay.getDay();
      const byDate = new Map();
      (Array.isArray(items) ? items : []).forEach((item) => {
        const slots = Array.isArray(item?.slots) && item.slots.length ? item.slots : [{ start_dt: item.start_dt, end_dt: item.end_dt }];
        slots.forEach((slot) => {
          const dt = slot?.start_dt ? new Date(slot.start_dt) : null;
          if (!dt || Number.isNaN(dt.getTime())) return;
          const parts = toLocalDateParts(dt);
          if (parts.year !== year || (parts.month - 1) !== month) return;
          const key = `${parts.year}-${String(parts.month).padStart(2, "0")}-${String(parts.day).padStart(2, "0")}`;
          if (!byDate.has(key)) byDate.set(key, []);
          byDate.get(key).push({
            label: `${bookingDisplayName(item)} ${formatCompactTimeRange(slot.start_dt, slot.end_dt)}`,
            color: bookingColorForKey(item.job_id || item.group_id || item.id),
          });
        });
      });
      const heads = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"].map((day) => `<div class="calendarHead">${day}</div>`).join("");
      const blanks = Array.from({ length: offset }, () => `<div></div>`).join("");
      const cells = Array.from({ length: totalDays }, (_, index) => {
        const day = index + 1;
        const key = `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
        const bookings = byDate.get(key) || [];
        const shown = bookings.slice(0, 3).map((booking) => `<div class="calendarBooking" style="border-left-color:${escapeHtml(booking.color.border)};background:${escapeHtml(booking.color.background)};">${escapeHtml(booking.label)}</div>`).join("");
        const more = bookings.length > 3 ? `<div class="calendarMore">+${bookings.length - 3} more</div>` : "";
        return `<div class="calendarDay"><div class="calendarDayNumber">${day}</div>${shown}${more}</div>`;
      }).join("");
      container.innerHTML = `<div class="monthCalendar">${heads}${blanks}${cells}</div>`;
    }

    function renderBookingsDashboard(items) {
      const list = Array.isArray(items) ? items.slice() : [];
      list.sort((a, b) => String(a.start_dt || "").localeCompare(String(b.start_dt || "")));
      const visibleDashboardItems = list.filter((item) => !["cancelled", "rejected"].includes(String(item.status || "").toLowerCase()));
      const inProgress = visibleDashboardItems.filter((item) => String(item.booking_category || "").toLowerCase() === "in_progress");
      const upcoming = visibleDashboardItems.filter((item) => String(item.booking_category || "").toLowerCase() === "upcoming");
      renderDashboardPanel("inProgressBookings", inProgress, "No bookings in progress.");
      renderDashboardPanel("upcomingBookings", upcoming, "No upcoming bookings.");
      if (!currentCalendarMonth) {
        const now = new Date();
        currentCalendarMonth = new Date(now.getFullYear(), now.getMonth(), 1);
      }
      renderParentBookingsCalendar(currentCalendarMonth, visibleDashboardItems);
    }

    function renderFormPreview(form) {
      const items = [
        ["Additional notes", form?.notes || "-"],
        ["Nanny responsibilities", form?.responsibilities || "-"],
        ["Adult present at address", form?.adult_present || "-"],
        ["Reason for booking", form?.booking_reason || "-"],
        ["Sleepover expectations", form?.sleepover_expectations || "-"],
        ["Sleepover reason", form?.sleepover_reason || "-"],
        ["Children present", form?.kids_count ?? "-"],
        ["Meal arrangement", form?.meal_option || "-"],
        ["Foods not allowed in home", form?.food_restrictions || "-"],
        ["Dogs at home", form?.dogs_info || "-"],
        ["House upkeep disclaimer", yesNo(form?.disclaimer_basic_upkeep)],
        ["Medicine disclaimer", yesNo(form?.disclaimer_medicine)],
        ["Additional hours disclaimer", yesNo(form?.disclaimer_extra_hours)],
        ["After-17:00 transport disclaimer", yesNo(form?.disclaimer_transport)],
      ];
      return `<ul class="previewList">${items.map(([label, value]) => `<li><strong>${escapeHtml(label)}:</strong> ${escapeHtml(value)}</li>`).join("")}</ul>`;
    }

    function renderScheduleEditor(job) {
      const slots = Array.isArray(job.slots) && job.slots.length
        ? job.slots
        : [{ start_dt: job.start_dt, end_dt: job.end_dt }];
      if (!job.can_edit_details) {
        return `<div class="lockNote">${escapeHtml(job.edit_locked_reason || "This booking can no longer be edited.")}</div>`;
      }
      return `
        <div class="detailGrid">
          ${slots.map((slot, index) => `
            <div class="field scheduleSlotRow" data-index="${index}">
              <label>Start date and time</label>
              <input type="datetime-local" data-schedule-field="start" value="${escapeHtml(toDateTimeInputValue(slot.start_dt))}" />
            </div>
            <div class="field scheduleSlotRowEnd" data-index="${index}">
              <label>Finish date and time</label>
              <input type="datetime-local" data-schedule-field="end" value="${escapeHtml(toDateTimeInputValue(slot.end_dt))}" />
            </div>
          `).join("")}
        </div>
        <label class="checkboxRow" style="margin-top:10px;">
          <input type="checkbox" data-schedule-field="sleepover" ${job.sleepover ? "checked" : ""} />
          Sleepover required
        </label>
        <div class="actions">
          <button class="btn saveScheduleBtn" data-id="${job.job_id}">Save date/time updates</button>
        </div>
      `;
    }

    function openJobDetails(card) {
      const details = card?.querySelector(".job-details");
      if (!details) return;
      details.style.display = "block";
    }

    function openPreview(profile) {
      previewNanny = profile;
      const name = formatName(profile?.name || `Nanny ${profile?.nanny_id || ""}`);
      const initials = (name || "N").trim().split(/\s+/).map((p) => p[0]).join("").slice(0, 2).toUpperCase();
      const avatarEl = document.getElementById("previewAvatar");
      if (profile?.profile_photo_url) {
        avatarEl.innerHTML = `<img src="${profile.profile_photo_url}" alt="${escapeHtml(name)}" style="width:100%;height:100%;object-fit:cover;border-radius:12px;">`;
      } else {
        avatarEl.textContent = initials;
      }
      document.getElementById("previewName").textContent = name;
      const meta = [];
      if (profile?.average_rating_12m != null) meta.push(`⭐ ${profile.average_rating_12m} (${profile.review_count_12m ?? 0})`);
      else meta.push("⭐ New");
      if (profile?.distance_km != null) meta.push(`${Number(profile.distance_km).toFixed(2)} km away`);
      if (profile?.location_hint) meta.push(profile.location_hint);
      document.getElementById("previewMeta").textContent = meta.join(" • ");

      const summary = profile?.profile_summary || profile?.bio || "";
      document.getElementById("previewBio").innerHTML = `<div class="summaryText">${escapeHtml(summary || "No bio yet.")}</div>`;

      const trustBits = [
        profile?.approved ? "Approved by My Nanny" : "Pending approval",
        (profile?.review_count_12m || 0) > 0 ? `${profile.review_count_12m} recent review(s)` : "No recent reviews yet",
      ];
      document.getElementById("previewTrust").innerHTML = trustBits.map((v) => `<span class="trustPill">${escapeHtml(v)}</span>`).join("");

      const details = [
        ["Completed jobs", profile?.completed_jobs_count ?? 0],
        ["Age", profile?.age ?? "Not provided"],
        ["Languages", (profile?.languages || []).map((l) => l.name).join(", ") || "Not provided"],
        ["Qualifications", (profile?.qualifications || []).map((q) => q.name).join(", ") || "Not provided"],
      ];
      document.getElementById("previewDetails").innerHTML = details
        .map(([label, value]) => `<div class="infoItem"><strong>${escapeHtml(label)}:</strong> ${escapeHtml(String(value))}</div>`)
        .join("");

      const jobs = Array.isArray(profile?.previous_jobs) ? profile.previous_jobs.filter(Boolean) : [];
      document.getElementById("previewWorkHistory").innerHTML = jobs.length
        ? jobs.slice(0, 3).map((job) => `
            <div class="workItem">
              <div class="workRole">${escapeHtml(job.role || "Previous role")}</div>
              <div class="workMeta">${escapeHtml(job.employer || "Employer not listed")} • ${escapeHtml(job.period || "Period not listed")}</div>
            </div>
          `).join("")
        : "No previous positions listed yet.";
      document.getElementById("previewWorkHistoryWrap").classList.add("collapsed");
      document.getElementById("previewWorkHistoryToggle").setAttribute("aria-expanded", "false");
      document.getElementById("previewWorkHistoryChevron").classList.remove("open");

      const proficiencies = [
        ...(profile?.tags || []).map((tag) => tag.name).filter(Boolean),
        ...(profile?.qualifications || []).map((item) => item.name).filter(Boolean),
        ...(profile?.languages || []).map((item) => item.name).filter(Boolean),
      ];
      document.getElementById("previewProficiencies").innerHTML = proficiencies.length
        ? proficiencies.map((value) => `<span class="pill">${escapeHtml(value)}</span>`).join("")
        : "No proficiencies listed.";

      document.getElementById("previewModal").style.display = "flex";
    }

    function closePreview() {
      document.getElementById("previewModal").style.display = "none";
      previewNanny = null;
    }

    async function loadJobs() {
      const data = await fetchJson("/parents/me/booking-requests");
      const list = document.getElementById("jobsList");
      list.innerHTML = "";
      const items = data.results || [];
      parentBookingsCache = items.slice();
      renderBookingsDashboard(parentBookingsCache);
      if (!items.length) {
        list.innerHTML = "<div class=\"muted\">No jobs yet.</div>";
        return;
      }
      const filter = document.getElementById("statusFilter").value;
      const sections = {
        upcoming: [],
        in_progress: [],
        past: [],
        cancelled: [],
      };
      items.forEach(r => {
        const statusKey = (r.status || "").toLowerCase();
        const category = statusKey === "cancelled"
          ? "cancelled"
          : String(r.booking_category || "upcoming").toLowerCase();
        if (filter !== "all" && filter !== category) return;
        const start = window.formatDateTimeZA ? window.formatDateTimeZA(r.start_dt) : (r.start_dt || "-");
        const end = window.formatDateTimeZA ? window.formatDateTimeZA(r.end_dt) : (r.end_dt || "-");
        const bookingRange = formatBookingDateTimeRange(r.start_dt, r.end_dt);
        const status = mapStatus(r.status);
        const displayName = formatName(r.accepted_nanny_name || "Nanny");
        let nannyLine = "Awaiting nanny acceptance";
        if (r.status === "approved") {
          nannyLine = `Accepted by: ${displayName} (ID ${r.accepted_nanny_id || "-"})`;
        } else if (r.status === "rejected") {
          nannyLine = "No nanny accepted this request.";
        } else if (r.status === "cancelled") {
          nannyLine = "Cancelled by client.";
        }
        const requestedNannies = Array.isArray(r.requested_nannies) && r.requested_nannies.length
          ? r.requested_nannies.map(n => `${formatName(n.name)} (ID ${n.id})`).join(", ")
          : "-";
        const form = r.booking_form || {};
        const canEditJob = !!(r.can_edit_details || r.can_edit_form) && (r.status === "tbc" || r.status === "pending_admin");
        const showActiveNannyContacts = r.status === "approved" && category !== "past";
        const whatsappUrl = toWhatsappUrl(r.accepted_nanny_phone_alt);
        const callUrl = toTelUrl(r.accepted_nanny_phone);
        const todayDay = findTodayBookingDay(r);
        const cardHtml = `
          <div class="card">
          <div><strong>Job ID:</strong> ${escapeHtml(r.job_id)}</div>
          <div class="muted">${escapeHtml(bookingRange)}</div>
          <div class="muted">Status: ${escapeHtml(status)}</div>
          <div class="muted">${escapeHtml(nannyLine)}</div>
          ${todayDay ? `<div class="bookingCardNote">Today's booking day: ${escapeHtml(formatBookingDateTimeRange(todayDay.start_dt, todayDay.end_dt))}</div>` : ""}
          <div class="actions">
            ${r.status !== "cancelled" ? `<button class="btn cancelBtn" data-id="${r.job_id}">Cancel job</button>` : ""}
            ${canEditJob ? `<button class="btn editJobBtn" data-id="${r.job_id}">Edit job</button>` : ""}
            ${showActiveNannyContacts && whatsappUrl ? `<a class="btn" data-contact-action="whatsapp" href="${escapeHtml(whatsappUrl)}" target="_blank" rel="noopener">WhatsApp</a>` : ""}
            ${showActiveNannyContacts && callUrl ? `<a class="btn" data-contact-action="call" href="${escapeHtml(callUrl)}">Call nanny</a>` : ""}
            ${r.accepted_nanny_id ? `<button class="btn viewNannyProfileBtn" data-id="${r.accepted_nanny_id}">View nanny profile</button>` : ""}
            ${renderConfirmationButtons(r, todayDay, true)}
          </div>
          <div class="job-details">
            <div><strong>Requested times:</strong> ${escapeHtml(bookingRange)}</div>
            <div><strong>Requested nannies:</strong> ${escapeHtml(requestedNannies)}</div>
            ${r.accepted_nanny_name ? `<div><strong>Confirmed nanny:</strong> ${escapeHtml(displayName)} (ID ${escapeHtml(r.accepted_nanny_id || "-")})</div>` : ""}
            <div><strong>Job status:</strong> ${escapeHtml(status)}</div>
            <div class="detailSection">
              <h3>Booking form preview</h3>
              ${renderFormPreview(form)}
            </div>
            <div class="detailSection">
              <h3>Edit booking dates and times</h3>
              ${renderScheduleEditor(r)}
            </div>
            <div class="detailSection">
              <h3>Edit booking form</h3>
              ${r.can_edit_form ? `
                <div class="detailGrid">
                  <label class="field">Additional notes<textarea rows="3" data-field="notes">${escapeHtml(form.notes || "")}</textarea></label>
                  <label class="field">Nanny responsibilities<textarea rows="3" data-field="responsibilities">${escapeHtml(form.responsibilities || "")}</textarea></label>
                  <label class="field">Adult present at address<input type="text" data-field="adult_present" value="${escapeHtml(form.adult_present || "")}" /></label>
                  <label class="field">Reason for booking<input type="text" data-field="booking_reason" value="${escapeHtml(form.booking_reason || "")}" /></label>
                  <label class="field">Children present<input type="number" min="1" max="10" data-field="kids_count" value="${escapeHtml(form.kids_count ?? 1)}" /></label>
                  <label class="field">Meal arrangement<input type="text" data-field="meal_option" value="${escapeHtml(form.meal_option || "")}" /></label>
                  <label class="field">Foods not allowed in home<input type="text" data-field="food_restrictions" value="${escapeHtml(form.food_restrictions || "")}" /></label>
                  <label class="field">Dogs at home<input type="text" data-field="dogs_info" value="${escapeHtml(form.dogs_info || "")}" /></label>
                </div>
                <div class="detailGrid" style="margin-top:10px;">
                  <label class="checkboxRow"><input type="checkbox" data-field="disclaimer_basic_upkeep" ${form.disclaimer_basic_upkeep ? "checked" : ""} /> House upkeep disclaimer understood</label>
                  <label class="checkboxRow"><input type="checkbox" data-field="disclaimer_medicine" ${form.disclaimer_medicine ? "checked" : ""} /> Medicine disclaimer understood</label>
                  <label class="checkboxRow"><input type="checkbox" data-field="disclaimer_extra_hours" ${form.disclaimer_extra_hours ? "checked" : ""} /> Additional hours disclaimer understood</label>
                  <label class="checkboxRow"><input type="checkbox" data-field="disclaimer_transport" ${form.disclaimer_transport ? "checked" : ""} /> After-17:00 transport disclaimer understood</label>
                </div>
                <div class="actions">
                  <button class="btn saveFormBtn" data-id="${r.job_id}">Save form updates</button>
                </div>
              ` : `<div class="lockNote">${escapeHtml(r.edit_locked_reason || "This booking form can no longer be edited.")}</div>`}
            </div>
          </div>
          </div>
        `;
        if (sections[category]) sections[category].push(cardHtml);
        else sections.upcoming.push(cardHtml);
      });
      const sectionOrder = [
        { key: "upcoming", label: "Upcoming bookings" },
        { key: "in_progress", label: "In progress" },
        { key: "past", label: "Past bookings" },
        { key: "cancelled", label: "Cancelations" },
      ];
      sectionOrder.forEach((section) => {
        if (!sections[section.key].length) return;
        list.innerHTML += `<h2 class="sectionTitle">${escapeHtml(section.label)}</h2>${sections[section.key].join("")}`;
      });
      if (!list.innerHTML.trim()) {
        list.innerHTML = "<div class=\"muted\">No bookings match this filter.</div>";
      }
      list.querySelectorAll(".card").forEach(card => {
        card.addEventListener("click", (e) => {
          if (e.target.closest("button") || e.target.closest("a")) return;
          const details = card.querySelector(".job-details");
          if (details) {
            details.style.display = details.style.display === "block" ? "none" : "block";
          }
        });
      });
      list.querySelectorAll(".editJobBtn").forEach(btn => {
        btn.addEventListener("click", () => {
          const card = btn.closest(".card");
          openJobDetails(card);
          const editSection = Array.from(card?.querySelectorAll(".detailSection") || []).find((section) => {
            const title = section.querySelector("h3")?.textContent || "";
            return /Edit booking/i.test(title);
          });
          if (editSection) {
            editSection.scrollIntoView({ behavior: "smooth", block: "start" });
          }
        });
      });
      list.querySelectorAll(".cancelBtn").forEach(btn => {
        btn.addEventListener("click", async () => {
          if (!confirm(`Cancel this job? If within ${cancellationWindowHours} hours of the arrival time, a penalty will apply.`)) return;
          const reason = (prompt("Why are you cancelling this booking?") || "").trim();
          if (!reason) {
            alert("Please provide a cancellation reason.");
            return;
          }
          btn.disabled = true;
          try {
            await fetchJson(`/parents/me/booking-requests/${btn.dataset.id}/cancel`, {
              method: "PATCH",
              body: JSON.stringify({ reason })
            });
            loadJobs().catch(() => {});
          } catch (e) {
            btn.disabled = false;
            alert(e.message || "Failed to cancel job");
          }
        });
      });
      list.querySelectorAll(".viewNannyProfileBtn").forEach(btn => {
        btn.addEventListener("click", async () => {
          btn.disabled = true;
          try {
            const profile = await fetchJson(`/parents/me/nannies/${btn.dataset.id}/profile`);
            openPreview(profile);
          } catch (e) {
            alert(e.message || "Failed to load nanny profile");
          } finally {
            btn.disabled = false;
          }
        });
      });
      list.querySelectorAll(".confirmTimeBtn").forEach((btn) => {
        btn.addEventListener("click", () => {
          handleParentTimeConfirmation(btn);
        });
      });
      list.querySelectorAll(".saveScheduleBtn").forEach(btn => {
        btn.addEventListener("click", async () => {
          const card = btn.closest(".card");
          const startRows = Array.from(card.querySelectorAll(".scheduleSlotRow"));
          const endRows = Array.from(card.querySelectorAll(".scheduleSlotRowEnd"));
          const slots = startRows.map((row, index) => {
            const startsAt = toIsoFromDateTimeInput(row.querySelector('[data-schedule-field="start"]')?.value || "");
            const endsAt = toIsoFromDateTimeInput(endRows[index]?.querySelector('[data-schedule-field="end"]')?.value || "");
            return { starts_at: startsAt, ends_at: endsAt };
          });
          if (slots.some((slot) => !slot.starts_at || !slot.ends_at)) {
            alert("Please enter a start and finish date/time for each booking slot.");
            return;
          }
          const payload = {
            slots,
            sleepover: !!card.querySelector('[data-schedule-field="sleepover"]')?.checked,
          };
          btn.disabled = true;
          try {
            await fetchJson(`/parents/me/booking-requests/${btn.dataset.id}/schedule`, {
              method: "PATCH",
              body: JSON.stringify(payload)
            });
            loadJobs().catch(() => {});
          } catch (e) {
            btn.disabled = false;
            alert(e.message || "Failed to update booking dates and times");
          }
        });
      });
      list.querySelectorAll(".saveFormBtn").forEach(btn => {
        btn.addEventListener("click", async () => {
          const card = btn.closest(".card");
          const read = (field) => card.querySelector(`[data-field="${field}"]`);
          const payload = {
            notes: read("notes")?.value || "",
            responsibilities: read("responsibilities")?.value || "",
            adult_present: read("adult_present")?.value || "",
            booking_reason: read("booking_reason")?.value || "",
            kids_count: Number(read("kids_count")?.value || 1),
            meal_option: read("meal_option")?.value || "",
            food_restrictions: read("food_restrictions")?.value || "",
            dogs_info: read("dogs_info")?.value || "",
            disclaimer_basic_upkeep: !!read("disclaimer_basic_upkeep")?.checked,
            disclaimer_medicine: !!read("disclaimer_medicine")?.checked,
            disclaimer_extra_hours: !!read("disclaimer_extra_hours")?.checked,
            disclaimer_transport: !!read("disclaimer_transport")?.checked,
          };
          btn.disabled = true;
          try {
            await fetchJson(`/parents/me/booking-requests/${btn.dataset.id}/form`, {
              method: "PATCH",
              body: JSON.stringify(payload)
            });
            loadJobs().catch(() => {});
          } catch (e) {
            btn.disabled = false;
            alert(e.message || "Failed to update booking form");
          }
        });
      });
    }

    document.getElementById("backBtn").addEventListener("click", () => {
      location.href = "/static/parent_home.html";
    });
    document.getElementById("calendarPrevBtn").addEventListener("click", () => {
      if (!currentCalendarMonth) return;
      currentCalendarMonth = new Date(currentCalendarMonth.getFullYear(), currentCalendarMonth.getMonth() - 1, 1);
      renderParentBookingsCalendar(currentCalendarMonth, parentBookingsCache.filter((item) => !["cancelled", "rejected"].includes(String(item.status || "").toLowerCase())));
    });
    document.getElementById("calendarNextBtn").addEventListener("click", () => {
      if (!currentCalendarMonth) return;
      currentCalendarMonth = new Date(currentCalendarMonth.getFullYear(), currentCalendarMonth.getMonth() + 1, 1);
      renderParentBookingsCalendar(currentCalendarMonth, parentBookingsCache.filter((item) => !["cancelled", "rejected"].includes(String(item.status || "").toLowerCase())));
    });
    document.getElementById("closePreviewBtn").addEventListener("click", closePreview);
    document.getElementById("previewModal").addEventListener("click", (e) => {
      if (e.target.id === "previewModal") closePreview();
    });
    document.getElementById("previewWorkHistoryToggle").addEventListener("click", () => {
      const wrap = document.getElementById("previewWorkHistoryWrap");
      const chevron = document.getElementById("previewWorkHistoryChevron");
      const isCollapsed = wrap.classList.toggle("collapsed");
      document.getElementById("previewWorkHistoryToggle").setAttribute("aria-expanded", isCollapsed ? "false" : "true");
      chevron.classList.toggle("open", !isCollapsed);
    });

    (async () => {
      const me = await requireMe();
      if (me.role !== "parent") {
        location.href = "/static/login.html";
        return;
      }
      try {
        const cfg = await fetchJson("/settings/cancellation-window-hours");
        const hrs = Number(cfg?.cancellation_fee_window_hours);
        if (Number.isFinite(hrs) && hrs >= 0) cancellationWindowHours = Math.max(15, Math.floor(hrs));
      } catch {}
      loadJobs().catch(() => {});
      document.getElementById("statusFilter").addEventListener("change", () => {
        loadJobs().catch(() => {});
      });
    })();
  </script>
</body>
</html>
