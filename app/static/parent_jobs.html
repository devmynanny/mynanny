<!doctype html>
<html>
<head>
  <link rel="stylesheet" href="/static/theme.css" />
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>My Bookings</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0;padding:24px;max-width:900px}
    .topbar{display:flex;align-items:center;justify-content:space-between;margin: 10px 0 20px 0;}
    .btn{padding:10px 14px;border-radius:10px;border:1px solid #ccc;background:#fff;cursor:pointer}
    .card{border:1px solid #ddd;border-radius:12px;padding:12px;margin:10px 0;cursor:pointer}
    .muted{color:#666}
    .actions{display:flex;gap:8px;margin-top:10px}
    .card button{font-size:14px}
    .job-details{margin-top:10px;padding-top:10px;border-top:1px solid #eee;display:none}
    .pill{display:inline-block;padding:3px 8px;border-radius:999px;border:1px solid #ddd;font-size:12px;margin-right:6px}
  </style>
</head>
<body>
  <div id="topbar" class="topbar"></div>
  <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
    <h1>My Bookings</h1>
    <button class="btn back-btn" id="backBtn" type="button">Back to home</button>
  </div>

  <div style="margin:12px 0; display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
    <label class="muted">Filter</label>
    <select id="statusFilter">
      <option value="all">All</option>
      <option value="pending">Pending</option>
      <option value="accepted">Accepted</option>
      <option value="cancelled">Cancelled</option>
      <option value="completed">Completed</option>
    </select>
  </div>

  <div id="jobsList"></div>

  <script src="/static/app.js?v=2"></script>
  <script>
    function mapStatus(status) {
      if (status === "approved") return "Accepted";
      if (status === "tbc" || status === "pending_admin") return "Requested";
      return status || "-";
    }

    function formatName(fullName) {
      const parts = String(fullName || "").trim().split(/\s+/).filter(Boolean);
      if (parts.length <= 1) return parts[0] || "";
      const first = parts[0];
      const lastInitial = parts[parts.length - 1][0] || "";
      return `${first} ${lastInitial}.`;
    }

    async function loadJobs() {
      const data = await fetchJson("/parents/me/booking-requests");
      const list = document.getElementById("jobsList");
      list.innerHTML = "";
      const items = data.results || [];
      if (!items.length) {
        list.innerHTML = "<div class=\"muted\">No jobs yet.</div>";
        return;
      }
      items.forEach(r => {
        const statusKey = (r.status || "").toLowerCase();
        const filter = document.getElementById("statusFilter").value;
        if (filter === "pending" && statusKey !== "tbc") return;
        if (filter === "accepted" && statusKey !== "approved") return;
        if (filter === "cancelled" && statusKey !== "cancelled") return;
        if (filter === "completed" && statusKey !== "completed") return;
        const start = window.formatDateTimeZA ? window.formatDateTimeZA(r.start_dt) : (r.start_dt || "-");
        const end = window.formatDateTimeZA ? window.formatDateTimeZA(r.end_dt) : (r.end_dt || "-");
        const status = mapStatus(r.status);
        const displayName = formatName(r.accepted_nanny_name || "Nanny");
        let nannyLine = "Awaiting nanny acceptance";
        if (r.status === "approved") {
          nannyLine = `Accepted by: ${displayName} (ID ${r.accepted_nanny_id || "-"})`;
        } else if (r.status === "rejected") {
          nannyLine = "No nanny accepted this request.";
        } else if (r.status === "cancelled") {
          nannyLine = "Cancelled by client.";
        }
        const requestedNannies = Array.isArray(r.requested_nannies) && r.requested_nannies.length
          ? r.requested_nannies.map(n => `${formatName(n.name)} (ID ${n.id})`).join(", ")
          : "-";
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div><strong>Job ID:</strong> ${r.job_id}</div>
          <div class="muted">${start} to ${end}</div>
          <div class="muted">Status: ${status}</div>
          <div class="muted">${nannyLine}</div>
          <div class="actions">
            ${r.status !== "cancelled" ? `<button class="btn cancelBtn" data-id="${r.job_id}">Cancel job</button>` : ""}
          </div>
          <div class="job-details">
            <div><strong>Requested times:</strong> ${start} to ${end}</div>
            <div><strong>Requested nannies:</strong> ${requestedNannies}</div>
            <div><strong>Job status:</strong> ${status}</div>
          </div>
        `;
        list.appendChild(card);
      });
      list.querySelectorAll(".card").forEach(card => {
        card.addEventListener("click", (e) => {
          if (e.target.closest("button")) return;
          const details = card.querySelector(".job-details");
          if (details) {
            details.style.display = details.style.display === "block" ? "none" : "block";
          }
        });
      });
      list.querySelectorAll(".cancelBtn").forEach(btn => {
        btn.addEventListener("click", async () => {
          if (!confirm("Cancel this job? If within 12 hours, a cancellation fee may apply.")) return;
          btn.disabled = true;
          try {
            await fetchJson(`/parents/me/booking-requests/${btn.dataset.id}/cancel`, { method: "PATCH" });
            loadJobs().catch(() => {});
          } catch (e) {
            btn.disabled = false;
            alert(e.message || "Failed to cancel job");
          }
        });
      });
    }

    document.getElementById("backBtn").addEventListener("click", () => {
      location.href = "/static/parent_home.html";
    });

    (async () => {
      const me = await requireMe();
      if (me.role !== "parent") {
        location.href = "/static/login.html";
        return;
      }
      loadJobs().catch(() => {});
      document.getElementById("statusFilter").addEventListener("change", () => {
        loadJobs().catch(() => {});
      });
    })();
  </script>
</body>
</html>
