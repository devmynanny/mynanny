<!doctype html>
<html>
<head>
  <link rel="stylesheet" href="/static/theme.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" />
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>My Nanny, candidates</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0 auto;padding:24px;max-width:1100px;width:min(1100px,100%)}
    .top{display:flex;gap:12px;align-items:center}
    .btn{padding:10px 14px;border-radius:10px;border:1px solid #ccc;background:#fff;cursor:pointer}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;margin-top:16px}
    .card{border:1px solid #ddd;border-radius:14px;padding:16px}
    .muted{color:#666}
    h1{margin:0;font-size:34px}
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin: 10px 0 20px 0;
    }
    .btn.secondary{
      background:#fff;
      border:1px solid #ccc;
    }
    .card-header{display:flex;gap:12px;align-items:center}
    .selectBox{display:flex;align-items:center;gap:6px;font-size:12px;color:#444}
    .avatar{width:64px;height:64px;border-radius:12px;object-fit:cover;background:#f3f4f6;border:1px solid #ddd;display:flex;align-items:center;justify-content:center;font-weight:600;color:#6b7280}
    .card-title{font-weight:700;font-size:18px}
    .actions{display:flex;gap:10px;align-items:center;margin-top:10px}
    .modalBack{position:fixed;inset:0;background:rgba(0,0,0,0.35);display:none;align-items:center;justify-content:center;padding:20px;z-index:9999;}
    .modal{background:#fff;border-radius:10px;width:min(520px,100%);border:1px solid #ddd;padding:16px}
    .modal input, .modal select{width:100%;padding:10px;margin-top:6px;box-sizing:border-box}
    .modal .row{display:flex;gap:10px;justify-content:flex-end;margin-top:12px}
    .estimateBox{margin-top:10px;padding:10px;border:1px solid #e5e7eb;border-radius:10px;background:#f9fafb}
    /* The calendar itself is the primary way to select a time range, so the manual
       date/time search bar can remain hidden while still allowing scripts to use it */
    .search-bar{display:none;flex-wrap:wrap;gap:12px;align-items:flex-end;margin-top:14px}
    .search-bar label{display:block;font-size:12px;color:#666}
    .search-bar input{padding:10px;border-radius:10px;border:1px solid #ccc}
    .previewBtn{background:#fff;border:1px solid #bbb}
    .previewModal{background:#fff;border-radius:12px;width:min(640px,100%);border:1px solid #ddd;padding:18px;position:relative}
    .previewHeader{display:flex;gap:12px;align-items:center}
    .previewTitle{font-weight:700;font-size:20px}
    .previewSection{margin-top:12px}
    .previewSectionTitle{font-weight:600;margin-bottom:6px}
    .infoGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px 12px}
    .infoItem{font-size:14px;color:#444}
    .infoItem strong{color:#1f2937}
    .trustPills{display:flex;flex-wrap:wrap;gap:8px}
    .trustPill{display:inline-block;padding:4px 8px;border-radius:999px;border:1px solid #ddd;font-size:12px}
    .workList{display:grid;gap:8px}
    .workItem{border:1px solid #e5e7eb;border-radius:10px;padding:8px}
    .workRole{font-weight:600}
    .workMeta{font-size:13px;color:#555}
    .heartBtn{position:absolute;top:12px;right:12px;border:none;background:transparent;font-size:26px;cursor:pointer}
    .heartBtn.off{color:#9ca3af}
    .heartBtn.on{color:#ef4444}
    .pill{display:inline-block;padding:4px 8px;border-radius:999px;border:1px solid #ddd;font-size:12px;margin:4px 6px 0 0}
    .filters{display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin-top:12px}
    .filters label{font-size:12px;color:#666}
    .filters select,.filters input[type="number"]{padding:8px;border-radius:8px;border:1px solid #ccc}
    .filter-group{display:flex;flex-direction:column;gap:6px}
    .tag-filters{display:flex;flex-wrap:wrap;gap:8px}
    .tag-filters label{display:flex;align-items:center;gap:6px;font-size:13px;color:#333}
    .card{position:relative}
    .card-fav{position:absolute;top:12px;right:12px;font-size:22px;color:#ef4444}
  </style>
</head>
<body>
  <div id="topbar" class="topbar"></div>
  <div class="top">
    <button class="btn back-btn" onclick="location.href='/static/parent_home.html'">Back to home</button>
    <h1>Find My Candidates</h1>
  </div>

  <div class="search-bar">
    <div>
      <label id="searchDateLabel" for="searchDate">Date</label>
      <input id="searchDate" type="date" />
    </div>
    <div>
      <label for="searchStartTime">Start time</label>
      <input id="searchStartTime" type="time" />
    </div>
    <div>
      <label for="searchEndTime">End time</label>
      <input id="searchEndTime" type="time" />
    </div>
    <button class="btn" id="searchBtn" type="button">Search</button>
  </div>

  <div class="card" style="margin-top:12px;">
    <h3 style="margin:0 0 10px;">Pick a time range</h3>
    <div id="searchCalendar"></div>
  </div>

  <div class="filters">
    <div class="filter-group">
      <label>Favourites</label>
      <label><input id="filterFavorites" type="checkbox" /> Only favourites</label>
    </div>
    <div class="filter-group">
      <label>Rated</label>
      <label><input id="filterRated" type="checkbox" /> Rated only</label>
    </div>
    <div class="filter-group">
      <label for="filterDistance">Distance</label>
      <select id="filterDistance">
        <option value="">Any distance</option>
        <option value="5">Up to 5 km</option>
        <option value="10">Up to 10 km</option>
        <option value="20">Up to 20 km</option>
        <option value="50">Up to 50 km</option>
        <option value="100">Up to 100 km</option>
      </select>
    </div>
    <div class="filter-group" style="min-width:280px;">
      <label>Tags</label>
      <div id="filterTags" class="tag-filters"></div>
    </div>
  </div>
  <div style="margin-top:12px;">
    <button class="btn" id="requestSelectedBtn" type="button" disabled>Request selected nannies</button>
  </div>

  <div id="status" class="muted" style="margin-top:10px"></div>
  <div id="multiDayNotice" class="muted" style="margin-top:6px; display:none;"></div>
  <div id="list" class="grid"></div>

  <div id="bookingModal" class="modalBack">
    <div class="modal">
      <div style="font-weight:700; margin-bottom:8px">Book nanny</div>
      <div class="muted" id="bookingNannyName"></div>

      <label class="muted">Start</label>
      <input id="bookingStart" type="text" readonly />

      <label class="muted" style="margin-top:8px; display:block;">End</label>
      <input id="bookingEnd" type="text" readonly />

      <label class="muted" style="margin-top:8px; display:block;">Location</label>
      <select id="bookingLocation"></select>
      <label class="muted" style="margin-top:8px; display:flex; align-items:center; gap:10px; justify-content:flex-start;">
        <input id="bookingLocationConfirm" type="checkbox" style="margin:0;" />
        I confirm this is the correct location
      </label>

      <label class="muted" style="margin-top:8px; display:flex; align-items:center; gap:10px; justify-content:flex-start;">
        <input id="bookingSleepover" type="checkbox" style="margin:0;" />
        Sleepover required (adds R150)
      </label>

      <label class="muted" style="margin-top:8px; display:block;">Notes (optional)</label>
      <input id="bookingNotes" type="text" placeholder="Any notes for the nanny" />

      <div id="bookingEstimate" class="estimateBox muted">Calculating estimate...</div>
      <div id="bookingStatus" class="muted" style="margin-top:8px; min-height:18px"></div>

      <div class="row">
        <button class="btn secondary" id="cancelBookingBtn" type="button">Cancel</button>
        <button class="btn primary" id="submitBookingBtn" type="button">Submit request</button>
      </div>
    </div>
  </div>

  <div id="previewModal" class="modalBack">
    <div class="previewModal">
      <button id="favoriteBtn" class="heartBtn off" type="button" aria-label="Favorite">♥</button>
      <div class="previewHeader">
        <div id="previewAvatar" class="avatar"></div>
        <div>
          <div id="previewName" class="previewTitle"></div>
          <div id="previewMeta" class="muted"></div>
        </div>
      </div>
      <div id="previewBio" style="margin-top:12px"></div>
      <div class="previewSection">
        <div class="previewSectionTitle">Availability fit</div>
        <div id="previewFit" class="muted"></div>
      </div>
      <div class="previewSection">
        <div class="previewSectionTitle">Price estimate</div>
        <div id="previewPrice" class="muted"></div>
      </div>
      <div class="previewSection">
        <div class="previewSectionTitle">Trust and verification</div>
        <div id="previewTrust" class="trustPills"></div>
      </div>
      <div class="previewSection">
        <div class="previewSectionTitle">Profile details</div>
        <div id="previewDetails" class="infoGrid"></div>
      </div>
      <div class="previewSection">
        <div class="previewSectionTitle">Work history</div>
        <div id="previewWorkHistory" class="workList muted"></div>
      </div>
      <div class="previewSection">
        <div class="previewSectionTitle">Proficiencies</div>
        <div id="previewProficiencies"></div>
      </div>
      <div style="margin-top:16px; display:flex; justify-content:flex-end; gap:8px;">
        <button class="btn" id="selectPreviewBtn" type="button">Select nanny</button>
        <button class="btn primary" id="bookPreviewBtn" type="button">Book now</button>
        <button class="btn secondary" id="closePreviewBtn" type="button">Close</button>
      </div>
    </div>
  </div>

  <div id="deleteBlockModal" class="modalBack">
    <div class="modal">
      <div style="font-weight:700; margin-bottom:8px">Time block actions</div>
      <div id="deleteBlockText" class="muted" style="margin-bottom:12px"></div>
      <div class="row" style="justify-content:flex-end; gap:10px;">
        <button class="btn secondary" id="cancelDeleteBlockBtn" type="button">Cancel</button>
        <button class="btn" id="duplicateBlockBtn" type="button">Duplicate to next day</button>
        <button class="btn" id="confirmDeleteBlockBtn" type="button">Delete</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js?v=2"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <script>
    async function guard() {
      const me = await requireMe();
      if (me.role !== "parent") {
        location.href = "/static/login.html";
        throw new Error("Wrong role");
      }
      return me;
    }

    function escapeHtml(v) {
      return String(v)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatName(fullName) {
      const parts = String(fullName || "").trim().split(/\s+/).filter(Boolean);
      if (parts.length <= 1) return parts[0] || "";
      const first = parts[0];
      const lastInitial = parts[parts.length - 1][0] || "";
      return `${first} ${lastInitial}.`;
    }

    let selectedNannies = new Set();
    let searchCalendar = null;

    function card(n, profileComplete, canBook){
      const name = formatName(n.name || ("Nanny " + n.nanny_id));
      const initials = (name || "N").trim().split(/\s+/).map(p => p[0]).join("").slice(0,2).toUpperCase();
      const avatar = n.profile_photo_url
        ? `<img class="avatar" src="${n.profile_photo_url}" alt="${name}" />`
        : `<div class="avatar">${initials}</div>`;
      const distLine = (profileComplete && n.distance_km !== null && n.distance_km !== undefined)
        ? `<div class="muted">${Number(n.distance_km).toFixed(2)} km away</div>`
        : "";
      const locLine = (!profileComplete && n.location_hint)
        ? `<div class="muted">${escapeHtml(n.location_hint)}</div>`
        : "";
      const reviewCount = n.review_count_12m ?? 0;
      const ratingLine = (n.average_rating_12m === null || n.average_rating_12m === undefined)
        ? "New"
        : (n.average_rating_12m + " (" + reviewCount + ")");
      const favMark = favorites.has(n.nanny_id) ? `<div class="card-fav">♥</div>` : "";
      return `
        <div class="card">
          ${favMark}
          <div class="card-header">
            ${avatar}
            <div class="card-title">${name}</div>
            <label class="selectBox" style="margin-left:auto;">
              <input type="checkbox" class="selectNanny" data-nanny-id="${n.nanny_id}" ${selectedNannies.has(n.nanny_id) ? "checked" : ""} />
              Select
            </label>
          </div>
          <div class="muted">⭐ ${ratingLine}</div>
          ${distLine}
          ${profileComplete ? (n.location_hint ? `<div class="muted">${escapeHtml(n.location_hint)}</div>` : "") : locLine}
          <div style="margin-top:10px">${n.bio || ""}</div>
          <div class="actions">
            <button class="btn primary bookBtn" data-nanny-id="${n.nanny_id}" data-nanny-name="${escapeHtml(name)}" ${canBook ? "" : "disabled"}>Book</button>
            <button class="btn previewBtn" data-nanny-id="${n.nanny_id}">Preview</button>
            ${canBook ? "" : `<div class=\"muted\">Complete your profile to book</div>`}
          </div>
        </div>
      `;
    }

    let bookingState = {
      nannyId: null,
      nannyName: "",
      start_dt: null,
      end_dt: null,
      selectedNannyIds: [],
    };

    function formatCurrencyCents(cents, currency = "ZAR") {
      const amount = Number(cents || 0) / 100;
      return new Intl.NumberFormat("en-ZA", { style: "currency", currency }).format(amount);
    }

    async function refreshBookingEstimate() {
      const estimateEl = document.getElementById("bookingEstimate");
      if (!estimateEl) return;
      if (!bookingState.start_dt || !bookingState.end_dt) {
        estimateEl.textContent = "Select date and time to see estimate.";
        return;
      }
      const selectedCount = Math.max(1, Array.isArray(bookingState.selectedNannyIds) ? bookingState.selectedNannyIds.length : 1);
      const sleepover = document.getElementById("bookingSleepover")?.checked || false;
      estimateEl.textContent = "Calculating estimate...";
      try {
        const data = await fetchJson("/booking-requests/estimate", {
          method: "POST",
          body: JSON.stringify({
            start_dt: bookingState.start_dt,
            end_dt: bookingState.end_dt,
            sleepover,
            selected_count: selectedCount,
          }),
        });
        const cur = data?.currency || "ZAR";
        const perNanny = formatCurrencyCents(data?.per_nanny_total_cents, cur);
        const total = formatCurrencyCents(data?.selected_total_cents, cur);
        const feePct = Number(data?.booking_fee_pct || 0) * 100;
        estimateEl.innerHTML = `
          <div><strong>Per nanny:</strong> ${escapeHtml(perNanny)}</div>
          <div><strong>Booking fee:</strong> ${feePct.toFixed(1)}%</div>
          <div><strong>Total${selectedCount > 1 ? ` (${selectedCount} nannies)` : ""}:</strong> ${escapeHtml(total)}</div>
        `;
      } catch (e) {
        estimateEl.textContent = "Estimate unavailable right now.";
      }
    }

    function openBookingModal(nannyId, nannyName, selectedIds = null) {
      bookingState.nannyId = nannyId;
      bookingState.nannyName = nannyName;
      bookingState.selectedNannyIds = Array.isArray(selectedIds) ? selectedIds : (nannyId ? [nannyId] : []);
      const count = bookingState.selectedNannyIds.length;
      document.getElementById("bookingNannyName").textContent = count > 1 ? `${count} nannies selected` : nannyName;
      document.getElementById("bookingStart").value = bookingState.start_dt
        ? (window.formatDateTimeZA ? window.formatDateTimeZA(bookingState.start_dt) : new Date(bookingState.start_dt).toLocaleString())
        : "";
      document.getElementById("bookingEnd").value = bookingState.end_dt
        ? (window.formatDateTimeZA ? window.formatDateTimeZA(bookingState.end_dt) : new Date(bookingState.end_dt).toLocaleString())
        : "";
      const locSelect = document.getElementById("bookingLocation");
      const locConfirm = document.getElementById("bookingLocationConfirm");
      const sleepoverEl = document.getElementById("bookingSleepover");
      if (locConfirm) locConfirm.checked = false;
      if (locSelect) {
        const options = parentLocations.map(l => {
          const label = l.label || "Location";
          const addr = l.formatted_address || l.city || "";
          const display = addr ? `${label} - ${addr}` : label;
          return `<option value="${l.id}">${escapeHtml(display)}</option>`;
        });
        locSelect.innerHTML = options.join("");
        const defaultLoc = parentLocations.find(l => l.is_default) || parentLocations[0];
        if (defaultLoc) locSelect.value = String(defaultLoc.id);
      }
      if (sleepoverEl) {
        sleepoverEl.checked = false;
        const startTime = document.getElementById("searchStartTime")?.value || "";
        const showSleepover = startTime >= "14:00";
        sleepoverEl.parentElement.style.display = showSleepover ? "flex" : "none";
      }
      document.getElementById("bookingStatus").textContent = "";
      document.getElementById("bookingModal").style.display = "flex";
      refreshBookingEstimate().catch(() => {});
    }

    function closeBookingModal() {
      document.getElementById("bookingModal").style.display = "none";
    }

    let favorites = new Set();
    let previewNanny = null;
    let lastResults = [];
    let lastProfileComplete = false;
    let lastCanBook = false;
    let tagOptions = [];
    let parentLocations = [];

    function updateFavoriteBtn(nannyId) {
      const btn = document.getElementById("favoriteBtn");
      if (!btn) return;
      const isFav = favorites.has(nannyId);
      btn.classList.toggle("on", isFav);
      btn.classList.toggle("off", !isFav);
    }

    function openPreview(n) {
      previewNanny = n;
      const name = formatName(n.name || ("Nanny " + n.nanny_id));
      const initials = (name || "N").trim().split(/\s+/).map(p => p[0]).join("").slice(0,2).toUpperCase();
      const avatarEl = document.getElementById("previewAvatar");
      if (n.profile_photo_url) {
        avatarEl.innerHTML = `<img src="${n.profile_photo_url}" alt="${escapeHtml(name)}" style="width:100%;height:100%;object-fit:cover;border-radius:12px;">`;
      } else {
        avatarEl.textContent = initials;
      }
      document.getElementById("previewName").textContent = name;
      const parts = [];
      if (n.average_rating_12m != null) parts.push(`⭐ ${n.average_rating_12m} (${n.review_count_12m ?? 0})`);
      else parts.push("⭐ New");
      if (n.distance_km != null) parts.push(`${Number(n.distance_km).toFixed(2)} km away`);
      if (n.location_hint) parts.push(n.location_hint);
      document.getElementById("previewMeta").textContent = parts.join(" • ");
      document.getElementById("previewBio").textContent = n.bio || "No bio yet.";

      const fitEl = document.getElementById("previewFit");
      if (bookingState.start_dt && bookingState.end_dt) {
        const start = window.formatDateTimeZA ? window.formatDateTimeZA(bookingState.start_dt) : bookingState.start_dt;
        const end = window.formatDateTimeZA ? window.formatDateTimeZA(bookingState.end_dt) : bookingState.end_dt;
        fitEl.textContent = `Matches your selected slot: ${start} to ${end}.`;
      } else {
        fitEl.textContent = "Select a date/time range to check best fit.";
      }

      const priceEl = document.getElementById("previewPrice");
      if (bookingState.start_dt && bookingState.end_dt) {
        const startMs = new Date(bookingState.start_dt).getTime();
        const endMs = new Date(bookingState.end_dt).getTime();
        const hrs = Math.max(0, (endMs - startMs) / (1000 * 60 * 60));
        const rounded = Number.isFinite(hrs) ? hrs.toFixed(1) : "-";
        priceEl.textContent = `${rounded} hours selected. Final amount is confirmed when you submit the booking request.`;
      } else {
        priceEl.textContent = "Final amount is shown when you set date/time and submit your booking request.";
      }

      const trustEl = document.getElementById("previewTrust");
      const trustBits = [];
      trustBits.push(n.approved ? "Approved by My Nanny" : "Pending approval");
      trustBits.push(n.has_identity_document ? "Identity document on file" : "Identity document pending");
      trustBits.push(n.has_passport_document ? "Passport document on file" : "Passport document pending");
      trustBits.push((n.review_count_12m || 0) > 0 ? `${n.review_count_12m} recent review(s)` : "No recent reviews yet");
      trustEl.innerHTML = trustBits.map(v => `<span class="trustPill">${escapeHtml(v)}</span>`).join("");

      const detailsEl = document.getElementById("previewDetails");
      const details = [
        ["Completed jobs", n.completed_jobs_count ?? 0],
        ["Age", n.age ?? "Not provided"],
        ["Nationality", n.nationality || "Not provided"],
        ["Languages", (n.languages || []).map(l => l.name).join(", ") || "Not provided"],
        ["Qualifications", (n.qualifications || []).map(q => q.name).join(", ") || "Not provided"],
      ];
      detailsEl.innerHTML = details
        .map(([label, value]) => `<div class="infoItem"><strong>${escapeHtml(label)}:</strong> ${escapeHtml(String(value))}</div>`)
        .join("");

      const workEl = document.getElementById("previewWorkHistory");
      const jobs = Array.isArray(n.previous_jobs) ? n.previous_jobs.filter(Boolean) : [];
      if (!jobs.length) {
        workEl.textContent = "No previous positions listed yet.";
      } else {
        workEl.innerHTML = jobs.slice(0, 3).map((job) => {
          const role = job.role || "Previous role";
          const employer = job.employer || "Employer not listed";
          const period = job.period || "Period not listed";
          const reference = [job.reference_name, job.reference_phone].filter(Boolean).join(" • ");
          const relationship = job.reference_relationship || "";
          const referenceBits = [reference, relationship].filter(Boolean).join(" • ");
          return `<div class="workItem">
            <div class="workRole">${escapeHtml(role)}</div>
            <div class="workMeta">${escapeHtml(employer)} • ${escapeHtml(period)}</div>
            <div class="workMeta">${escapeHtml(referenceBits || "Reference details not provided")}</div>
          </div>`;
        }).join("");
      }

      const profs = [];
      const tags = (n.tags || []).map(t => t.name).filter(Boolean);
      const quals = (n.qualifications || []).map(q => q.name).filter(Boolean);
      const langs = (n.languages || []).map(l => l.name).filter(Boolean);
      tags.forEach(t => profs.push(t));
      quals.forEach(q => profs.push(q));
      langs.forEach(l => profs.push(l));
      const box = document.getElementById("previewProficiencies");
      if (profs.length === 0) {
        box.textContent = "No proficiencies listed.";
      } else {
        box.innerHTML = profs.map(p => `<span class="pill">${escapeHtml(p)}</span>`).join("");
      }
      updateFavoriteBtn(n.nanny_id);
      const bookBtn = document.getElementById("bookPreviewBtn");
      if (bookBtn) {
        bookBtn.disabled = !lastCanBook;
      }
      document.getElementById("previewModal").style.display = "flex";
    }

    function closePreview() {
      document.getElementById("previewModal").style.display = "none";
      previewNanny = null;
    }

    function getCurrentPosition(opts = {}) {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
          reject(new Error("Geolocation not supported"));
          return;
        }
        navigator.geolocation.getCurrentPosition(resolve, reject, opts);
      });
    }

    async function submitBookingRequest() {
      const status = document.getElementById("bookingStatus");
      if (!bookingState.start_dt || !bookingState.end_dt) {
        status.textContent = "Select date and time first";
        return;
      }
      const locConfirm = document.getElementById("bookingLocationConfirm");
      if (locConfirm && !locConfirm.checked) {
        status.textContent = "Please confirm the location.";
        return;
      }
      const locSelect = document.getElementById("bookingLocation");
      if (locSelect && !locSelect.value) {
        status.textContent = "Please select a location.";
        return;
      }
      const notes = document.getElementById("bookingNotes").value || null;
      const locationId = locSelect ? Number(locSelect.value) : null;
      const sleepover = document.getElementById("bookingSleepover")?.checked || false;

      status.textContent = "Submitting...";
      if (bookingState.selectedNannyIds && bookingState.selectedNannyIds.length >= 1 && !bookingState.nannyId) {
        const res = await fetchJson("/booking-requests/bulk", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            nanny_ids: bookingState.selectedNannyIds,
            start_dt: bookingState.start_dt,
            end_dt: bookingState.end_dt,
            notes,
            location_id: locationId,
            sleepover
          })
        });
        const displayId = res?.group_id ?? "—";
        status.textContent = `Request submitted. Job ID: ${displayId}. We'll notify you as soon as a nanny accepts the job.`;
      } else if (bookingState.selectedNannyIds && bookingState.selectedNannyIds.length > 1) {
        const res = await fetchJson("/booking-requests/bulk", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            nanny_ids: bookingState.selectedNannyIds,
            start_dt: bookingState.start_dt,
            end_dt: bookingState.end_dt,
            notes,
            location_id: locationId,
            sleepover
          })
        });
        const displayId = res?.group_id ?? "—";
        status.textContent = `Request submitted. Job ID: ${displayId}. We'll notify you as soon as a nanny accepts the job.`;
      } else {
        const res = await fetchJson("/booking-requests", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            nanny_id: bookingState.nannyId,
            start_dt: bookingState.start_dt,
            end_dt: bookingState.end_dt,
            notes,
            location_id: locationId,
            sleepover
          })
        });
        const displayId = res?.group_id ?? res?.booking_request_id ?? "—";
        status.textContent = `Request submitted. Job ID: ${displayId}. We'll notify you as soon as a nanny accepts the job.`;
      }
      document.getElementById("submitBookingBtn").disabled = true;
      setTimeout(closeBookingModal, 2200);
    }

    function buildIso(dateStr, timeStr) {
      if (!dateStr || !timeStr) return null;
      const d = new Date(`${dateStr}T${timeStr}`);
      if (Number.isNaN(d.getTime())) return null;
      return d.toISOString();
    }

    function initSearchCalendar() {
      const calendarEl = document.getElementById("searchCalendar");
      if (!calendarEl || typeof FullCalendar === "undefined") return null;

      let selectedBlockEvent = null;
      const deleteModal = document.getElementById("deleteBlockModal");
      const deleteText = document.getElementById("deleteBlockText");
      const cancelBtn = document.getElementById("cancelDeleteBlockBtn");
      const duplicateBtn = document.getElementById("duplicateBlockBtn");
      const confirmBtn = document.getElementById("confirmDeleteBlockBtn");

      const cleanupModal = () => {
        if (deleteModal) deleteModal.style.display = "none";
        selectedBlockEvent = null;
      };

      const onDuplicate = () => {
        if (!selectedBlockEvent) return;
        const start = selectedBlockEvent.start;
        const end = selectedBlockEvent.end || selectedBlockEvent.start;
        const durationMs = (end.getTime() - start.getTime()) || (60 * 60 * 1000);
        const nextDayStart = new Date(start);
        nextDayStart.setDate(nextDayStart.getDate() + 1);
        const nextDayEnd = new Date(nextDayStart.getTime() + durationMs);
        // Use the calendar instance rather than relying on the EventApi having a calendar property.
        calendar.addEvent({
          id: `search-${Date.now()}-${Math.random().toString(16).slice(2)}`,
          start: nextDayStart.toISOString(),
          end: nextDayEnd.toISOString(),
          title: selectedBlockEvent.title,
          color: selectedBlockEvent.backgroundColor || 'blue',
          extendedProps: {
            originalStart: start.toISOString(),
            originalEnd: end.toISOString(),
          }
        });
        cleanupModal();
      };

      const onConfirm = () => {
        if (!selectedBlockEvent) return;
        selectedBlockEvent.remove();
        cleanupModal();
      };

      if (cancelBtn) cancelBtn.addEventListener("click", cleanupModal);
      if (duplicateBtn) duplicateBtn.addEventListener("click", onDuplicate);
      if (confirmBtn) confirmBtn.addEventListener("click", onConfirm);

      const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: "timeGridWeek",
        headerToolbar: {
          left: "prev,next today",
          center: "title",
          right: "timeGridWeek,timeGridDay",
        },
        nowIndicator: true,
        // Increase height so more time slots are visible without scrolling
        height: 600,
        selectable: true,
        editable: true,
        eventStartEditable: true,
        eventDurationEditable: true,
        // Keep a small drag threshold so simple clicks still trigger eventClick.
        eventDragMinDistance: 5,
        select: (info) => {
          const start = info.start;
          const end = info.end;
          const startDate = start.toISOString().slice(0, 10);
          const endDate = end.toISOString().slice(0, 10);
          const startTime = start.toISOString().slice(11, 16);
          const endTime = end.toISOString().slice(11, 16);

          if (startDate === endDate) {
            // Single day selection
            setInputValue("searchDate", startDate);
            setInputValue("searchStartTime", startTime);
            setInputValue("searchEndTime", endTime);
            calendar.addEvent({
              id: `search-${Date.now()}-${Math.random().toString(16).slice(2)}`,
              start: start.toISOString(),
              end: end.toISOString(),
              title: 'Search Time',
              color: 'blue',
              extendedProps: {
                originalStart: start.toISOString(),
                originalEnd: end.toISOString(),
              }
            });
            document.getElementById("searchBtn").click();
          } else {
            // Multi-day selection: apply the time range to each day in the range
            const startD = new Date(startDate);
            const endD = new Date(endDate);
            const days = [];
            let current = new Date(startD);
            while (current <= endD) {
              const dayName = current.toLocaleDateString('en-US', { weekday: 'short' });
              days.push(dayName);
              const dayStart = new Date(current);
              dayStart.setHours(start.getHours(), start.getMinutes());
              const dayEnd = new Date(current);
              dayEnd.setHours(end.getHours(), end.getMinutes());
              calendar.addEvent({
                id: `search-${Date.now()}-${Math.random().toString(16).slice(2)}`,
                start: dayStart.toISOString(),
                end: dayEnd.toISOString(),
                title: 'Search Time',
                color: 'blue',
                extendedProps: {
                  originalStart: dayStart.toISOString(),
                  originalEnd: dayEnd.toISOString(),
                }
              });
              current.setDate(current.getDate() + 1);
            }
            const data = {
              startDate: startDate,
              endDate: endDate,
              startTime: startTime,
              endTime: endTime,
              days: days,
              weeks: 1
            };
            localStorage.setItem("parentMultiDayRequest", JSON.stringify(data));
            setInputValue("searchDate", startDate);
            setInputValue("searchStartTime", startTime);
            setInputValue("searchEndTime", endTime);
            const label = document.getElementById("searchDateLabel");
            if (label) {
              label.textContent = `Dates (${startDate} to ${endDate})`;
            }
            const notice = document.getElementById("multiDayNotice");
            if (notice) {
              notice.textContent = `Multiple days: ${days.join(", ")} for 1 week, ${startTime}–${endTime}.`;
              notice.style.display = "block";
            }
            document.getElementById("searchBtn").click();
          }
          calendar.unselect();
        },
        eventClick: (info) => {
          selectedBlockEvent = info.event;
          const deleteText = document.getElementById("deleteBlockText");
          if (!deleteText) return;
          const start = info.event.start;
          const end = info.event.end || info.event.start;
          deleteText.textContent = `Block ${start.toLocaleString()} → ${end.toLocaleString()}`;
          const deleteModal = document.getElementById("deleteBlockModal");
          if (deleteModal) deleteModal.style.display = "flex";
        },
        eventDragStart: (info) => {
          // Remember the original time range so we can restore it after dragging.
          info.event.setExtendedProp("_origStart", info.event.start ? info.event.start.toISOString() : null);
          info.event.setExtendedProp("_origEnd", info.event.end ? info.event.end.toISOString() : null);
          if (info.el) {
            info.el.style.opacity = "0.4";
          }
        },
        eventDragStop: (info) => {
          if (info.el) {
            info.el.style.opacity = "";
          }
        },
        eventDrop: (info) => {
          const origStartStr = info.event.extendedProps.originalStart;
          const origEndStr = info.event.extendedProps.originalEnd;
          if (!origStartStr) {
            info.revert();
            return;
          }

          const originalStart = new Date(origStartStr);
          const originalEnd = origEndStr ? new Date(origEndStr) : new Date(origStartStr);
          const newStart = info.event.start;
          if (!newStart) {
            info.revert();
            return;
          }

          const sameDay = originalStart.toISOString().slice(0, 10) === newStart.toISOString().slice(0, 10);
          if (!sameDay) {
            // Create a copy on the dropped day with the same duration.
            const durationMs = (originalEnd.getTime() - originalStart.getTime()) || (60 * 60 * 1000);
            const newEnd = new Date(newStart.getTime() + durationMs);
            info.calendar.addEvent({
              id: `search-${Date.now()}-${Math.random().toString(16).slice(2)}`,
              start: newStart.toISOString(),
              end: newEnd.toISOString(),
              title: info.event.title,
              color: info.event.backgroundColor || 'blue',
              extendedProps: {
                originalStart: originalStart.toISOString(),
                originalEnd: originalEnd.toISOString(),
              }
            });
          }

          // Always revert so the original stays unchanged.
          info.revert();
        },
        events: []
      });

      calendar.render();
      return calendar;
    }

    function renderStoredMultiDaySelection(calendar, data) {
      if (!calendar || !data || !data.startDate || !data.startTime || !data.endTime) return;
      const dayMap = { Sun: 0, Mon: 1, Tue: 2, Wed: 3, Thu: 4, Fri: 5, Sat: 6 };
      const wantedDays = new Set((Array.isArray(data.days) ? data.days : []).map(d => dayMap[d]).filter(d => d !== undefined));
      if (!wantedDays.size) return;
      const weeks = Math.max(1, Number(data.weeks || 1));
      const startDate = new Date(`${data.startDate}T00:00:00`);
      if (Number.isNaN(startDate.getTime())) return;
      const [startHour, startMin] = String(data.startTime).split(":").map(v => Number(v));
      const [endHour, endMin] = String(data.endTime).split(":").map(v => Number(v));
      if (!Number.isFinite(startHour) || !Number.isFinite(startMin) || !Number.isFinite(endHour) || !Number.isFinite(endMin)) return;

      calendar.getEvents().forEach(evt => {
        if (String(evt.id || "").startsWith("search-")) evt.remove();
      });

      const totalDays = weeks * 7;
      for (let i = 0; i < totalDays; i++) {
        const day = new Date(startDate);
        day.setDate(startDate.getDate() + i);
        if (!wantedDays.has(day.getDay())) continue;

        const blockStart = new Date(day);
        blockStart.setHours(startHour, startMin, 0, 0);
        const blockEnd = new Date(day);
        blockEnd.setHours(endHour, endMin, 0, 0);
        if (blockEnd <= blockStart) continue;

        calendar.addEvent({
          id: `search-${Date.now()}-${Math.random().toString(16).slice(2)}`,
          start: blockStart.toISOString(),
          end: blockEnd.toISOString(),
          title: "Search Time",
          color: "blue",
          extendedProps: {
            originalStart: blockStart.toISOString(),
            originalEnd: blockEnd.toISOString(),
          }
        });
      }

      calendar.gotoDate(startDate);
    }

    function setInputValue(id, value) {
      const el = document.getElementById(id);
      if (el && value != null && value !== "") {
        el.value = value;
      }
    }

    function computeLastMultiDate(startDateStr, weeks, days) {
      if (!startDateStr || !Array.isArray(days) || days.length === 0) return null;
      const dayMap = { Sun: 0, Mon: 1, Tue: 2, Wed: 3, Thu: 4, Fri: 5, Sat: 6 };
      const wanted = new Set(days.map(d => dayMap[d]).filter(d => d !== undefined));
      if (wanted.size === 0) return null;
      const start = new Date(startDateStr + "T00:00:00");
      if (Number.isNaN(start.getTime())) return null;
      let last = null;
      const totalDays = Math.max(1, Number(weeks || 1)) * 7;
      for (let i = 0; i < totalDays; i++) {
        const d = new Date(start);
        d.setDate(start.getDate() + i);
        if (wanted.has(d.getDay())) {
          last = d;
        }
      }
      return last;
    }

    function getSelectedTagNames() {
      const checked = Array.from(document.querySelectorAll("#filterTags input[type=\"checkbox\"]:checked"));
      return checked.map(i => i.value);
    }

    function applyFilters(results) {
      let filtered = [...results];
      const onlyFav = document.getElementById("filterFavorites").checked;
      const onlyRated = document.getElementById("filterRated").checked;
      const maxDist = Number(document.getElementById("filterDistance").value || 0);
      const selectedTags = new Set(getSelectedTagNames());

      if (onlyFav) {
        filtered = filtered.filter(n => favorites.has(n.nanny_id));
      }
      if (onlyRated) {
        filtered = filtered.filter(n => n.average_rating_12m !== null && n.average_rating_12m !== undefined);
      }
      if (maxDist) {
        filtered = filtered.filter(n => n.distance_km !== null && n.distance_km !== undefined && Number(n.distance_km) <= maxDist);
      }
      if (selectedTags.size > 0) {
        filtered = filtered.filter(n => {
          const names = (n.tags || []).map(t => t.name);
          return names.some(name => selectedTags.has(name));
        });
      }
      return filtered;
    }

    function renderResults(results, profileComplete, canBook) {
      const list = document.getElementById("list");
      list.innerHTML = "";
      results.forEach(n => {
        try {
          list.insertAdjacentHTML("beforeend", card(n, profileComplete, canBook));
        } catch (e) {
          console.error("Failed to render nanny", n?.nanny_id, e);
        }
      });

      list.querySelectorAll(".previewBtn").forEach(btn => {
        btn.addEventListener("click", () => {
          const nannyId = Number(btn.dataset.nannyId);
          const match = results.find(r => r.nanny_id === nannyId);
          if (match) {
            openPreview(match);
          }
        });
      });

      list.querySelectorAll(".bookBtn").forEach(btn => {
        btn.addEventListener("click", async () => {
          openBookingModal(Number(btn.dataset.nannyId), btn.dataset.nannyName || "Nanny");
        });
      });

      list.querySelectorAll(".selectNanny").forEach(box => {
        box.addEventListener("change", () => {
          const id = Number(box.dataset.nannyId);
          if (box.checked) selectedNannies.add(id);
          else selectedNannies.delete(id);
          updateSelectedButton();
        });
      });
      updateSelectedButton();
    }

    function refreshFilters(profileComplete, canBook) {
      const filtered = applyFilters(lastResults);
      document.getElementById("status").textContent = filtered.length + " nannies found";
      renderResults(filtered, profileComplete, canBook);
    }

    function updateSelectedButton() {
      const btn = document.getElementById("requestSelectedBtn");
      if (!btn) return;
      const count = selectedNannies.size;
      btn.disabled = count === 0;
      btn.textContent = count ? `Request selected nannies (${count})` : "Request selected nannies";
    }

    async function runSearch(){
      await guard();
      const dateStr = document.getElementById("searchDate").value;
      const startTime = document.getElementById("searchStartTime").value;
      const endTime = document.getElementById("searchEndTime").value;
      const startDt = buildIso(dateStr, startTime);
      const endDt = buildIso(dateStr, endTime);

      if (!startDt || !endDt) {
        document.getElementById("status").textContent = "Select date, start time, and end time";
        return;
      }
      if (new Date(endDt) <= new Date(startDt)) {
        document.getElementById("status").textContent = "End time must be after start time";
        return;
      }

      const status = await fetchJson("/parents/me/profile-status");
      document.getElementById("status").textContent = "Loading...";
      const profileComplete = !!status?.is_profile_complete;

      const locations = await fetchJson("/parents/me/locations");
      const defaultLoc = (locations || []).find(l => l.is_default) || (locations || []).find(l => l.lat != null && l.lng != null);
      let lat = defaultLoc?.lat ?? null;
      let lng = defaultLoc?.lng ?? null;

      if (!profileComplete) {
        try {
          const pos = await getCurrentPosition({ enableHighAccuracy: true, timeout: 6000, maximumAge: 60000 });
          lat = pos.coords.latitude;
          lng = pos.coords.longitude;
        } catch {
          // fallback to default location if geolocation fails
        }
      }

      if (lat == null || lng == null) {
        throw new Error("Location required");
      }
      const body = {
        lat,
        lng,
        start_dt: startDt,
        end_dt: endDt,
        max_distance_km: 50
      };
      const data = await fetchJson("/nannies/search-by-time", {
        method: "POST",
        body: JSON.stringify(body)
      });

      console.log("search response", data);
      console.log("nannies length", (data.results || []).length, data.results || []);

      bookingState.start_dt = startDt;
      bookingState.end_dt = endDt;

      const results = data.results || [];
      lastResults = Array.isArray(results) ? results : [];
      const canBook = data?.parent_profile_complete !== false;
      lastProfileComplete = !!profileComplete;
      lastCanBook = !!canBook;
      refreshFilters(lastProfileComplete, lastCanBook);
    }

    async function loadFavorites() {
      try {
        const data = await fetchJson("/parents/me/favorites");
        favorites = new Set((data?.nanny_ids || []).map(Number));
      } catch (e) {
        favorites = new Set();
      }
    }

    async function loadParentLocations() {
      try {
        const locations = await fetchJson("/parents/me/locations");
        parentLocations = Array.isArray(locations) ? locations : [];
      } catch (e) {
        parentLocations = [];
      }
    }

    document.getElementById("cancelBookingBtn").addEventListener("click", closeBookingModal);
    document.getElementById("submitBookingBtn").addEventListener("click", () => {
      submitBookingRequest().catch(e => {
        document.getElementById("bookingStatus").textContent = e.message || "Error";
      });
    });
    document.getElementById("bookingSleepover").addEventListener("change", () => {
      refreshBookingEstimate().catch(() => {});
    });

    document.getElementById("closePreviewBtn").addEventListener("click", closePreview);
    document.getElementById("previewModal").addEventListener("click", (e) => {
      if (e.target.id === "previewModal") closePreview();
    });
    document.getElementById("selectPreviewBtn").addEventListener("click", () => {
      if (!previewNanny) return;
      selectedNannies.add(previewNanny.nanny_id);
      const requestBtn = document.getElementById("requestSelectedBtn");
      if (requestBtn) requestBtn.disabled = selectedNannies.size === 0;
      renderResults(lastResults, lastProfileComplete, lastCanBook);
      closePreview();
    });
    document.getElementById("bookPreviewBtn").addEventListener("click", () => {
      if (!previewNanny) return;
      if (!lastCanBook) return;
      const name = formatName(previewNanny.name || ("Nanny " + previewNanny.nanny_id));
      openBookingModal(previewNanny.nanny_id, name);
      closePreview();
    });
    document.getElementById("favoriteBtn").addEventListener("click", async () => {
      if (!previewNanny) return;
      const nannyId = previewNanny.nanny_id;
      const isFav = favorites.has(nannyId);
      try {
        if (isFav) {
          await fetchJson(`/parents/me/favorites/${nannyId}`, { method: "DELETE" });
          favorites.delete(nannyId);
        } else {
          await fetchJson(`/parents/me/favorites/${nannyId}`, { method: "POST" });
          favorites.add(nannyId);
        }
        updateFavoriteBtn(nannyId);
      } catch (e) {
        console.error("Favorite toggle failed", e);
      }
    });

    document.getElementById("searchBtn").addEventListener("click", () => {
      document.getElementById("submitBookingBtn").disabled = false;
      runSearch().catch(e => { document.getElementById("status").textContent = "Error: " + e.message; });
    });

    document.getElementById("requestSelectedBtn").addEventListener("click", () => {
      const ids = Array.from(selectedNannies);
      if (!ids.length) return;
      openBookingModal(null, "", ids);
    });

    guard().then(async () => {
      await loadFavorites();
      await loadParentLocations();
      try {
        const tagData = await fetchJson("/nanny-tags");
        tagOptions = Array.isArray(tagData) ? tagData : [];
      } catch {
        tagOptions = [];
      }
      const tagRoot = document.getElementById("filterTags");
      if (tagRoot && tagOptions.length) {
        tagRoot.innerHTML = tagOptions.map(t => `<label><input type="checkbox" value="${escapeHtml(t.name)}"> ${escapeHtml(t.name)}</label>`).join("");
      }
      document.querySelectorAll("#filterFavorites,#filterRated,#filterDistance,#filterTags input[type=\"checkbox\"]").forEach(el => {
        el.addEventListener("change", () => {
          refreshFilters(lastProfileComplete, lastCanBook);
        });
      });
      const params = new URLSearchParams(window.location.search);
      let multiData = null;
      if (params.get("multi") === "1") {
        try {
          const raw = localStorage.getItem("parentMultiDayRequest");
          if (raw) {
            const data = JSON.parse(raw);
            multiData = data;
            if (data?.startDate) setInputValue("searchDate", data.startDate);
            if (data?.startTime) setInputValue("searchStartTime", data.startTime);
            if (data?.endTime) setInputValue("searchEndTime", data.endTime);
            const notice = document.getElementById("multiDayNotice");
            if (notice) {
              const days = Array.isArray(data?.days) && data.days.length ? data.days.join(", ") : "selected days";
              const weeks = Number(data?.weeks || 1);
              const timeRange = (data?.startTime || data?.endTime) ? `${data?.startTime || "--:--"}–${data?.endTime || "--:--"}` : "any time";
              notice.textContent = `Multiple days: ${days} for ${weeks} week${weeks > 1 ? "s" : ""}, ${timeRange}.`;
              notice.style.display = "block";
            }
            const label = document.getElementById("searchDateLabel");
            const last = computeLastMultiDate(data?.startDate, data?.weeks, data?.days);
            if (label && last) {
              const endStr = last.toISOString().slice(0,10);
              label.textContent = `Dates (${data?.startDate} to ${endStr})`;
            } else if (label) {
              label.textContent = "Dates (multiple days)";
            }
          }
        } catch {}
      }

      searchCalendar = initSearchCalendar();
      if (searchCalendar && multiData) {
        renderStoredMultiDaySelection(searchCalendar, multiData);
      }

      if (params.get("mode") === "all") {
        runSearch().catch(err => {
          document.getElementById("status").textContent = "Error: " + (err?.message || String(err));
        });
      }
    }).catch(() => {});
