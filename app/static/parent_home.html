<!doctype html>
<html>
<head>
  <link rel="stylesheet" href="/static/theme.css" />
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>My Nanny</title>
  <style>
    .page { max-width: 720px; margin: 40px auto; padding: 0 16px; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; }
    .sub { color: #555; margin-top: 6px; }
    .card { border: 1px solid #ddd; border-radius: 14px; padding: 18px; margin-top: 18px; }
    .btn { width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid #bbb; background: #fff; font-size: 18px; cursor: pointer; }
    .btn.primary { border-color: #1d4ed8; }
    .hint { margin: 8px 2px 0; color: #666; font-size: 14px; }
    .msg { margin-top: 12px; color: #b91c1c; }
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin: 10px 0 20px 0;
    }
    .btn.secondary{
      background:#fff;
      border:1px solid #ccc;
    }
    .modalBack{position:fixed;inset:0;background:rgba(0,0,0,0.35);display:none;align-items:center;justify-content:center;padding:20px}
    .modal{background:#fff;border-radius:12px;width:min(520px,100%);border:1px solid #ddd;padding:18px;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
    .modal h3{margin:0 0 10px}
    .modal .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .modal label{font-size:13px;color:#555}
    .modal input,.modal select{padding:10px;border-radius:10px;border:1px solid #ccc}
    .modal .actions{display:flex;justify-content:flex-end;gap:10px;margin-top:14px}
    .weekdays{display:flex;flex-wrap:wrap;gap:8px}
    .weekdays label{display:flex;align-items:center;gap:6px;font-size:13px}
    .choiceList{display:flex;flex-direction:column;gap:8px;margin-top:12px}
    .choiceHint{margin-left:24px;color:#666;font-size:13px}
    .choicePanel{display:none;width:100%;margin-left:24px}
    .choiceStatus{min-height:18px;color:#b91c1c;font-size:13px}
  </style>
</head>
<body>
  <div class="page">
    <div id="topbar" class="topbar" data-disable-logout="true"></div>
    <h1>Welcome to My Nanny</h1>
    <p class="sub">We’ll help you get the help you deserve</p>

    <div class="card">
      <div id="banner" class="muted" style="margin-bottom:10px;"></div>
      <button id="btnCandidates" class="btn primary">View Candidates/Request Nannies</button>

      <div style="height:12px"></div>

      <button id="btnJobs" class="btn">My Bookings</button>

      <div style="height:12px"></div>

      <button id="btnProfile" class="btn">My Profile</button>

      <div style="height:12px"></div>

      <button id="btnFavorites" class="btn">My Favourites</button>
    </div>

    <div id="msg" class="msg"></div>
    <button id="logoutBottom" class="btn secondary" style="margin-top:24px; display:none;">Log out</button>
  </div>

  <div id="requestTypeModal" class="modalBack">
    <div class="modal">
      <h3>Request type</h3>
      <div class="row" style="flex-direction:column;align-items:flex-start;gap:8px;">
        <label><input type="radio" name="requestType" value="booking" checked> Make a booking</label>
        <label><input type="radio" name="requestType" value="permanent"> Permanent placement</label>
      </div>
      <div class="actions">
        <button class="btn secondary" id="requestTypeCancel" type="button">Cancel</button>
        <button class="btn" id="requestTypeNext" type="button">Continue</button>
      </div>
    </div>
  </div>

  <div id="multiDayModal" class="modalBack">
    <div class="modal">
      <h3>Choose days</h3>
      <div class="row">
        <div style="display:flex;flex-direction:column;gap:6px;">
          <label>Start date</label>
          <input id="multiStartDate" type="date">
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;">
          <label>Repeat until</label>
          <input id="multiEndDate" type="date">
        </div>
      </div>
      <div style="margin-top:10px">
        <label>Repeat booking on:</label>
        <div class="weekdays">
          <label><input type="checkbox" value="Mon" checked> Mon</label>
          <label><input type="checkbox" value="Tue" checked> Tue</label>
          <label><input type="checkbox" value="Wed" checked> Wed</label>
          <label><input type="checkbox" value="Thu" checked> Thu</label>
          <label><input type="checkbox" value="Fri" checked> Fri</label>
          <label><input type="checkbox" value="Sat"> Sat</label>
          <label><input type="checkbox" value="Sun"> Sun</label>
        </div>
      </div>
      <div class="row" style="margin-top:10px">
        <div style="display:flex;flex-direction:column;gap:6px;">
          <label>Arrival time</label>
          <input id="multiStartTime" type="time" required>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;">
          <label>Finishing time</label>
          <input id="multiEndTime" type="time" required>
        </div>
      </div>
      <div id="multiDayStatus" class="choiceStatus" style="margin-top:10px;"></div>
      <div class="actions">
        <button class="btn secondary" id="multiCancel" type="button">Cancel</button>
        <button class="btn" id="multiContinue" type="button">Continue</button>
      </div>
    </div>
  </div>

  <div id="permanentModal" class="modalBack">
    <div class="modal">
      <h3>Permanent placement</h3>
      <div class="muted">For permanent placements, please contact our admin team so we can assist you directly.</div>
      <div class="actions">
        <button class="btn" id="permanentClose" type="button">Close</button>
      </div>
    </div>
  </div>

  <div id="addressChoiceModal" class="modalBack">
    <div class="modal">
      <h3>Booking address</h3>
      <div class="muted">Should the booking take place at your default home address, or a different address?</div>
      <div class="choiceList">
        <label><input type="radio" name="bookingAddressChoice" value="default" checked> Default home address</label>
        <div id="defaultAddressHint" class="choiceHint"></div>

        <label><input type="radio" name="bookingAddressChoice" value="different"> Different address</label>
        <div id="differentAddressPanel" class="choicePanel">
          <label for="differentAddressSelect">Saved address</label>
          <select id="differentAddressSelect"></select>
          <div id="differentAddressHint" class="hint"></div>
        </div>

        <div id="addressChoiceStatus" class="choiceStatus"></div>
      </div>
      <div class="actions">
        <button class="btn secondary" id="addressChoiceCancel" type="button">Cancel</button>
        <button class="btn secondary" id="addressChoiceProfile" type="button">My Profile</button>
        <button class="btn" id="addressChoiceContinue" type="button">Continue</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js?v=2"></script>
  <script>
    (async () => {
      const BOOKING_LOCATION_STORAGE_KEY = "parentBookingLocationSelection";
      const me = await requireMe();
      if (me.role !== "parent") { location.href = "/static/login.html"; return; }

      const logoutBtn = document.getElementById("logoutBottom");
      logoutBtn.style.display = "block";
      logoutBtn.addEventListener("click", () => {
        logout();
      });

      const requestTypeModal = document.getElementById("requestTypeModal");
      const multiDayModal = document.getElementById("multiDayModal");
      const permanentModal = document.getElementById("permanentModal");
      const addressChoiceModal = document.getElementById("addressChoiceModal");
      const addressChoiceStatus = document.getElementById("addressChoiceStatus");
      const defaultAddressHint = document.getElementById("defaultAddressHint");
      const differentAddressPanel = document.getElementById("differentAddressPanel");
      const differentAddressSelect = document.getElementById("differentAddressSelect");
      const differentAddressHint = document.getElementById("differentAddressHint");
      const addressChoiceProfileBtn = document.getElementById("addressChoiceProfile");
      const multiStartDateInput = document.getElementById("multiStartDate");
      const multiEndDateInput = document.getElementById("multiEndDate");
      const multiStartTimeInput = document.getElementById("multiStartTime");
      const multiEndTimeInput = document.getElementById("multiEndTime");
      const multiDayStatus = document.getElementById("multiDayStatus");

      let parentLocations = [];
      let pendingCandidatesUrl = "/static/parent_candidates.html?mode=all";

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function formatLocationLabel(location) {
        if (!location) return "";
        const label = String(location.label || "Address").trim();
        const address = String(location.formatted_address || location.city || "").trim();
        return address ? `${label} - ${address}` : label;
      }

      function getDefaultLocation() {
        return parentLocations.find(location => location.is_default) || parentLocations[0] || null;
      }

      function getAlternateLocations() {
        const defaultLocation = getDefaultLocation();
        if (!defaultLocation) return [];
        return parentLocations.filter(location => Number(location.id) !== Number(defaultLocation.id));
      }

      async function loadParentLocations() {
        try {
          const locations = await fetchJson("/parents/me/locations");
          parentLocations = Array.isArray(locations) ? locations : [];
        } catch {
          parentLocations = [];
        }
      }

      function updateAddressChoicePanel() {
        const selectedChoice = document.querySelector("input[name=\"bookingAddressChoice\"]:checked")?.value || "default";
        const showDifferent = selectedChoice === "different";
        differentAddressPanel.style.display = showDifferent ? "block" : "none";
        addressChoiceProfileBtn.style.display = showDifferent && !getAlternateLocations().length ? "inline-block" : "none";
      }

      function populateAddressChoiceModal() {
        const defaultLocation = getDefaultLocation();
        const alternateLocations = getAlternateLocations();
        const defaultRadio = document.querySelector("input[name=\"bookingAddressChoice\"][value=\"default\"]");
        const differentRadio = document.querySelector("input[name=\"bookingAddressChoice\"][value=\"different\"]");

        defaultAddressHint.textContent = defaultLocation
          ? formatLocationLabel(defaultLocation)
          : "No saved home address yet. Add one in My Profile.";

        differentAddressSelect.innerHTML = alternateLocations.map((location) => {
          return `<option value="${location.id}">${escapeHtml(formatLocationLabel(location))}</option>`;
        }).join("");
        differentAddressHint.textContent = alternateLocations.length
          ? "Choose one of your saved addresses."
          : "No other saved addresses yet. Add one in My Profile to use a different booking address.";

        if (defaultRadio) defaultRadio.checked = true;
        if (differentRadio) differentRadio.checked = false;
        if (differentAddressSelect) differentAddressSelect.disabled = alternateLocations.length === 0;
        addressChoiceStatus.textContent = "";
        updateAddressChoicePanel();
      }

      async function openAddressChoiceModal(nextUrl) {
        pendingCandidatesUrl = nextUrl;
        await loadParentLocations();
        populateAddressChoiceModal();
        addressChoiceModal.style.display = "flex";
      }

      function persistBookingLocation(location, choice) {
        if (!location || location.id == null) {
          localStorage.removeItem(BOOKING_LOCATION_STORAGE_KEY);
          return;
        }
        localStorage.setItem(BOOKING_LOCATION_STORAGE_KEY, JSON.stringify({
          choice,
          location_id: Number(location.id),
        }));
      }

      function addDaysToDate(dateStr, daysToAdd) {
        const date = new Date(`${dateStr}T00:00:00`);
        if (Number.isNaN(date.getTime())) return "";
        date.setDate(date.getDate() + Number(daysToAdd || 0));
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
      }

      function syncMultiDayEndDate() {
        const startDate = multiStartDateInput.value || "";
        multiEndDateInput.min = startDate || "";
        if (!startDate) return;
        if (!multiEndDateInput.value || multiEndDateInput.value < startDate) {
          multiEndDateInput.value = addDaysToDate(startDate, 6);
        }
      }

      function resetMultiDayStatus() {
        if (multiDayStatus) multiDayStatus.textContent = "";
      }

      document.getElementById("btnCandidates").addEventListener("click", () => {
        if (requestTypeModal) requestTypeModal.style.display = "flex";
      });

      document.getElementById("btnProfile").addEventListener("click", () => {
        location.href = "/static/parent_profile.html";
      });
      document.getElementById("btnFavorites").addEventListener("click", () => {
        location.href = "/static/parent_favorites.html";
      });

      document.getElementById("requestTypeCancel").addEventListener("click", () => {
        requestTypeModal.style.display = "none";
      });
      document.getElementById("requestTypeNext").addEventListener("click", () => {
        const val = document.querySelector("input[name=\"requestType\"]:checked")?.value || "booking";
        requestTypeModal.style.display = "none";
        if (val === "permanent") {
          permanentModal.style.display = "flex";
          return;
        }
        openAddressChoiceModal("/static/parent_candidates.html?mode=all").catch(() => {
          addressChoiceStatus.textContent = "Unable to load your saved addresses right now.";
        });
      });

      document.getElementById("multiCancel").addEventListener("click", () => {
        resetMultiDayStatus();
        multiDayModal.style.display = "none";
      });
      document.getElementById("multiContinue").addEventListener("click", () => {
        resetMultiDayStatus();
        const startDate = multiStartDateInput.value || null;
        const endDate = multiEndDateInput.value || null;
        const days = Array.from(multiDayModal.querySelectorAll(".weekdays input:checked")).map(i => i.value);
        const startTime = multiStartTimeInput.value || null;
        const endTime = multiEndTimeInput.value || null;

        if (!startDate) {
          multiDayStatus.textContent = "Select a start date.";
          return;
        }
        if (!endDate) {
          multiDayStatus.textContent = "Select the date when the recurrence should stop.";
          return;
        }
        if (endDate < startDate) {
          multiDayStatus.textContent = "The recurrence stop date must be on or after the start date.";
          return;
        }
        if (!days.length) {
          multiDayStatus.textContent = "Select at least one day for the recurring booking.";
          return;
        }
        if (!startTime) {
          multiDayStatus.textContent = "Select an arrival time.";
          return;
        }
        if (!endTime) {
          multiDayStatus.textContent = "Select a finishing time.";
          return;
        }
        if (endTime <= startTime) {
          multiDayStatus.textContent = "Finishing time must be after arrival time.";
          return;
        }

        const payload = { startDate, endDate, days, startTime, endTime };
        localStorage.setItem("parentMultiDayRequest", JSON.stringify(payload));
        multiDayModal.style.display = "none";
        openAddressChoiceModal("/static/parent_candidates.html?mode=all&multi=1").catch(() => {
          addressChoiceStatus.textContent = "Unable to load your saved addresses right now.";
        });
      });

      document.getElementById("permanentClose").addEventListener("click", () => {
        permanentModal.style.display = "none";
      });
      document.getElementById("addressChoiceCancel").addEventListener("click", () => {
        addressChoiceModal.style.display = "none";
      });
      document.getElementById("addressChoiceProfile").addEventListener("click", () => {
        location.href = "/static/parent_profile.html";
      });
      document.querySelectorAll("input[name=\"bookingAddressChoice\"]").forEach((input) => {
        input.addEventListener("change", () => {
          addressChoiceStatus.textContent = "";
          updateAddressChoicePanel();
        });
      });
      [multiStartDateInput, multiEndDateInput, multiStartTimeInput, multiEndTimeInput].forEach((input) => {
        if (!input) return;
        input.addEventListener("input", () => {
          resetMultiDayStatus();
        });
      });
      if (multiStartDateInput) {
        multiStartDateInput.addEventListener("change", () => {
          syncMultiDayEndDate();
        });
      }
      document.getElementById("addressChoiceContinue").addEventListener("click", () => {
        const choice = document.querySelector("input[name=\"bookingAddressChoice\"]:checked")?.value || "default";
        const defaultLocation = getDefaultLocation();
        const alternateLocations = getAlternateLocations();

        if (!defaultLocation) {
          addressChoiceStatus.textContent = "Please add your home address in My Profile before continuing.";
          addressChoiceProfileBtn.style.display = "inline-block";
          return;
        }

        if (choice === "default") {
          persistBookingLocation(defaultLocation, "default");
          location.href = pendingCandidatesUrl;
          return;
        }

        const selectedLocationId = Number(differentAddressSelect.value || 0);
        const selectedLocation = alternateLocations.find((location) => Number(location.id) === selectedLocationId) || null;
        if (!selectedLocation) {
          addressChoiceStatus.textContent = "Please choose a different saved address.";
          addressChoiceProfileBtn.style.display = "inline-block";
          return;
        }

        persistBookingLocation(selectedLocation, "different");
        location.href = pendingCandidatesUrl;
      });
      document.getElementById("btnJobs").addEventListener("click", () => {
        location.href = "/static/parent_jobs.html";
      });

      try {
        const status = await fetchJson("/parents/me/profile-status");
        const complete = !!status?.is_profile_complete;
        if (!complete) {
          document.getElementById("banner").textContent = "Complete your profile to filter and book.";
        }
      } catch {}
    })().catch(e => {
      document.getElementById("msg").textContent = e.message || "Error";
    });
  </script>
</body>
</html>
