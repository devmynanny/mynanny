<!doctype html>
<html>
<head>
  <link rel="stylesheet" href="/static/theme.css" />
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Nanny Operations</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0 auto;padding:24px;max-width:900px;width:min(900px,100%)}
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin: 10px 0 20px 0;
    }
    .btn.secondary{
      background:#fff;
      border:1px solid #ccc;
    }
    .btn{padding:12px 16px;border-radius:12px;border:1px solid #ccc;background:#fff;cursor:pointer;font-size:16px}
    .card{border:1px solid #ddd;border-radius:12px;padding:16px;margin:10px 0;}
    .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
    .muted{color:#666}
  </style>
</head>
<body>
  <div id="topbar" class="topbar"></div>
  <h1>Nanny Operations</h1>

  <div class="card">
    <div class="row">
      <button class="btn" id="goAvailabilityBtn" type="button">Set availability</button>
      <button class="btn" id="goRequestsBtn" type="button">View booking requests</button>
      <button class="btn" id="goHistoryBtn" type="button">Booking history</button>
      <button class="btn" id="goProfileBtn" type="button">My profile</button>
    </div>
  </div>

  <script src="/static/app.js?v=2"></script>
  <script>
    document.getElementById("goAvailabilityBtn").addEventListener("click", () => {
      location.href = "/static/nanny_availability.html";
    });
    async function updateRequestCount() {
      const btn = document.getElementById("goRequestsBtn");
      if (!btn) return;
      try {
        const data = await fetchJson("/nannies/me/booking-requests");
        const count = (data?.results || []).length;
        btn.textContent = count ? `View booking requests (${count})` : "View booking requests";
      } catch {
        btn.textContent = "View booking requests";
      }
    }

    document.getElementById("goRequestsBtn").addEventListener("click", () => {
      location.href = "/static/nanny_requests.html";
    });
    document.getElementById("goHistoryBtn").addEventListener("click", () => {
      location.href = "/static/nanny_history.html";
    });
    document.getElementById("goProfileBtn").addEventListener("click", () => {
      location.href = "/static/nanny.html?from=ops";
    });

    (async () => {
      const me = await requireMe();
      if (me.role !== "nanny") {
        location.href = "/static/login.html";
        return;
      }
      updateRequestCount();
    })();
  </script>
</body>
</html>
