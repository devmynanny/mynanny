<!doctype html>
<html>
<head>
  <link rel="stylesheet" href="/static/theme.css" />
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin</title>
  <style>
    body { font-family: system-ui, Arial, sans-serif; max-width: 900px; margin: 28px auto; padding: 0 16px; }
    h1 { margin: 8px 0 18px; }
    h2 { margin: 26px 0 10px; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 12px; margin: 10px 0; }
    .err { color: #b00020; }
    .topbar{ display:flex; align-items:center; justify-content:space-between; margin: 10px 0 20px 0; }
    .btn{ padding:10px 14px;border-radius:10px;border:1px solid #ccc;background:#fff;cursor:pointer }
    .clickable-row{cursor:pointer}
    .clickable-row:hover{background:#f7f7f7}
    .bookingSectionTitle{margin:20px 0 8px;font-size:18px}
    .bookingEmpty{color:#666;padding:8px 0}
    .bookingRow{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid #eee}
    .bookingRow:last-child{border-bottom:0}
    .bookingMeta{color:#666;font-size:14px}
    .bookingReason{margin-top:6px;color:#7a2e2e}
    .bookingOverdue{margin-top:6px;color:#b45309;font-weight:600}
    .bookingGlance{display:grid;grid-template-columns:minmax(240px,1fr) minmax(320px,1.4fr);gap:16px;align-items:start}
    .bookingFilterBar{display:flex;justify-content:flex-end;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px;padding:12px 14px;border:1px solid #bfdbfe;border-radius:12px;background:#eff6ff}
    .bookingFilterBar label{font-size:14px;font-weight:600;color:#1e3a8a}
    .bookingFilterBar select{padding:10px 12px;border:1px solid #93c5fd;border-radius:10px;background:#fff;min-width:220px;font:inherit}
    .monthCalendar{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px}
    .calendarHead{font-size:12px;color:#666;font-weight:600;text-align:center}
    .calendarDay{min-height:76px;border:1px solid #e5e5e5;border-radius:8px;padding:6px;background:#fff;overflow:hidden}
    .calendarDayNumber{font-size:12px;color:#555;margin-bottom:4px}
    .calendarBooking{font-size:12px;line-height:1.25;border-left:3px solid var(--booking-accent,#1f7a4d);background:var(--booking-bg,#f8fafc);border-radius:8px;padding:5px 6px;margin-top:4px;white-space:normal;overflow-wrap:anywhere}
    .calendarMore{font-size:12px;color:#666;margin-top:4px}
    .bookingSectionGroup{display:block}
    .bookingSectionGroup.hidden{display:none}
    .syncOk{color:#166534}
    .syncWarn{color:#b45309}
    @media (max-width:760px){.bookingGlance{grid-template-columns:1fr}.monthCalendar{gap:4px}.calendarDay{min-height:64px;padding:5px}.calendarBooking{font-size:11px}}
    .detailGrid{display:grid;gap:10px}
    .detailSection{padding:10px 0;border-bottom:1px solid #eee}
    .detailSection:last-child{border-bottom:0}
    .detailRow{margin:4px 0}
    .detailDay{border:1px solid #eee;border-radius:10px;padding:10px;margin-top:8px}
    .modalBack{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:flex-start;justify-content:center;padding:20px;z-index:9999;overflow-y:auto}
    .modal{background:#fff;border-radius:12px;width:min(760px,100%);border:1px solid #ddd;padding:16px;max-height:calc(100vh - 40px);overflow-y:auto;margin:auto 0}
    .modalActions{display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap;margin-top:14px}
    .assignSummary{color:#555;font-size:14px;line-height:1.45}
    .assignList{display:grid;gap:10px;margin-top:12px}
    .assignOption{border:1px solid #e5e7eb;border-radius:12px;padding:12px;display:flex;gap:10px;align-items:flex-start}
    .assignOption input{margin-top:4px}
    .assignOptionTitle{font-weight:700}
    .assignOptionMeta{color:#666;font-size:14px;margin-top:4px}
    .assignAvailabilityNote{display:inline-block;margin-top:6px;padding:4px 8px;border-radius:999px;font-size:12px;font-weight:600}
    .assignAvailabilityNote.available{background:#dcfce7;color:#166534}
    .assignAvailabilityNote.manual{background:#ffedd5;color:#9a3412}
    .assignReason{width:100%;min-height:90px;padding:10px 12px;border:1px solid #d1d5db;border-radius:10px;font:inherit;margin-top:10px}
  </style>
  <script defer src="/static/nav_buttons.js"></script>
</head>
<body>
  <div class="topbar">
    <div></div>
    <button class="btn" id="logoutBtn" type="button">Log out</button>
  </div>
  <h1>Admin</h1>
  <div id="authMsg" class="err"></div>

  <div class="card">
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn" id="btnBookingRequests" type="button">Booking requests</button>
      <button class="btn" id="btnPendingNannies" type="button">Nanny applications</button>
      <button class="btn" id="btnUsers" type="button">Users</button>
      <button class="btn" id="btnBilling" type="button">Billing</button>
      <button class="btn" id="ticketsBtn" type="button">View tickets / complaints</button>
      <button class="btn" id="reportsBtn" type="button">Reports</button>
      <button class="btn" id="pricingBtn" type="button">Pricing</button>
      <button class="btn" id="integrationsBtn" type="button">Integrations</button>
      <button class="btn" id="createAdminBtn" type="button">Create admin</button>
      <button class="btn" id="btnChangeLogs" type="button" onclick="window.location.href='/static/admin_audit.html'">Change logs</button>
    </div>
  </div>

  <div id="sectionUsers" style="display:none;">
    <h2>Users</h2>
    <div class="card" style="margin-bottom:10px;">
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;">
        <label>
          Search
          <input id="userSearchFilter" type="text" placeholder="Name, phone, ID or passport" />
        </label>
        <label>
          Role
          <select id="userRoleFilter">
            <option value="">All</option>
            <option value="parent">Parents</option>
            <option value="nanny">Nannies</option>
          </select>
        </label>
        <label>
          Location
          <input id="userLocationFilter" type="text" placeholder="e.g. Cape Town" />
        </label>
        <label>
          Sort by
          <select id="userSort">
            <option value="joined_asc">First joined (oldest)</option>
            <option value="joined_desc">Last joined (newest)</option>
            <option value="activity_desc">Last activity (recent)</option>
            <option value="activity_asc">Last activity (oldest)</option>
            <option value="rating_desc">Rating (high to low)</option>
            <option value="rating_asc">Rating (low to high)</option>
          </select>
        </label>
        <button class="btn" id="applyUserFilters" type="button">Apply</button>
        <button class="btn" id="clearUserFilters" type="button">Clear</button>
      </div>
    </div>
    <div id="usersList" class="card"></div>
  </div>
  <div id="sectionPendingNannies" style="display:none;">
    <h2>Nanny applications</h2>
    <div class="card" style="margin-bottom:10px;">
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;">
        <label>
          Status
          <select id="nannyApplicationStatusFilter">
            <option value="pending">Pending</option>
            <option value="hold">On hold</option>
            <option value="approved">Approved</option>
            <option value="declined">Declined</option>
            <option value="all">All</option>
          </select>
        </label>
        <button class="btn" id="applyNannyApplicationFilter" type="button">Apply</button>
      </div>
    </div>
    <div id="pendingNanniesList" class="card"></div>
  </div>
  <div id="sectionBookingRequests" style="display:none;">
    <h2>Bookings</h2>
    <div class="card">
      <div class="bookingGlance">
        <div>
          <div class="bookingSectionTitle">Bookings tomorrow</div>
          <div id="tomorrowBookingsList"></div>
          <div class="bookingSectionTitle">Bookings in progress</div>
          <div id="inProgressBookingsList"></div>
        </div>
        <div>
          <div class="monthNav" style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;">
            <button class="btn" id="adminCalendarPrevBtn" type="button">Previous</button>
            <div class="bookingSectionTitle" id="monthCalendarTitle" style="margin:0;">Bookings this month</div>
            <button class="btn" id="adminCalendarNextBtn" type="button">Next</button>
          </div>
          <div id="monthBookingsCalendar"></div>
        </div>
      </div>
      <div class="bookingFilterBar">
        <label for="bookingSectionFilter">Filter Bookings:</label>
        <select id="bookingSectionFilter">
          <option value="">Select one</option>
          <option value="pending">Pending requests</option>
          <option value="upcoming">Upcoming bookings</option>
          <option value="past">Past bookings</option>
          <option value="cancelled">Cancelations</option>
          <option value="unsuccessful">Unsuccessful bookings</option>
        </select>
      </div>
      <div class="bookingSectionGroup" data-booking-filter="pending">
        <div class="bookingSectionTitle">Pending requests</div>
        <div id="bookingRequestsList"></div>
      </div>
      <div class="bookingSectionGroup" data-booking-filter="upcoming">
        <div class="bookingSectionTitle">Upcoming bookings</div>
        <div id="upcomingBookingsList"></div>
      </div>
      <div class="bookingSectionGroup" data-booking-filter="past">
        <div class="bookingSectionTitle">Past bookings</div>
        <div id="pastBookingsList"></div>
      </div>
      <div class="bookingSectionGroup" data-booking-filter="cancelled">
        <div class="bookingSectionTitle">Cancelations</div>
        <div id="cancelledBookingsList"></div>
      </div>
      <div class="bookingSectionGroup" data-booking-filter="unsuccessful">
        <div class="bookingSectionTitle">Unsuccessful bookings</div>
        <div id="unsuccessfulBookingsList"></div>
      </div>
    </div>
  </div>
  <div id="sectionBilling" style="display:none;">
    <h2>Billing</h2>
    <div class="card" style="display:flex;gap:10px;flex-wrap:wrap;">
      <button class="btn" id="btnInvoicing" type="button">Invoicing</button>
      <button class="btn" id="btnBillingRefunds" type="button">Refunds</button>
    </div>
  </div>
  <div id="sectionRefunds" style="display:none;">
    <h2>Refund approvals</h2>
    <div id="refundsList" class="card"></div>
  </div>
  <div id="bookingDetailCard" class="card" style="display:none;">
    <div class="row">
      <h2 style="margin:0;">Booking detail</h2>
      <button class="btn" id="closeBookingDetailBtn" type="button">Close</button>
    </div>
    <div id="bookingDetailBody" class="muted" style="margin-top:12px;">Loading...</div>
  </div>

  <div id="assignNannyModal" class="modalBack">
    <div class="modal">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
        <h2 style="margin:0;">Assign nanny manually</h2>
        <button class="btn" id="closeAssignNannyModalBtn" type="button">Close</button>
      </div>
      <div id="assignNannySummary" class="assignSummary" style="margin-top:10px;">Loading available nannies...</div>
      <div id="assignNannyList" class="assignList"></div>
      <label style="display:block; margin-top:12px;">
        <div style="font-weight:600; margin-bottom:6px;">Reason for manual assignment</div>
        <textarea id="assignNannyReason" class="assignReason" placeholder="Explain why admin is assigning this nanny manually."></textarea>
      </label>
      <div id="assignNannyError" class="err" style="margin-top:10px;"></div>
      <div class="modalActions">
        <button class="btn" id="confirmAssignNannyBtn" type="button">Assign selected nanny</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js?v=2"></script>
  <script>
    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    const logoutBtn = document.getElementById("logoutBtn");
    let currentAssignRequestId = null;
    const ADMIN_CALENDAR_COLORS = [
      { bg: "#ffedd5", accent: "#f97316" },
      { bg: "#dbeafe", accent: "#3b82f6" },
      { bg: "#dcfce7", accent: "#22c55e" },
      { bg: "#fce7f3", accent: "#ec4899" },
      { bg: "#ede9fe", accent: "#8b5cf6" },
      { bg: "#fef3c7", accent: "#d97706" },
    ];
    if (logoutBtn) {
      logoutBtn.addEventListener("click", () => {
        logout();
      });
    }

    const createAdminBtn = document.getElementById("createAdminBtn");
    if (createAdminBtn) {
      createAdminBtn.addEventListener("click", async () => {
        const email = prompt("Enter email to invite as admin");
        if (!email) return;
        const reason = prompt("Reason (optional)") || "";
        try {
          await fetchJson("/admin/invites", {
            method: "POST",
            body: JSON.stringify({ email, reason })
          });
          alert("Invite sent.");
        } catch (e) {
          alert(e.message || "Error");
        }
      });
    }

    const pricingBtn = document.getElementById("pricingBtn");
    if (pricingBtn) {
      pricingBtn.addEventListener("click", () => {
        window.location.href = "/static/admin_pricing.html";
      });
    }

    const reportsBtn = document.getElementById("reportsBtn");
    if (reportsBtn) {
      reportsBtn.addEventListener("click", () => {
        window.location.href = "/static/admin_reports.html";
      });
    }

    const ticketsBtn = document.getElementById("ticketsBtn");
    if (ticketsBtn) {
      ticketsBtn.addEventListener("click", () => {
        window.location.href = "/static/admin_tickets.html";
      });
    }

    const integrationsBtn = document.getElementById("integrationsBtn");
    if (integrationsBtn) {
      integrationsBtn.addEventListener("click", () => {
        window.location.href = "/static/admin_integrations.html";
      });
    }

    const sections = ["sectionUsers", "sectionPendingNannies", "sectionBookingRequests", "sectionBilling", "sectionRefunds"];
    function showSection(id) {
      sections.forEach(s => {
        const el = document.getElementById(s);
        if (el) el.style.display = (s === id) ? "block" : "none";
      });
      const bookingDetailCard = document.getElementById("bookingDetailCard");
      if (bookingDetailCard && id !== "sectionBookingRequests") {
        bookingDetailCard.style.display = "none";
      }
    }

    async function refreshCounts() {
      const [nannies, overview] = await Promise.all([
        fetchJson("/admin/nannies/pending"),
        fetchJson("/admin/bookings/overview")
      ]);
      const nCount = (nannies?.results || nannies || []).length;
      const rCount = (overview?.pending_requests || []).length;
      const btnNannies = document.getElementById("btnPendingNannies");
      const btnRequests = document.getElementById("btnBookingRequests");
      if (btnNannies) btnNannies.textContent = `Nanny applications (${nCount})`;
      if (btnRequests) btnRequests.textContent = `Bookings (${rCount})`;
    }

    let usersCache = [];
    let adminCalendarItems = [];
    let currentAdminCalendarMonth = null;

    function renderUsers(users) {
      const container = document.getElementById("usersList");
      container.innerHTML = "";
      (users || []).forEach(u => {
        const row = document.createElement("div");
        row.className = "clickable-row";
        row.style.display = "flex";
        row.style.justifyContent = "space-between";
        row.style.gap = "10px";
        row.style.alignItems = "center";
        row.style.padding = "8px 0";
        row.style.borderBottom = "1px solid #eee";
        const loc = u.location?.label || "-";
        const rating = (u.rating === null || u.rating === undefined) ? "-" : `${u.rating} (${u.review_count || 0})`;
        const joined = u.joined_at ? (window.formatDateTimeZA ? window.formatDateTimeZA(u.joined_at) : new Date(u.joined_at).toLocaleString()) : "-";
        const lastActive = u.last_activity_at ? (window.formatDateTimeZA ? window.formatDateTimeZA(u.last_activity_at) : new Date(u.last_activity_at).toLocaleString()) : "-";
        const phoneBits = [u.phone, u.phone_alt].filter(Boolean);
        const identityDoc = u.sa_id_number || u.passport_number || "-";
        row.innerHTML = `
          <div>
            <div><strong>${u.name || "-"}</strong></div>
            <div class="muted">Email: ${u.email || "-"} | Role: ${u.role || "-"} | Admin: ${u.is_admin ? "Yes" : "No"} | Rating: ${rating}</div>
            <div class="muted">Phone: ${phoneBits.length ? phoneBits.join(" | ") : "-"} | ID / Passport: ${identityDoc} | Location: ${loc}</div>
            <div class="muted">Joined: ${joined} | Last activity: ${lastActive}</div>
          </div>
        `;
        row.dataset.userId = u.id;
        container.appendChild(row);
      });
    }

    function applyUserFilters() {
      const search = (document.getElementById("userSearchFilter").value || "").trim().toLowerCase();
      const role = (document.getElementById("userRoleFilter").value || "").toLowerCase();
      const loc = (document.getElementById("userLocationFilter").value || "").trim().toLowerCase();
      const sort = document.getElementById("userSort").value;

      let list = (usersCache || []).slice();
      if (search) {
        list = list.filter(u => {
          const haystack = [
            u.name,
            u.email,
            u.phone,
            u.phone_alt,
            u.sa_id_number,
            u.passport_number,
          ].map(value => String(value || "").toLowerCase());
          return haystack.some(value => value.includes(search));
        });
      }
      if (role) list = list.filter(u => (u.role || "").toLowerCase() === role);
      if (loc) {
        list = list.filter(u => {
          const label = (u.location?.label || "").toLowerCase();
          return label.includes(loc);
        });
      }

      const toTs = (v) => {
        if (!v) return 0;
        const d = new Date(v);
        return Number.isNaN(d.getTime()) ? 0 : d.getTime();
      };
      const toRating = (v) => {
        const n = Number(v);
        return Number.isFinite(n) ? n : -1;
      };
      if (sort === "joined_asc") list.sort((a, b) => toTs(a.joined_at) - toTs(b.joined_at));
      if (sort === "joined_desc") list.sort((a, b) => toTs(b.joined_at) - toTs(a.joined_at));
      if (sort === "activity_desc") list.sort((a, b) => toTs(b.last_activity_at) - toTs(a.last_activity_at));
      if (sort === "activity_asc") list.sort((a, b) => toTs(a.last_activity_at) - toTs(b.last_activity_at));
      if (sort === "rating_desc") list.sort((a, b) => toRating(b.rating) - toRating(a.rating));
      if (sort === "rating_asc") list.sort((a, b) => toRating(a.rating) - toRating(b.rating));

      renderUsers(list);
    }

    async function loadUsers() {
      const users = await fetchJson("/admin/users");
      usersCache = users || [];
      applyUserFilters();
    }

    async function loadPendingNannies() {
      const status = document.getElementById("nannyApplicationStatusFilter")?.value || "pending";
      const data = await fetchJson(`/admin/nannies/applications?status=${encodeURIComponent(status)}`);
      const list = data?.results || data || [];
      const container = document.getElementById("pendingNanniesList");
      container.innerHTML = "";
      if (!list.length) {
        container.innerHTML = "<div class=\"muted\">No nanny applications for this status.</div>";
        return;
      }
      list.forEach(n => {
        const row = document.createElement("div");
        row.style.display = "flex";
        row.style.justifyContent = "space-between";
        row.style.gap = "10px";
        row.style.alignItems = "center";
        row.style.padding = "8px 0";
        row.style.borderBottom = "1px solid #eee";
        const statusLine = n.application_status ? ` | Status: ${n.application_status}` : "";
        row.innerHTML = `
          <div>
            <div><strong>${n.name || "Nanny"}</strong></div>
            <div class="muted">${n.email || "-"}${statusLine}</div>
          </div>
          <div>
            <button class="btn viewNannyBtn" data-user-id="${n.user_id}">View application</button>
          </div>
        `;
        container.appendChild(row);
      });
    }

    function getAdminBookingColor(item) {
      const key = String(item?.request_id || item?.booking_id || item?.id || "");
      let hash = 0;
      for (let i = 0; i < key.length; i += 1) {
        hash = (hash * 31 + key.charCodeAt(i)) >>> 0;
      }
      return ADMIN_CALENDAR_COLORS[hash % ADMIN_CALENDAR_COLORS.length];
    }

    function applyBookingSectionFilter() {
      const selected = document.getElementById("bookingSectionFilter")?.value || "";
      document.querySelectorAll(".bookingSectionGroup").forEach((section) => {
        const key = section.getAttribute("data-booking-filter");
        const shouldShow = !!selected && selected === key;
        section.classList.toggle("hidden", !shouldShow);
      });
    }

    function renderBookingCollection(containerId, list, options = {}) {
      const container = document.getElementById(containerId);
      if (!container) return;
      container.innerHTML = "";
      const items = Array.isArray(list) ? list : [];
      if (!items.length) {
        container.innerHTML = `<div class="bookingEmpty">${options.emptyText || "No bookings in this section."}</div>`;
        return;
      }
      items.forEach(r => {
        const bookingRange = formatAdminBookingRange(r.start_dt, r.end_dt);
        const parentLine = escapeHtml(r.parent_name || "Client");
        const nannyName = escapeHtml(r.nanny_name || "Nanny");
        const row = document.createElement("div");
        row.className = "bookingRow";
        const reasonLine = r.reason ? `<div class="bookingReason"><strong>Reason:</strong> ${escapeHtml(r.reason)}</div>` : "";
        const locationLine = r.location_label ? `<div class="bookingMeta">Location: ${escapeHtml(r.location_label)}</div>` : "";
        const overdueLine = r.is_overdue ? `<div class="bookingOverdue">Overdue: no acceptance after 6 hours</div>` : "";
        const calendarLine = r.google_calendar_event_id
          ? `<div class="bookingMeta syncOk">Google Calendar: synced</div>`
          : (r.google_calendar_sync_error ? `<div class="bookingMeta syncWarn">Google Calendar: ${escapeHtml(r.google_calendar_sync_error)}</div>` : "");
        const refLine = r.booking_id
          ? `Booking #${escapeHtml(r.booking_id)}${r.request_id ? ` • Request #${escapeHtml(r.request_id)}` : ""}`
          : `Request #${escapeHtml(r.request_id || r.id || "-")}`;
        row.innerHTML = `
          <div>
            <div><strong>${parentLine}</strong> → <strong>${nannyName}</strong></div>
            <div class="bookingMeta">${refLine}</div>
            <div class="bookingMeta">${escapeHtml(bookingRange)}</div>
            <div class="bookingMeta">Status: ${escapeHtml(r.status || "-")}</div>
            ${locationLine}
            ${reasonLine}
            ${overdueLine}
            ${calendarLine}
          </div>
          <div>
            <button class="btn viewBookingBtn" data-id="${r.request_id || r.id}">View</button>
            ${options.showActions ? `<button class="btn approveRequestBtn" data-id="${r.request_id || r.id}">Approve</button>
            <button class="btn rejectRequestBtn" data-id="${r.request_id || r.id}">Reject</button>
            <button class="btn assignBookingBtn" data-id="${r.request_id || r.id}">Assign nanny</button>` : ""}
          </div>
        `;
        container.appendChild(row);
      });
    }

    function toAdminLocalDateParts(date) {
      const formatter = new Intl.DateTimeFormat("en-CA", {
        timeZone: "Africa/Johannesburg",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
      });
      const parts = formatter.formatToParts(date);
      const year = parts.find((part) => part.type === "year")?.value;
      const month = parts.find((part) => part.type === "month")?.value;
      const day = parts.find((part) => part.type === "day")?.value;
      return { year: Number(year), month: Number(month), day: Number(day) };
    }

    function formatAdminDateLabel(value) {
      const dt = value ? new Date(value) : null;
      if (!dt || Number.isNaN(dt.getTime())) return "-";
      return new Intl.DateTimeFormat("en-ZA", {
        day: "numeric",
        month: "long",
        year: "numeric",
        timeZone: "Africa/Johannesburg",
      }).format(dt);
    }

    function formatAdminCalendarTime(value) {
      const dt = value ? new Date(value) : null;
      if (!dt || Number.isNaN(dt.getTime())) return "";
      return new Intl.DateTimeFormat("en-ZA", {
        hour: "numeric",
        minute: "2-digit",
        hour12: false,
        timeZone: "Africa/Johannesburg",
      }).format(dt);
    }

    function formatAdminBookingRange(startValue, endValue) {
      if (!startValue || !endValue) return "-";
      const startDate = formatAdminDateLabel(startValue);
      const endDate = formatAdminDateLabel(endValue);
      const timeRange = `${formatAdminCalendarTime(startValue)}-${formatAdminCalendarTime(endValue)}`;
      if (startDate === endDate) return `${startDate}: ${timeRange}`;
      return `${startDate} - ${endDate}: ${timeRange}`;
    }

    function buildAdminCalendarItems(data) {
      const combined = Array.isArray(data?.confirmed_bookings) && data.confirmed_bookings.length
        ? data.confirmed_bookings
        : [
            ...(Array.isArray(data?.upcoming_bookings) ? data.upcoming_bookings : []),
            ...(Array.isArray(data?.bookings_in_progress) ? data.bookings_in_progress : []),
            ...(Array.isArray(data?.past_bookings) ? data.past_bookings : []),
          ];
      const deduped = new Map();
      combined.forEach((item) => {
        const key = String(item?.booking_id || item?.request_id || item?.id || "");
        if (!key) return;
        if (!deduped.has(key)) deduped.set(key, item);
      });
      return Array.from(deduped.values()).filter((item) => !["cancelled", "rejected"].includes(String(item?.status || "").toLowerCase()));
    }

    function renderMonthCalendar(monthDate, items) {
      const title = document.getElementById("monthCalendarTitle");
      const container = document.getElementById("monthBookingsCalendar");
      if (!container) return;
      if (!monthDate) return;
      if (title) {
        title.textContent = `Bookings for ${monthDate.toLocaleDateString("en-ZA", { month: "long", year: "numeric" })}`;
      }
      const year = monthDate.getFullYear();
      const month = monthDate.getMonth();
      const first = new Date(year, month, 1);
      const last = new Date(year, month + 1, 0);
      const totalDays = last.getDate();
      const offset = first.getDay();
      const byDate = new Map();
      (Array.isArray(items) ? items : []).forEach((item) => {
        const dt = item?.start_dt ? new Date(item.start_dt) : null;
        if (!dt || Number.isNaN(dt.getTime())) return;
        const parts = toAdminLocalDateParts(dt);
        if (parts.year !== year || (parts.month - 1) !== month) return;
        const key = `${parts.year}-${String(parts.month).padStart(2, "0")}-${String(parts.day).padStart(2, "0")}`;
        if (!byDate.has(key)) byDate.set(key, []);
        byDate.get(key).push(item);
      });
      const heads = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"].map((d) => `<div class="calendarHead">${d}</div>`).join("");
      const blanks = Array.from({ length: offset }, () => `<div></div>`).join("");
      const cells = Array.from({ length: totalDays }, (_, index) => {
        const day = index + 1;
        const key = `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
        const bookings = byDate.get(key) || [];
        const shown = bookings.slice(0, 2).map((b) => {
          const time = `${formatAdminCalendarTime(b.start_dt)}-${formatAdminCalendarTime(b.end_dt)}`;
          const colors = getAdminBookingColor(b);
          return `<div class="calendarBooking" style="--booking-bg:${escapeHtml(colors.bg)};--booking-accent:${escapeHtml(colors.accent)}" title="${escapeHtml((b.parent_name || "Client") + " with " + (b.nanny_name || "Nanny"))}">${escapeHtml(time)} ${escapeHtml(b.nanny_name || "Nanny")} / ${escapeHtml(b.parent_name || "Client")}</div>`;
        }).join("");
        const more = bookings.length > 2 ? `<div class="calendarMore">+${bookings.length - 2} more</div>` : "";
        return `<div class="calendarDay"><div class="calendarDayNumber">${escapeHtml(day)}</div>${shown || ""}${more}</div>`;
      }).join("");
      container.innerHTML = `<div class="monthCalendar">${heads}${blanks}${cells}</div>`;
    }

    function formatMinutes(totalMinutes) {
      const minutes = Number(totalMinutes);
      if (!Number.isFinite(minutes)) return "-";
      const hrs = Math.floor(minutes / 60);
      const mins = minutes % 60;
      if (!hrs) return `${mins} min`;
      if (!mins) return `${hrs} hr`;
      return `${hrs} hr ${mins} min`;
    }

    function yesNo(value) {
      return value ? "Yes" : "No";
    }

    function closeAssignNannyModal() {
      currentAssignRequestId = null;
      document.getElementById("assignNannyModal").style.display = "none";
      document.getElementById("assignNannySummary").textContent = "";
      document.getElementById("assignNannyList").innerHTML = "";
      document.getElementById("assignNannyReason").value = "";
      document.getElementById("assignNannyError").textContent = "";
    }

    function renderAssignNannyOptions(data) {
      const summary = document.getElementById("assignNannySummary");
      const list = document.getElementById("assignNannyList");
      const schedule = Array.isArray(data?.schedule) ? data.schedule : [];
      const locationBits = [data?.location?.label, data?.location?.address].filter(Boolean);
      const locationText = locationBits.length ? locationBits.join(" - ") : "Client address unavailable";
      const results = Array.isArray(data?.results) ? data.results : [];
      const count = results.length;
      summary.innerHTML = `
        <div><strong>Radius:</strong> ${escapeHtml(data?.radius_km || 30)}km from ${escapeHtml(locationText)}</div>
        <div style="margin-top:4px;"><strong>Selected dates:</strong> ${escapeHtml(String(schedule.length || 0))} slot(s)</div>
        <div style="margin-top:4px;"><strong>Available nannies found:</strong> ${escapeHtml(count)}</div>
      `;
      if (!count) {
        list.innerHTML = `<div class="bookingEmpty">No nannies are available for all selected booking dates within 30km.</div>`;
        return;
      }
      list.innerHTML = results.map((item) => `
        <label class="assignOption">
          <input type="radio" name="assignNannyChoice" value="${escapeHtml(item.nanny_id)}" />
          <div>
            <div class="assignOptionTitle">${escapeHtml(item.name || `Nanny #${item.nanny_id}`)} <span class="muted">(ID ${escapeHtml(item.nanny_id)})</span></div>
            <div class="assignOptionMeta">
              ${escapeHtml(item.distance_km != null ? `${item.distance_km} km away` : "Distance unavailable")}
              ${item.location_hint ? ` • ${escapeHtml(item.location_hint)}` : ""}
            </div>
            <div class="assignOptionMeta">
              Rating: ${escapeHtml(item.average_rating_12m != null ? `${item.average_rating_12m} (${item.review_count_12m || 0})` : "New")}
              • Completed jobs: ${escapeHtml(item.completed_jobs_count || 0)}
            </div>
            <div class="assignOptionMeta">
              Job type: ${escapeHtml(item.job_type || "-")}
              • Own car: ${escapeHtml(yesNo(item.has_own_car))}
              • Driver's license: ${escapeHtml(yesNo(item.has_drivers_license))}
            </div>
            <div class="assignAvailabilityNote available">Available for all selected dates</div>
          </div>
        </label>
      `).join("");
    }

    async function openAssignNannyModal(requestId) {
      currentAssignRequestId = requestId;
      document.getElementById("assignNannyModal").style.display = "flex";
      document.getElementById("assignNannySummary").textContent = "Loading available nannies...";
      document.getElementById("assignNannyList").innerHTML = "";
      document.getElementById("assignNannyReason").value = "";
      document.getElementById("assignNannyError").textContent = "";
      try {
        const data = await fetchJson(`/admin/booking-requests/${requestId}/available-nannies`);
        renderAssignNannyOptions(data);
      } catch (err) {
        document.getElementById("assignNannySummary").textContent = "";
        document.getElementById("assignNannyList").innerHTML = `<div class="bookingEmpty">${escapeHtml(err.message || "Failed to load available nannies.")}</div>`;
      }
    }

    async function loadBookingDetail(requestId) {
      const card = document.getElementById("bookingDetailCard");
      const body = document.getElementById("bookingDetailBody");
      card.style.display = "block";
      body.textContent = "Loading booking detail...";
      const data = await fetchJson(`/admin/booking-requests/${requestId}/detail`);
      const schedule = Array.isArray(data?.schedule) ? data.schedule : [];
      const bookingFormItems = Array.isArray(data?.booking_form?.items) ? data.booking_form.items : [];
      const fallback = data?.booking_form?.fallback_profile || {};
      const days = Array.isArray(data?.booking_days) ? data.booking_days : [];
      const formatDt = (value) => value ? (window.formatDateTimeZA ? window.formatDateTimeZA(value) : new Date(value).toLocaleString()) : "-";
      const fallbackRows = [
        ["Booking responsibilities", fallback.booking_responsibilities],
        ["Adult present", fallback.booking_adult_present],
        ["Reason for booking", fallback.booking_reason],
        ["Children present during booking", fallback.booking_children_count],
        ["Meal arrangement", fallback.booking_meal_option],
        ["Foods not allowed", fallback.booking_food_restrictions],
        ["Dogs at home", fallback.booking_dogs],
        ["Notes for nanny", fallback.special_notes],
      ].filter(([, value]) => value !== null && value !== undefined && value !== "");

      body.innerHTML = `
        <div class="detailGrid">
          <div class="detailSection">
            <div class="detailRow"><strong>Request #:</strong> ${escapeHtml(data?.request_id || "-")}</div>
            <div class="detailRow"><strong>Status:</strong> ${escapeHtml(data?.status || "-")}</div>
            <div class="detailRow"><strong>Parent:</strong> ${escapeHtml(data?.parent?.name || "-")}</div>
            <div class="detailRow"><strong>Nanny:</strong> ${escapeHtml(data?.nanny?.name || "-")} (${escapeHtml(data?.nanny?.email || "-")})</div>
            <div class="detailRow"><strong>Location:</strong> ${escapeHtml(data?.location?.label || data?.location?.address || "-")}</div>
            <div class="detailRow"><strong>Created:</strong> ${escapeHtml(formatDt(data?.created_at))}</div>
            ${data?.is_overdue ? `<div class="bookingOverdue">Overdue: this request has been waiting more than 6 hours.</div>` : ""}
          </div>
          <div class="detailSection">
            <strong>Booking schedule</strong>
            ${schedule.length ? schedule.map((slot) => `<div class="detailRow">${escapeHtml(formatDt(slot.start_dt))} to ${escapeHtml(formatDt(slot.end_dt))}</div>`).join("") : `<div class="detailRow">No schedule saved.</div>`}
          </div>
          <div class="detailSection">
            <strong>Booking form</strong>
            ${bookingFormItems.length ? bookingFormItems.map((item) => `<div class="detailRow"><strong>${escapeHtml(item.label)}:</strong> ${escapeHtml(item.value)}</div>`).join("") : `<div class="detailRow">No booking form snapshot was saved for this request.</div>`}
            ${!bookingFormItems.length && fallbackRows.length ? `<div class="detailRow" style="margin-top:8px;"><strong>Current parent profile answers</strong></div>${fallbackRows.map(([label, value]) => `<div class="detailRow"><strong>${escapeHtml(label)}:</strong> ${escapeHtml(value)}</div>`).join("")}` : ""}
          </div>
          <div class="detailSection">
            <strong>Timer by booking day</strong>
            ${days.length ? days.map((day) => `
              <div class="detailDay">
                <div class="detailRow"><strong>Booking #${escapeHtml(day.booking_id)}</strong> • ${escapeHtml(day.status || "-")}</div>
                <div class="detailRow">Scheduled: ${escapeHtml(formatDt(day.start_dt))} to ${escapeHtml(formatDt(day.end_dt))}</div>
                <div class="detailRow">Arrived: ${escapeHtml(formatDt(day.check_in_at))}</div>
                <div class="detailRow">Finished: ${escapeHtml(formatDt(day.check_out_at))}</div>
                <div class="detailRow">Scheduled time: ${escapeHtml(formatMinutes(day.scheduled_minutes))}</div>
                <div class="detailRow">Worked time: ${escapeHtml(formatMinutes(day.worked_minutes))}</div>
                <div class="detailRow">Extra time: ${escapeHtml(formatMinutes(day.extra_minutes))}</div>
              </div>
            `).join("") : `<div class="detailRow">No accepted booking days yet.</div>`}
          </div>
        </div>
      `;
      card.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    async function loadBookingRequests() {
      const data = await fetchJson("/admin/bookings/overview");
      adminCalendarItems = buildAdminCalendarItems(data);
      if (!currentAdminCalendarMonth) {
        const now = new Date();
        currentAdminCalendarMonth = new Date(now.getFullYear(), now.getMonth(), 1);
      }
      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      const tomorrowParts = toAdminLocalDateParts(tomorrow);
      const bookingsTomorrow = adminCalendarItems.filter((item) => {
        const dt = item?.start_dt ? new Date(item.start_dt) : null;
        if (!dt || Number.isNaN(dt.getTime())) return false;
        const parts = toAdminLocalDateParts(dt);
        return parts.year === tomorrowParts.year && parts.month === tomorrowParts.month && parts.day === tomorrowParts.day;
      });
      renderBookingCollection("tomorrowBookingsList", bookingsTomorrow, { emptyText: "No confirmed bookings tomorrow." });
      renderBookingCollection("bookingRequestsList", data?.pending_requests || [], { showActions: true, emptyText: "No pending booking requests." });
      renderBookingCollection("upcomingBookingsList", data?.upcoming_bookings || [], { emptyText: "No upcoming bookings." });
      renderBookingCollection("inProgressBookingsList", data?.bookings_in_progress || [], { emptyText: "No bookings currently in progress." });
      renderBookingCollection("pastBookingsList", data?.past_bookings || [], { emptyText: "No past bookings yet." });
      renderBookingCollection("cancelledBookingsList", data?.cancelled_bookings || [], { emptyText: "No cancelations yet." });
      renderBookingCollection("unsuccessfulBookingsList", data?.unsuccessful_bookings || [], { emptyText: "No unsuccessful bookings yet." });
      renderMonthCalendar(currentAdminCalendarMonth, adminCalendarItems);
      applyBookingSectionFilter();
    }

    async function loadRefunds() {
      const data = await fetchJson("/admin/refunds?status=pending_review");
      const list = data?.results || data || [];
      const container = document.getElementById("refundsList");
      container.innerHTML = "";
      if (!list.length) {
        container.innerHTML = "<div class=\"muted\">No refunds awaiting review.</div>";
        return;
      }
      list.forEach(r => {
        const row = document.createElement("div");
        row.style.display = "flex";
        row.style.justifyContent = "space-between";
        row.style.gap = "10px";
        row.style.alignItems = "center";
        row.style.padding = "8px 0";
        row.style.borderBottom = "1px solid #eee";
        const amount = r.refund_cents != null ? `R${(r.refund_cents/100).toFixed(2)}` : "-";
        row.innerHTML = `
          <div>
            <div><strong>Job ID: ${r.job_id}</strong></div>
            <div class="muted">Refund: ${amount} • Status: ${r.refund_status || "pending_review"}</div>
          </div>
          <div>
            <button class="btn approveRefundBtn" data-job-id="${r.job_id}">Approve</button>
            <button class="btn rejectRefundBtn" data-job-id="${r.job_id}">Deny</button>
          </div>
        `;
        container.appendChild(row);
      });
    }

    document.getElementById("btnUsers").addEventListener("click", () => {
      showSection("sectionUsers");
      loadUsers().catch(e => { document.getElementById("authMsg").textContent = e.message; });
    });
    document.getElementById("btnPendingNannies").addEventListener("click", () => {
      showSection("sectionPendingNannies");
      loadPendingNannies().catch(e => { document.getElementById("authMsg").textContent = e.message; });
    });
    document.getElementById("applyNannyApplicationFilter").addEventListener("click", () => {
      loadPendingNannies().catch(e => { document.getElementById("authMsg").textContent = e.message; });
    });
    document.getElementById("btnBookingRequests").addEventListener("click", () => {
      showSection("sectionBookingRequests");
      loadBookingRequests().catch(e => { document.getElementById("authMsg").textContent = e.message; });
    });
    document.getElementById("btnBilling").addEventListener("click", () => {
      showSection("sectionBilling");
    });
    document.getElementById("btnInvoicing").addEventListener("click", () => {
      window.location.href = "/static/admin_reports.html";
    });
    document.getElementById("btnBillingRefunds").addEventListener("click", () => {
      showSection("sectionRefunds");
      loadRefunds().catch(e => { document.getElementById("authMsg").textContent = e.message; });
    });
    document.getElementById("btnChangeLogs").addEventListener("click", () => {
      window.location.href = "/static/admin_audit.html";
    });
    document.getElementById("adminCalendarPrevBtn").addEventListener("click", () => {
      if (!currentAdminCalendarMonth) return;
      currentAdminCalendarMonth = new Date(currentAdminCalendarMonth.getFullYear(), currentAdminCalendarMonth.getMonth() - 1, 1);
      renderMonthCalendar(currentAdminCalendarMonth, adminCalendarItems);
    });
    document.getElementById("adminCalendarNextBtn").addEventListener("click", () => {
      if (!currentAdminCalendarMonth) return;
      currentAdminCalendarMonth = new Date(currentAdminCalendarMonth.getFullYear(), currentAdminCalendarMonth.getMonth() + 1, 1);
      renderMonthCalendar(currentAdminCalendarMonth, adminCalendarItems);
    });

    document.getElementById("usersList").addEventListener("click", (e) => {
      const row = e.target.closest(".clickable-row");
      if (!row) return;
      const userId = row.dataset.userId;
      if (!userId) return;
      window.location.href = `/static/admin_user.html?user_id=${encodeURIComponent(userId)}`;
    });

    document.getElementById("applyUserFilters").addEventListener("click", () => {
      applyUserFilters();
    });
    document.getElementById("clearUserFilters").addEventListener("click", () => {
      document.getElementById("userSearchFilter").value = "";
      document.getElementById("userRoleFilter").value = "";
      document.getElementById("userLocationFilter").value = "";
      document.getElementById("userSort").value = "joined_asc";
      applyUserFilters();
    });

    document.getElementById("pendingNanniesList").addEventListener("click", (e) => {
      const btn = e.target.closest(".viewNannyBtn");
      if (!btn) return;
      const userId = btn.dataset.userId;
      window.location.href = `/static/admin_user.html?user_id=${encodeURIComponent(userId)}`;
    });

    document.getElementById("bookingRequestsList").addEventListener("click", (e) => {
      const view = e.target.closest(".viewBookingBtn");
      const approve = e.target.closest(".approveRequestBtn");
      const reject = e.target.closest(".rejectRequestBtn");
      const assign = e.target.closest(".assignBookingBtn");
      if (view) {
        loadBookingDetail(view.dataset.id).catch(err => { document.getElementById("authMsg").textContent = err.message; });
        return;
      }
      const btn = approve || reject || assign;
      if (!btn) return;
      const requestId = btn.dataset.id;
      if (assign) {
        openAssignNannyModal(requestId).catch(err => { document.getElementById("authMsg").textContent = err.message; });
        return;
      }
      const path = approve ? "approve" : "reject";
      const payload = {};
      if (reject) {
        const reason = (prompt("Why are you rejecting this booking request?") || "").trim();
        if (!reason) {
          document.getElementById("authMsg").textContent = "A rejection reason is required.";
          return;
        }
        payload.reason = reason;
      }
      fetchJson(`/admin/booking-requests/${requestId}/${path}`, {
        method: "POST",
        body: Object.keys(payload).length ? JSON.stringify(payload) : undefined
      })
        .then(() => Promise.all([loadBookingRequests(), refreshCounts()]))
        .catch(err => { document.getElementById("authMsg").textContent = err.message; });
    });

    ["tomorrowBookingsList", "upcomingBookingsList", "inProgressBookingsList", "pastBookingsList", "cancelledBookingsList", "unsuccessfulBookingsList"].forEach((id) => {
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener("click", (e) => {
        const view = e.target.closest(".viewBookingBtn");
        if (!view) return;
        loadBookingDetail(view.dataset.id).catch(err => { document.getElementById("authMsg").textContent = err.message; });
      });
    });

    document.getElementById("closeBookingDetailBtn").addEventListener("click", () => {
      document.getElementById("bookingDetailCard").style.display = "none";
    });
    document.getElementById("bookingSectionFilter").addEventListener("change", applyBookingSectionFilter);

    document.getElementById("closeAssignNannyModalBtn").addEventListener("click", closeAssignNannyModal);
    document.getElementById("assignNannyModal").addEventListener("click", (e) => {
      if (e.target.id === "assignNannyModal") closeAssignNannyModal();
    });
    document.getElementById("confirmAssignNannyBtn").addEventListener("click", async () => {
      const requestId = currentAssignRequestId;
      if (!requestId) return;
      const chosen = document.querySelector('input[name="assignNannyChoice"]:checked');
      const nannyId = Number(chosen?.value || 0);
      const reason = (document.getElementById("assignNannyReason").value || "").trim();
      const errorEl = document.getElementById("assignNannyError");
      errorEl.textContent = "";
      if (!Number.isFinite(nannyId) || nannyId <= 0) {
        errorEl.textContent = "Please select a nanny to assign.";
        return;
      }
      if (!reason) {
        errorEl.textContent = "A reason is required for manual assignment.";
        return;
      }
      const btn = document.getElementById("confirmAssignNannyBtn");
      btn.disabled = true;
      try {
        await fetchJson(`/admin/booking-requests/${requestId}/assign-nanny`, {
          method: "POST",
          body: JSON.stringify({ reason, assign_nanny_id: nannyId })
        });
        closeAssignNannyModal();
        await Promise.all([loadBookingRequests(), refreshCounts()]);
      } catch (err) {
        errorEl.textContent = err.message || "Failed to assign nanny.";
      } finally {
        btn.disabled = false;
      }
    });

    document.getElementById("refundsList").addEventListener("click", async (e) => {
      const approve = e.target.closest(".approveRefundBtn");
      const deny = e.target.closest(".rejectRefundBtn");
      const btn = approve || deny;
      if (!btn) return;
      const jobId = btn.dataset.jobId;
      if (!jobId) return;
      const reason = prompt("Reason (optional)") || "";
      let amount = null;
      if (approve) {
        const amtStr = prompt("Refund amount in R (leave blank for default)");
        if (amtStr) {
          const num = parseFloat(amtStr);
          if (!Number.isFinite(num) || num < 0) {
            document.getElementById("authMsg").textContent = "Invalid amount.";
            return;
          }
          amount = Math.round(num * 100);
        }
      }
      const path = approve ? "approve" : "deny";
      const payload = {};
      if (reason) payload.reason = reason;
      if (approve && amount != null) payload.amount_cents = amount;
      try {
        await fetchJson(`/admin/booking-requests/${encodeURIComponent(jobId)}/refund/${path}`, {
          method: "POST",
          body: Object.keys(payload).length ? JSON.stringify(payload) : undefined
        });
        await loadRefunds();
      } catch (err) {
        document.getElementById("authMsg").textContent = err.message || "Refund action failed";
      }
    });

    (async function () {
      const res = await fetch("/admin/me", {
        credentials: "same-origin"
      });

      if (!res.ok) {
        document.getElementById("authMsg").textContent = "Not authorized";
        setTimeout(() => {
          window.location.href = "/static/parent_home.html";
        }, 1000);
        return;
      }
      try {
        await refreshCounts();
        showSection("sectionBookingRequests");
        await loadBookingRequests();
      } catch (e) {
        document.getElementById("authMsg").textContent = e.message || "Failed to load admin dashboard";
      }
    })();
  </script>
</body>
