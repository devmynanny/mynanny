<!doctype html>
<html>
<head>
  <link rel="stylesheet" href="/static/theme.css" />
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Create account</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, Arial; max-width: 520px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 44px; margin: 0 0 18px; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 16px; }
    label { display: block; margin: 12px 0 6px; font-weight: 600; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #bbb; border-radius: 10px; font-size: 16px; }
    button { margin-top: 14px; width: 100%; padding: 12px; border: 1px solid #222; border-radius: 10px; font-size: 16px; cursor: pointer; }
    .roleRow { display: flex; gap: 10px; margin-top: 8px; }
    .roleBtn { flex: 1; padding: 12px; border: 1px solid #bbb; border-radius: 10px; background: #fff; cursor: pointer; }
    .roleBtn.active { border-color: #222; font-weight: 700; }
    .row { margin-top: 12px; }
    .err { color: #b00020; margin-top: 10px; white-space: pre-wrap; }
    .muted { color: #555; font-size: 14px; }
    a { color: #0b57d0; text-decoration: none; }
  </style>
</head>
<body>
  <h1>Create account</h1>

  <div class="card">
    <label>Role</label>
    <div class="roleRow">
      <button class="roleBtn active" id="roleParent" type="button">I'm a parent</button>
      <button class="roleBtn" id="roleNanny" type="button">I'm a nanny</button>
    </div>

    <label>Name</label>
    <input id="name" type="text" autocomplete="name" placeholder="Full name" />

    <label>Email</label>
    <input id="email" type="email" autocomplete="email" placeholder="you@email.com" />

    <label>Password</label>
    <input id="password" type="password" autocomplete="new-password" placeholder="Create a password" />

    <div id="nannyPhones" style="display:none;">
      <label>Phone number</label>
      <input id="phone" type="tel" autocomplete="tel" placeholder="+27..." />

      <label>Alternative phone number</label>
      <input id="phoneAlt" type="tel" autocomplete="tel" placeholder="+27..." />
    </div>

    <div id="nannyDocs" style="display:none;">
      <label>Nationality</label>
      <select id="nationality">
        <option value="">Select nationality</option>
        <option value="Angolan">Angolan</option>
        <option value="Botswanan">Botswanan</option>
        <option value="Comorian">Comorian</option>
        <option value="Congolese (DRC)">Congolese (DRC)</option>
        <option value="Eswatini">Eswatini</option>
        <option value="Lesotho">Lesotho</option>
        <option value="Madagascan">Madagascan</option>
        <option value="Malawian">Malawian</option>
        <option value="Mauritian">Mauritian</option>
        <option value="Mozambican">Mozambican</option>
        <option value="Namibian">Namibian</option>
        <option value="Seychellois">Seychellois</option>
        <option value="South African">South African</option>
        <option value="Tanzanian">Tanzanian</option>
        <option value="Zambian">Zambian</option>
        <option value="Zimbabwean">Zimbabwean</option>
      </select>

      <label>Race</label>
      <select id="race">
        <option value="">Select race</option>
        <option value="Black">Black</option>
        <option value="Coloured">Coloured</option>
        <option value="Indian/Asian">Indian/Asian</option>
        <option value="White">White</option>
        <option value="Other">Other</option>
      </select>

      <div id="passportRow">
        <label>Passport number (if not South African)</label>
        <input id="passportNumber" type="text" placeholder="Passport number" />
        <div class="err" id="passportError" style="display:none;"></div>
        <label>Passport expiry date</label>
        <input id="passportExpiry" type="date" />
        <label>Passport copy</label>
        <input id="passportFile" type="file" accept=".pdf,image/*" />
        <div class="muted" id="passportHint">Upload after selecting non‑SA nationality.</div>
      </div>

      <div id="saIdRow">
        <label>South African ID number</label>
        <input id="saIdNumber" type="text" placeholder="ID number" />
        <div class="err" id="saIdError" style="display:none;"></div>
        <label>Copy of ID</label>
        <input id="saIdFile" type="file" accept=".pdf,image/*" />
        <div class="muted" id="saIdHint">Upload after selecting South African nationality.</div>
      </div>

      <div id="permitRow">
        <label>Work permit</label>
        <select id="workPermit">
          <option value="">Select</option>
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>
        <label>Work permit expiry</label>
        <input id="workPermitExpiry" type="date" />
        <label>Waiver (if no permit)</label>
        <select id="waiver">
          <option value="">Select</option>
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>
        <label>Work permit copy</label>
        <input id="permitFile" type="file" accept=".pdf,image/*" />
        <div class="muted" id="permitHint">Upload after selecting work permit = Yes.</div>
      </div>
    </div>

    <button id="createBtn" type="button">Create account</button>

    <div class="row muted">
      Already have an account?
      <a href="/static/login.html">Login</a>
    </div>

    <div id="err" class="err"></div>

    <div class="row muted" style="margin-top:10px">
      Admin accounts are not created here.
    </div>
  </div>

  <script src="/static/app.js?v=2"></script>
  <script>
    const errEl = document.getElementById("err");
    const roleParent = document.getElementById("roleParent");
    const roleNanny = document.getElementById("roleNanny");
    let role = "parent";

    function validateSaId(idNumber) {
      const s = (idNumber || "").trim();
      if (!s) return null;
      if (!/^\d{13}$/.test(s)) return "South African ID number must be 13 digits.";

      const yy = parseInt(s.slice(0, 2), 10);
      const mm = parseInt(s.slice(2, 4), 10);
      const dd = parseInt(s.slice(4, 6), 10);
      const now = new Date();
      const century = yy <= (now.getFullYear() % 100) ? 2000 : 1900;
      const dob = new Date(century + yy, mm - 1, dd);
      if (dob.getFullYear() !== century + yy || dob.getMonth() !== (mm - 1) || dob.getDate() !== dd) {
        return "South African ID number has an invalid date of birth.";
      }

      const citizen = s[10];
      if (citizen !== "0" && citizen !== "1") {
        return "South African ID number has an invalid citizenship digit.";
      }

      let total = 0;
      const digits = s.split("").map((d) => parseInt(d, 10)).reverse();
      for (let i = 0; i < digits.length; i++) {
        let d = digits[i];
        if (i % 2 === 1) {
          d *= 2;
          if (d > 9) d -= 9;
        }
        total += d;
      }
      if (total % 10 !== 0) return "South African ID number failed checksum.";
      return null;
    }

    function setRole(r) {
      role = r;
      roleParent.classList.toggle("active", role === "parent");
      roleNanny.classList.toggle("active", role === "nanny");
      const phoneBox = document.getElementById("nannyPhones");
      if (phoneBox) phoneBox.style.display = role === "nanny" ? "block" : "none";
      const docs = document.getElementById("nannyDocs");
      if (docs) docs.style.display = role === "nanny" ? "block" : "none";
      toggleNationalityFields();
    }

    roleParent.addEventListener("click", () => setRole("parent"));
    roleNanny.addEventListener("click", () => setRole("nanny"));

    document.getElementById("createBtn").addEventListener("click", async () => {
      errEl.textContent = "";
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const phone = document.getElementById("phone")?.value?.trim() || null;
      const phoneAlt = document.getElementById("phoneAlt")?.value?.trim() || null;
      const nationality = document.getElementById("nationality")?.value || null;
      const race = document.getElementById("race")?.value || null;
      const passportNumber = document.getElementById("passportNumber")?.value || null;
      const passportExpiry = document.getElementById("passportExpiry")?.value || null;
      const workPermit = document.getElementById("workPermit")?.value === "yes" ? true : (document.getElementById("workPermit")?.value === "no" ? false : null);
      const workPermitExpiry = document.getElementById("workPermitExpiry")?.value || null;
      const waiver = document.getElementById("waiver")?.value === "yes" ? true : (document.getElementById("waiver")?.value === "no" ? false : null);
      const saIdNumber = document.getElementById("saIdNumber")?.value || null;
      const natValue = (document.getElementById("nationality")?.value || "").trim().toLowerCase();

      const saIdErrorEl = document.getElementById("saIdError");
      const passportErrorEl = document.getElementById("passportError");
      if (saIdErrorEl) {
        saIdErrorEl.textContent = "";
        saIdErrorEl.style.display = "none";
      }
      if (passportErrorEl) {
        passportErrorEl.textContent = "";
        passportErrorEl.style.display = "none";
      }
      if (role === "nanny") {
        if (natValue === "south african") {
          if (!saIdNumber) {
            if (saIdErrorEl) {
              saIdErrorEl.textContent = "South African ID number is required.";
              saIdErrorEl.style.display = "block";
            } else {
              errEl.textContent = "South African ID number is required.";
            }
            return;
          }
          const saErr = validateSaId(saIdNumber);
          if (saErr) {
            if (saIdErrorEl) {
              saIdErrorEl.textContent = saErr;
              saIdErrorEl.style.display = "block";
            } else {
              errEl.textContent = saErr;
            }
            return;
          }
        } else if (natValue) {
          if (!passportNumber) {
            if (passportErrorEl) {
              passportErrorEl.textContent = "Passport number is required.";
              passportErrorEl.style.display = "block";
            } else {
              errEl.textContent = "Passport number is required.";
            }
            return;
          }
        }
      }

      try {
        // Requires backend endpoint: POST /auth/signup
        await fetchJson("/auth/signup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name, email, password, role, phone, phone_alt: phoneAlt,
            nationality, ethnicity: race, passport_number: passportNumber, passport_expiry: passportExpiry,
            work_permit: workPermit, work_permit_expiry: workPermitExpiry, waiver,
            sa_id_number: saIdNumber
          })
        });

        // Auto login after signup
        const res = await fetchJson("/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        setToken(res.access_token);
        const u = await fetchJson("/auth/me");

        // Upload documents after signup for nannies
        if (u.role === "nanny") {
          const uploads = [];
        const passportFile = document.getElementById("passportFile")?.files?.[0];
        const saIdFile = document.getElementById("saIdFile")?.files?.[0];
        const permitFile = document.getElementById("permitFile")?.files?.[0];
          if (passportFile) {
            const fd = new FormData(); fd.append("file", passportFile);
            uploads.push(fetch("/nannies/me/passport-document", { method: "POST", headers: { "Authorization": "Bearer " + getToken() }, body: fd }));
          }
          if (saIdFile) {
            const fd = new FormData(); fd.append("file", saIdFile);
            uploads.push(fetch("/nannies/me/id-document", { method: "POST", headers: { "Authorization": "Bearer " + getToken() }, body: fd }));
          }
          if (permitFile) {
            const fd = new FormData(); fd.append("file", permitFile);
            uploads.push(fetch("/nannies/me/work-permit-document", { method: "POST", headers: { "Authorization": "Bearer " + getToken() }, body: fd }));
          }
          await Promise.all(uploads).catch(() => {});
        }

        routeByRole(u.role);
      } catch (e) {
        errEl.textContent = e.message;
      }
    });

    function toggleNationalityFields() {
      const nat = (document.getElementById("nationality")?.value || "").trim().toLowerCase();
      const isSa = nat === "south african";
      const hasNat = !!nat;
      const passportRow = document.getElementById("passportRow");
      const saIdRow = document.getElementById("saIdRow");
      const permitRow = document.getElementById("permitRow");
      if (passportRow) passportRow.style.display = (!hasNat || isSa) ? "none" : "block";
      if (permitRow) permitRow.style.display = (!hasNat || isSa) ? "none" : "block";
      if (saIdRow) saIdRow.style.display = (hasNat && isSa) ? "block" : "none";
      const passportFile = document.getElementById("passportFile");
      const saIdFile = document.getElementById("saIdFile");
      if (passportFile) passportFile.style.display = isSa ? "none" : "block";
      if (saIdFile) saIdFile.style.display = isSa ? "block" : "none";
      const permitFile = document.getElementById("permitFile");
      if (permitFile) {
        const showPermitFile = document.getElementById("workPermit")?.value === "yes";
        permitFile.style.display = showPermitFile ? "block" : "none";
        const hint = document.getElementById("permitHint");
        if (hint) hint.style.display = showPermitFile ? "none" : "block";
      }
      const waiverSelect = document.getElementById("waiver");
      if (waiverSelect?.parentElement) {
        waiverSelect.parentElement.style.display = document.getElementById("workPermit")?.value === "no" ? "block" : "none";
      }
    }
    document.getElementById("nationality")?.addEventListener("change", toggleNationalityFields);
    document.getElementById("workPermit")?.addEventListener("change", toggleNationalityFields);
  </script>
</body>
</html>
