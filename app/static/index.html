<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="/static/theme.css" />
    <title>Nanny Finder</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 40px auto;
        }
        h1 {
            margin-bottom: 10px;
        }
        button {
            padding: 10px 16px;
            cursor: pointer;
        }
        .card {
            border: 1px solid #ddd;
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 6px;
        }
        .topbar{
            display:flex;
            align-items:center;
            justify-content:space-between;
            margin: 10px 0 20px 0;
        }
        .btn.secondary{
            background:#fff;
            border:1px solid #ccc;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div></div>
        <button id="logoutBtn" class="btn secondary" type="button">Log out</button>
    </div>
    <h1>Nanny Finder</h1>
    <button onclick="loadNannies()">Load available nannies</button>
    <div id="results"></div>

    <script src="/static/app.js?v=2"></script>
    <script>
                (function(){
                    const btn = document.getElementById("logoutBtn");
                    if (!btn) return;
                    btn.addEventListener("click", () => {
                        logout();
                    });
                })();

                async function loadNannies() {
                    const me = await requireMe();
                    if (me.role !== "parent") {
                        location.href = "/static/login.html";
                        return;
                    }
                    const data = await fetchJson(`/nannies/search?parent_user_id=${me.id}`);

                    const nannies = data.results || [];
                    const container = document.getElementById("results");
                    container.innerHTML = "";

                    if (nannies.length === 0) {
                        container.innerHTML = `<p>${data.message || "No nannies found."}</p>`;
                        return;
                    }

                    nannies.forEach(n => {
                        const div = document.createElement("div");
                        div.className = "card";

                        const avg = n.average_rating_12m;
                        const cnt = n.review_count_12m;
                        const ratingText =
                          (cnt && cnt > 0)
                            ? `⭐ ${(avg ?? 0).toFixed(1)} (${cnt} review${cnt === 1 ? "" : "s"})`
                            : "⭐ New";

                        div.innerHTML = `
                            <strong>${n.name}</strong><br/>
                            <span class="muted">${ratingText}</span><br/>
                            Age: ${n.age ?? "Unknown"}<br/>
                            Languages: ${(n.languages || []).map(l => l.name).join(", ")}<br/>
                            Qualifications: ${(n.qualifications || []).map(q => q.name).join(", ")}<br/>
                            Bio: ${n.bio || ""}
                        `;
                        container.appendChild(div);
                    });
                }
    </script>
</body>
</html>
